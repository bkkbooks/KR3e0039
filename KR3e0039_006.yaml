body:
  text: 太醫局諸科程文格卷六大義第一道問以左手掐穴令定法其地不動右手持針象其天而運轉也對明於用針得左掐右持之妙知於法象𠫭地靜天動之常且左右則分於隂陽天地則司於覆載左手掐穴也令其定而不移所以法坤道之安靜右手持針也欲其動而不息所以象乾元之運行即左右言之則左欲靜而右欲動即動靜論之則靜法地而動法天行針用刺合乾坤運止之功瀉實補虗參天地損益之道機要既得於心精微斯應於手誠以法則天地者謂之賢人故針刺之法未嘗或外於是矣經曰以左手掐穴令定法其地不動右手持針象其天而運轉也其意如此嘗謂一元既判則大道裂一而為三三才既分則聖人貫三而為一論天地機緘之運無一而不合於人身言人身起止之常無一而不𠫭於天地至於治病逹精微之妙行針候子午之法未有捨是理而外是道矣蓋積隂為地也隂主乎靜故隤然守位而不移積陽為天也陽主乎動故穹然運行而不息用針之妙則𠫭乎隂陽之性行刺之機則合乎動靜之常以左手掐穴欲其定則法乎地以右手持針欲其動則象乎天不法地之止靜則掐穴有偏側之差不象天之旋動則行針有補㵼之失左則留神以掐穴固不可以或動右則存意以捻針尤不可以或止不特此也施治之間法天地而損盈益虧用針之際在人身而補虗㵼實虗者補之則扶其不足之氣實者㵼之則抑其有餘之邪雖假於毫芒之微取於呼吸之頃或入疾而出徐或入徐而出疾其所以能補能㵼者自非首明於左掐右持之妙先法乎地靜天動之常則未聞其可也考之於經素問所謂應地之氣靜而守位又曰應天之氣動而不息又曰補㵼不失與天地如一又下文曰右手存意捻針左手掐穴可重五兩已來計其針如轉如不轉徐徐下之又經曰虗者徐而疾實者疾而徐徐即是㵼疾即是補即是觀之自非得之於心而應之於手則不足以論用針之法也謹對第二道問病有浮沉刺有淺深各至其理無過其道對病有浮沉刺必分其淺深之冝治皆合理謹無過其氣行之道蓋邪之感受流變不同病之留止為證不一浮則在於皮毛肌肉之間沉則在於筋脈骨髓之內浮則針之輕而當淺沉則刺之重而欲深逺近隨冝皆至理而不可失淺深在志循氣道而不可差於是無太過內傷之患無不及外壅之愆自匪聖人得其針刺之要則曷能論至於斯矣經曰病有浮沉刺有淺深各至其理無過其道其意如此原夫回生起死莫逃用刺之功劫病愈疾豈外行針之妙審病情之流變既得於心明針法之重輕斯應乎手如是則收功十全匪藥物之能及始可與言得針刺之道矣今也病有浮沉之異為工不可以不明刺有淺深之殊用針不可以不逹分皮毛肌肉之受邪别筋脈骨髓之為病自骨髓而上至皮毛則漸為之浮故刺亦隨之而漸淺自皮毛而下至骨髓則漸為之沉故針亦隨之而漸深針毫毛腠理之間則勿傷於皮刺皮膚形表之分則無傷於肉針肉不可以傷脈刺脈謹勿以傷筋筋病刺筋而莫至於骨骨病刺骨而勿中於髓如刺骨髓之類則失之於太深如針肉至皮之屬則失之於太淺太深者謂之太過故損於榮衛而邪氣內傷太淺者謂之不及故益於他氣而榮衛外壅浮則刺淺至病所而得其宜沉則刺深及病處而合其理各隨其淺深之源無過其氣行之道故聖人告戒若其淺深不得反為邪氣內賊者誠欲勉其存心於針刺之法而無毫髮之差而後已何以明之經曰淺深在志逺近若一如臨深淵又下文曰過之則內傷不及則生外壅壅則邪從之淺深不得反為大賊內動五藏反生大病即此推之醫道固甚難而針法尤不易茍非心諦手巧者豈足以知此哉謹對又大義第一道問虗者徐而疾實者疾而徐徐即是㵼疾則是補補㵼之法一依此也對審虗實之病故用針有疾徐之不同論補㵼之法在良工能遵守而不易蓋精氣奪者謂之虗則當補邪氣盛者謂之實則當瀉且夫下針徐而出針疾也故先徐則不擾於真後疾則不走於氣下針急而出針緩也故先急則可決於邪後緩則可引於氣徐而掣針故徐即是其㵼疾而掣針故疾即是其補虗者補之真氣漸復而自全實者㵼之邪氣既除而自治所以隨氣虗實而用針既分徐疾之有異依此補㵼而治病斯明法守而不易矣經曰虗者徐而疾實者疾而徐徐即是㵼疾即是補補㵼之法一依此也其意若此嘗謂病證多端初不外於虗實針刺異法皆不越於補㵼在於人身也有補虗㵼實之異冝法於天地也有損盈益虧之常道明於此者萬舉萬全無實實虗虗之過也今也審虗實受病之機明補㵼疾徐之要皆前賢得針刺之妙其法蓋本乎此縱後學有智巧之能其用亦不外乎此且虗乃精之不足實為邪之有餘虗則當補用針者先徐而後疾實則當㵼用刺者先疾而後徐緩而入針俾經絡安寧而不擾疾而出針使真氣祕固而不離兹所以謂之補焉急而下針致經絡通暢而不塞徐而掣針令病氣引泄而不絶兹所以謂之㵼焉徐即是㵼以其出針之緩疾即是補以其出針之速虗而當補也故不可以疾而徐實而當㵼也亦不可以徐而疾然則用針雖一施治則二故聖人以疾徐先後之序為治法補㵼之機殆貽後世遵守而不可易也下文曰計其針如轉如不轉徐徐下覺痛即可重二兩若不覺以經下之入人榮至衛至病得氣如鮪魚食釣即得其病氣也量其輕重以經取之名曰疾徐至病得氣欲出針時子午緩緩而出令引病氣不絶名曰徐也既引氣多一向無補名之曰㵼之法一依如此而不違損益之功無過其道而不失又况出針而徐按手而疾此亦謂之補出針而疾按手而緩此亦謂之㵼所以聖人取疾徐之先後為刺法之補㵼候氣於子午者誠得針刺之大要矣又內經針解篇曰徐而疾則實者徐出針而疾按之疾而徐則虗者疾出針而徐按之又曰補㵼不失與天地如一由是推之先聖立用針之法以為後世學者之權衡謹對第二道問若經脈之間針灸病已對在經脈之間既有以受其邪憑針灸之功斯能以己其病蓋手有隂陽之六經足有隂陽之六脈行血氣而運於周身通隂陽而循於遍體虗則感邪舍於經隧之間非藥物之所冝隙則受病留於脈道之分非湯劑而可及施於針刺故邪隨呼吸而易除用其灸􅌊故病因火力而遂已是知經脈之病不施針灸而愈者幾希矣經曰若在經脈之間針灸病已其意如此夫病有表裏之證治有內外之法內者內治而病無不瘳外者外治而疾無不愈如腸胃之病則在乎內必以藥物而內和如經脈之疾則在乎外必以針灸而外取惟能明此斯可坐收十全之功矣且夫太隂少隂厥隂者三隂之經太陽少陽陽明者三陽之脈手有六經行血氣而綱維於體足有六脈通隂陽而貫絡於身隨所虗之經隧受所感之外邪舍於其間而內不得通留於其內而外不得泄非腸胃之病而藥餌不能及非臟腑之邪而湯液莫能去善治者隨其經而行針能療者取其穴而灼艾如病在手經之太隂必取之以肺俞如邪在足經之太隂必取之以脾穴針刺之法借毫鋒而引逹諸經灸􅌊之冝資火力而速透諸脈在經之病得其刺而乃除留脈之邪因其灸而自釋臟腑內列而會通六合經脈外行而各從其處聖人灸刺而治經脈者是明以外治外之法也經曰經脈者行血氣而通隂陽又曰經有十二絡有十五又曰會通六合各從其經氣穴所發各有處名又曰外者外治是知聖人因其外之有病而立其治外之法則世無不愈之患矣謹對第三道問春刺井夏刺榮對臟舍受病因春夏而所感不同刺法隨冝取井榮而為治各異且肝屬木而旺於三春心屬火而旺於九夏井者木也故始生所出而應於肝經榮者火也故出流所聚而應於心臟春序受邪而在肝故春必刺於井而所出為井也夏令感邪而在心故夏必刺於榮而所流為榮也是知病以時而受針以要而取所以聖人審春夏之異刺有春刺井夏刺榮之法矣經曰春刺井夏刺榮其意若此且夫人有五臟而法於五行臟應五行而旺於四序邪氣或侵故傷於主時之臟針法或用故隨於氣應之穴審春夏秋冬之異取井榮經絡之殊各隨臟脈之所冝參符時序之所在矣蓋臟氣之行若泉源而不息經脈之注如川流而無窮腑臟各有其井故井者氣之所出臟腑各有其榮故榮者氣之所流出則象於始生故井乃屬於肝木流乃法於止聚故榮乃屬於心火時屆於春乘春感邪則病在於肝故刺必取乎井令當於夏乘夏受邪則疾在於心故針必取乎榮邪之所傷於人者固不同治之所在於我者亦不一觀其色青其臭臊之類必知病之在肝者無疑説察其色赤及臭焦之屬必知疾之在心者有定論春刺井以通肝則肝邪自釋夏刺榮以通心則心病自退茍病不分於春夏刺不别於井榮欲其劫病安可得乎何則經所出為井所流為榮又曰井者木也榮者火也又下文曰春刺井者邪在肝夏刺榮者邪在心又曰假令肝病色青者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病衆多不可盡言也由是推之用針之法則在變通固不可執於一定之論矣謹對假令論方義一道問假令太平聖惠方載古來用火灸病忌八般木火切冝避之八木者松木火難差增病柏木火傷神多汗竹木火傷筋目暗榆木火傷骨失志桑木火傷肉肉枯棗木火內傷吐血枳木火大傷氣脈橘木火傷榮衛經絡切詳灸􅌊之法特忌以八木之火而不忌他木之火者何耶况不避忌而用之則所生之病又各不同大抵古人著書而告戒必有深意而存焉請論而毋略對劫病之法當以灸而為先灼艾之術必以火而成效蓋灸則助陽而消隂火則透經而行絡明其要旨也資火力以去其病昧於避忌也因火氣以增其疾所以聖人取燈燭之火者欲其潤而無忌古法避八般木火切冝避之八木者松木火難差增病柏木火傷神多汗竹木火傷筋目暗榆木火傷骨失志桑木火傷肉肉枯棗木火內傷吐血枳木火大傷氣脈橘木火傷榮衛經絡竊詳灸􅌊之法特忌以八木之火而不忌他木之火者何耶况不避忌而用之則所生之病又各不同大抵古人著書而告戒必有深意而存焉請詳論而毋略大哉先聖之奧旨愚雖不敏姑以管見而論之嘗謂立身之道濟物居先保夀之宜治病為要草木有蠲痾之力針灸有劫病之功得其冝則萬舉萬全乖其宜則變證百出是以灸􅌊之法尤當知其所宜而避其所忌也謂如病在經絡邪傳臟腑或隂邪之有餘或陽氣之暴脫非針藥之可及須灸艾之取效所以聖人求民之瘼恤民之隱窮流注之要妙陳穴道之根元立其灸法之書矣夫灸者取其腧穴􅌊者灼之以艾火其所以成效獲驗者無非火力而已至於點穴之際固不可以或差及其用火之時尤不可以不謹古之立法以火灸病而有八般木火之忌者松柏竹榆桑棗枳橘之謂也誠哉聖人之垂戒豈無所自而然乎且木感五氣而生色隨五臟而應如草有五芝各以色而合五臟石有五脂亦以類而歸五宫皆同聲而相應同氣而相求實物理之自然也柏木者色赤而通於心臟竹木者色青而達於肝宫榆木性滑而類水故合於腎桑木色黃而象土故合於脾棗木亦赤而通心枳木本白而通肺經曰東方青色入通於肝又曰南方赤色入通於心又曰中央黃色入通於脾又曰西方白色入通於肺又曰腎者主水又本草曰榆性滑利此其謂也以至松木易􅌊而火力輕僣橘木辛散而火勢炎爍雖無色類而相參亦自性用而區别是故柏木通心也有傷神多汗之害竹木入肝也有傷筋暗目之愆榆木入腎則傷骨而失志桑木入脾則傷肉而肉枯棗木之赤亦取以通心故內傷而吐血者有之枳木之白本能以入肺故大傷於氣脈者有之經曰心藏神又曰入心為汗又曰心主血又曰肝之合筋也又曰肝氣通於目又曰腎之合骨也又曰腎藏精與志又曰脾之合肉也又曰肺主氣此其謂也與夫松火輕僣用之則灸瘡難差而病勢愈增橘火炎爍用之則榮衛皆傷而經絡俱損如是用八木之火者必有所傷用他木之火者自無其損故特避八木而不避於他木也火忌有八既所犯而不同病證多端故所生而亦異隨其所犯之木火顯其所傷之病證也所以聖人有曰如無木火者懼其或犯於八木之火矣故古人取之以日光之火後世用以燈燭之火一則愈病而無忌一則潤瘡而不疼吁先聖立法而告戒後世者可謂至矣為工者烏可輕忽而不謹乎謹對又假令法第一道問假令嘔吐候目即節氣當得何脈本因是何臟腑受病發何形候即今宜用是何腧穴針灸設有變動又當隨脈如何治療各須引本經為證仍具銅人腧穴針經隨輕重脈屬經絡用針分寸補㵼之法并灸壯數處穴為對對脾胃虗弱既受風寒之邪倉廪乖和斯為嘔吐之病蓋水穀假胃而包容飲食資脾而播化胃腑一弱致風邪以乘凌脾臟一虗使外邪而入客膈間則停於宿食胃內則積於久寒致水穀之海而乖於受納使倉廪之本而失於腐消嘔則因是而生吐亦於斯而作故嘔吐之病良由此矣目即三春屆時盛德在木萬物始生而未盛六脈濡弱而兼長故為應時之脈乃曰平人之診今也不然寸脈見緊急之形尺脈彰蹇澀之象斯為嘔吐之脈也經曰寸緊尺澀其人胸滿不能食而吐本因脾臟不足胃腑虧感於風寒之邪停於宿留之飲故其狀氣長太息心常淡淡胸中有如煩之愆膈內有痞滿之咎或大便之閉難或臟腑之溏泄原其所以皆嘔吐氣虗之使然也巢氏曰嘔吐者皆由脾胃虗弱受於風邪所為也若風在胃則嘔膈間有停飲胃內有久寒則嘔而吐其狀長太息心裏淡淡然或煩滿而大便難或溏泄變其候詳其病而尚輕傳其病而未久冝針灸雲門之穴去其風寒之邪補於脾胃之氣則嘔吐之疾可得而愈也設若服藥不對求治失時俾榮衛之俱虗致水穀之不納朝食暮吐暮食朝吐心下牢堅形體寒熱則知其病變為胃反之候也巢氏曰榮衛俱虗其血氣不足停水積食在胃脘則臟冷而脾不磨脾不磨則宿穀不化其氣逆而成胃反也則朝食暮吐暮食朝吐心下牢大如杯往來寒熱甚者食已即吐復持其脈弦緊者胃反之脈也經曰其脈弦而緊弦則為虗緊則為寒虗寒相搏故食已即吐名曰胃反也再詳其證病則出於嘔吐名則謂之胃反針灸雲門而不可及故當取其中脘之穴使寒邪散釋脾胃充盛水穀得腐化之冝飲食無反吐之咎乃知其針灸之效也謹按銅人腧穴針經脈屬經絡用針分寸補㵼之法并灸壯數處穴附之於後治假令嘔吐候針灸雲門穴法雲門二穴在巨骨下氣户兩傍各二寸陷中動脈應手舉臂取之是穴足太隂脈氣所發治嘔逆右其穴冝針灸七分灸五壯若深令人氣逆治假令變證胃反候針灸中脘穴法中脘一穴在太倉是胃之幕在上脘下一寸是穴手太陽少陽足陽明所主任脈之會主治心匿不能食反胃右其穴冝針八分留七呼㵼五吸疾出針灸亦良日灸二七壯至四百壯止忌豬魚生冷酒麵毒食生菜醋滑等物謹對第二道問假令頭面風候目即節氣當得何脈本因是何臟腑受病發何形候即今冝用是何腧穴針灸設有變動又當隨脈如何治療各須引本經為證仍具銅人腧穴針經隨輕重脈屬經絡用針分寸補㵼之法并灸壯數處穴為對對陽經上行既走於頭面之部腠理外弱必受於風陽之邪蓋頭為諸陽之會面乃至陽之宗因形體而虧虗致風邪而入客風則喜傷於陽經上則先受於風氣其狀也惡風多汗本陽氣之偏虗其候也精明作痛由邪正之相搏此所以謂之頭面風矣目即時當春令序屆發陳應陽氣之漸升在物彚之始育脈見寬虗之形診兼軟弱之象斯為順時之弦脈矣今反診得寸口之脈而隂陽互見關前之部而表裏相乘乃為頭面風之脈矣經曰診其脈寸口隂陽表裏互相乘如風在首有因運動勞役有因新沐未乾陽氣發泄腠理空踈致陽經之受風使頭面之為病其狀則多汗惡風甚則頭痛者是也巢氏曰頭靣風者是體虗諸陽經脈為風所乘也諸陽經脈上走於頭面運動勞役陽氣發泄腠理開而受風謂之首風病狀頭面多汗惡風病甚則頭痛又新沐中風則為首風者也詳其病而尚淺受於邪而未深冝針灸上星之穴使風邪而散釋致頭面而病愈斯為針灸之效也設若縱意違師隱忍冀差邪入腦户之間病引目系之內故腦轉而目系以急目急而運冒以生則知病變為風頭運矣巢氏曰風頭運者由血氣虗風邪入腦而引目系故也五臟六腑之精氣皆上注於目血氣與脈并上系上屬於腦後出於項中逢身之虗則為風邪所傷入腦則腦轉而目系急故成運也復切其脈洪大而兼長者乃為應病之診也經曰診其脈洪大而長者風運再詳其證邪氣入腦病勢已深針灸上星而不及故當刺其承光之穴去其在腦之邪愈其作運之證斯為針刺之功矣謹按銅人腧穴針法脈屬經絡用針分寸補㵼之法并灸壯數處穴附之於右治假令頭面風候針灸上星穴法上星一穴在額顱上直鼻中央入髮際一寸陷容豆是穴督脈氣所發主療頭風右其穴冝針入一分留十呼㵼五吸針下氣盡更停針引之得氣即㵼灸亦得然不及針日灸三壯不冝多也治假令變證風頭運候針承光穴法承光二穴在五處後二寸是穴足太陽脈氣所發主風頭運痛右其穴冝針入三分不可灸謹對運氣一道問癸丑年五運六氣所宜處方為對對一元未判隂陽無自而可明兩儀既分清濁從兹而可見清陽辟上而為天故天則布於六氣濁隂辟下而為地故地則列於五行一上一下至神宰制於中一尊一卑五運回薄於內運則有五隨其化而統於年氣則有六因其嵗而紀其步分司天在泉之殊别左右間氣之異至於有乖有和或過或減推嵗運而攸分究年辰而區别平和則物阜民康乖異則物衰民病要在先立其年以明其氣爾今觀癸丑之年上見太隂濕土司天中行少徴火運下臨太陽寒水在泉是嵗也火運統嵗運行隂干謂之不及之年命曰伏明之紀是謂勝長長氣不宣藏氣反布收氣自政化令乃衡寒清數舉暑令乃薄承化物生生而不長成實而稚遇化已老陽氣屈伏蟄蟲早藏其氣鬱其用暴其動彰伏變易其發痛其臟心其病昏惑悲忘詳此之嵗應少徴而平和處之冝用平和之藥治其一嵗之過愆也天氣運動而不息則為之客地氣應靜而守位則為之主左右間氣以顯於其間上下加臨以布於其內且初之氣自先嵗大寒至當嵗春分前六十日有竒上見厥隂風木為之客下臨木位為之主地氣遷寒乃去春氣正風乃來生有萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘強關節不利身重筋痿冝用辛涼之藥治其氣之過爾二之氣自春分至小滿六十日有竒上見少隂君火為之客下臨火位為之主大火正物承化民乃和其病溫厲盛行逺近咸若濕薰相摶雨乃時降冝用鹹寒之藥治其氣之過爾三之氣自小滿至大暑六十日有竒上見太隂濕土為之客下臨火位為之主天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿冝用苦熱之藥治其氣之過爾四之氣自大暑至秋分六十日有竒上見少陽相火為之客下臨土位為之主畏火臨溽薰化地氣騰天氣否隔寒風曉暮薰熱相薄草木凝煙濕化不下流則白露隂布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫冝用鹹冷之藥治其氣之過爾五之氣自秋分至小雪六十日有竒上見陽明燥金為之客下臨金位為之主燥令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠冝用苦溫之藥治其氣之過爾終之氣自小雪至大寒六十日有竒上見太陽寒水為之客下臨水位為之主寒大舉濕大化霜乃積隂乃凝水堅氷陽光不冶感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也冝用甘熱之藥治其氣之過爾由是必折其鬱氣而取化源使暴過不生苛疾不起治六運之藥已布於前調一嵗之方今附於後治癸丑年五運六氣正一輔二竒方人參湯人參為正味甘微寒微溫無毒生上黨山谷及遼東茯苓為之使惡溲蔬反藜蘆去蘆頭用一兩銼术為輔味苦甘溫無毒生鄭山山谷漢中南鄭防風地榆為之使用半兩銼甘草為輔味甘平無毒生河西山谷積沙山及上郡术乾漆苦參為之使惡逺志反大戟芫花甘遂海藻微炙用半兩銼右三味㕮咀每服三錢水一􅊦半煎至七分去柤通口服不拘時候謹對
