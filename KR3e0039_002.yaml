body:
  text: 太醫局諸科程文格卷二墨義第一道問太陽之政奈何對欲通天之紀從地之理和其運調其化使上下合得無相奪倫天地升降不失其宜五運宣行勿乖其政調之正味從逆奈何歧伯曰昭乎哉問也此天地之綱紀變化之淵源非聖帝孰能窮其至理歟臣雖不敏請陳其道令終不滅久而不易帝曰願夫子推而次之從其類序分其部主别其宗司昭其氣數明其正化可得聞乎歧伯曰先立其年以明其氣金木水火土運行之數寒暑燥濕風火臨御之化則天道可見民氣可調隂陽卷舒近而無惑數之可數者請遂言之帝曰太陽之政奈何謹對第二道問一本云衝對三十一難曰三焦者何稟何生何始何終其治常在何許可曉以不然三焦者水榖之道路氣之所終始也上焦者在心下下膈在胃上口主內而不出其治在膻中玉堂下一寸六分直兩乳間陷者是中焦者在胃中脘不上不下主腐熟水榖其治在臍傍下焦者在臍下當膀胱上口主分别清濁主出而不內以傳導也其治在臍下一寸故名曰三焦其府在氣街一本云衝謹對第三道問葉名蒚麻對白芷味辛溫無毒主女人漏下赤白血閉隂腫寒熱頭風侵目淚出長肌膚潤澤可作膏藥面脂潤顔色一名芳香一名白芷一名䖀一名元一名符離一名澤芬葉名蒚麻可作浴湯生河東川谷下澤二月八月採根曝乾當歸為之使惡旋覆花謹對脉義第一道問脉有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝絃此自經常不失銖分對榮衛通行於三部合時令而衡銓不差臟脉各顯於一形應平和而銖分不失蓋脉本無異自關界而定尺寸之名診不自彰依血氣而為流行之用氣脉應期也譬衡銓而合度時診相參也無過減而有倫以至腎沉心洪之脉王冬夏而自經常肺浮肝絃之診王秋春而夲平治脉隨臟異無緇銖之差時與脉期無毫釐之失然則三部者脉之位榮衛者脉之源五臟者脉之主故動應參合是為經常不失之脉矣經曰脉有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝絃此自經常不失銖分大意如此且夫脉各有位則不可以一概而求診各有形則不可以一途而取明於脉者必有以定其部分之位善於診者斯有以較其脉象之形定於脉之部也既當以究其脉之源較於脉之形也尤當以合其時之應由是持診之士既能詳陳於經脉之要以之察病則斷無遺功矣今也人法三才形分三部在於脉則亦有部分之殊揣其關則可分尺寸之異部既定而脉不能以自動位既分而診不能以自行其動者孰為之動本榮血之周流其行者孰為之行由衛氣之運動脉隨時動而脉之可凖也若衡而若銓診逐時遷而脉之可期也有經而有常大率腎王冬而萬物歸根故在脉者有沉潜之象心王夏而品彚蕃秀故在診者有洪大之形天氣通肺故秋則天高而脉見於輕浮之象木性合肝故春則木達而診應於微絃之體察臟脉之應見自經常而無銖分之差較時脉之形容惟平治而無毫釐之失是知脉無定體因其血氣而不忒臟有常形即其時序而可驗矣何以言之經曰三部者寸關尺也又曰榮行脉中衛行脉外又曰脉者血之府又曰冬脉如營又曰立夏得洪大脉是其本位又曰秋脉如毛又曰肝者東方木萬物始生氣來軟而弱寬而虛故脉為弦以此推之經者有常之脉故必先知經脉而然後知病脉矣謹對第二道問脉滑曰病風又云滑者傷熱一脉二病者何對論滑脉之一體即至數相參而有殊究病證之兩端分風熱為患而必異蓋滑則應於流利脉乃本於陽邪一呼三動而一吸三動也應滑脉則病於風一呼四至而一吸四至也彰滑診則傷於熱以滑為風也故脉至則過於平人以滑為熱也故診應則倍于常數即風比熱故風為陽而輕於熱即熱較風故熱亦陽而甚於風雖二證俱見於滑脉故當參其至數而别焉經曰脉滑曰病風又云滑者傷熱一脉二病者何其義如此抑嘗求其審脉之要矣蓋切脉有法雖以舉按而察其形容持診之機必以呼吸而紀其至數兩者參合故無疑似之差二者兼明安有毫釐之失且滑本流利之一脉病分風熱之兩端概而言之雖脉象之一體細而推之實動應之兩塗何哉風性善行感於風而滑脉必見熱性淖溢傷於熱而滑脉遂彰以滑脉而皆陽也推至數而别於多寡以風熱而皆陽也參性用而分於輕重風輕於熱故風脉之滑也呼吸各三動而尺不熱熱重於風故熱脉之滑也呼吸各四至而病欲甚儻但求於滑脉之形不别於動應之數則未免以風為熱而方治永乖以熱為風而危殆立至矣何以明之內經曰人一呼脉三動一吸脉三動而躁尺熱曰病溫尺不熱脉滑曰病風又難經曰一呼四至一吸四至病欲甚脉洪大者苦煩滿沉細者腹中痛滑者傷熱又云滑者陽也又脉經曰滑脉往來前却流利展轉替替然與數相似即是觀之滑脉則一為病則二茍非至數而别則何自而别哉謹對又大義第一道問寒暑燥濕風火在人合之奈何其於萬物何以生化對論六氣之在人既欲以明其參符之理究六氣之在物尤當以審其生化之源蓋均是氣也則神妙貫於三才無所不存均是形也則氣用寓於萬物無所不在察其氣之所布故始則自乎天即其人之所合故用則參乎氣以人驗天既有符合之自然以氣在物亦有生化之常道如風氣通肝之類莫非在人之所合如風木生酸之屬豈非在物之所化肝與木合即同氣之相感酸本木化亦同氣之相求是知六氣周流而靡所不至故人氣從之而萬物由之也經曰寒暑燥濕風火在人合之奈何其於萬物何以生化其意若此原夫天陽積氣以昭乎上地隂積形以位乎下氣形相感則羣品各得稟其和上下交通則人物各得抱其氣所以善言天者必以人而驗善言氣者必以物而彰且天為陽而化氣故六氣之用則自乎天而布於宇宙之間地為隂而成形故五行之用則本乎氣而散於橐籥之內風寒者木水之氣故風寒在下而必應於人燥熱者金火之化故燥熱在上而亦合於體至于濕氣居中與人氣之相應相火逰布與人氣之相參人之所生者固有以合乎此物之所化者亦豈有以外乎此哉今夫風寒在下則合於人之腎肝故風合肝而寒合腎矣燥熱在上則應於人之心肺故燥應肺而熱應心矣中州者脾之臟與混氣相符而在中三焦者氣之源與相火相參而遊布氣之在人既有吻合之異氣之在物亦有生化之殊風則生木而化酸是曰曲直作酸矣熱則生火而化苦是曰炎上作苦矣金本燥而生辛莫非從革之所作水本寒而化鹹豈非潤下之所生濕化乎土故土有稼穡之名土生於甘故甘為稼穡之用在於人身也無一不與氣之所符形於萬物也無一不稟氣之所化總而論之凡拘於形者未嘗不合於氣之用泛而言之凡囿於物者未嘗不賴於氣之和夫如是人鍾五行之秀物稟五行而生故不能有外於六氣之用矣考之於經有曰在天為氣在地成形形氣相感而萬物化生矣又曰寒暑燥濕風火天之隂陽也三隂三陽上奉之又曰氣交之分人氣從之萬物由之又曰風寒在下燥熱在上濕氣在中火遊行其間又曰善言天者必有驗於人又曰善言氣者必有彰於物即此言之至神變化貫三才而無所不有矣謹對第二道問風者百病之長也至其變化乃為他病對風本百病之先其用則善行而無定邪流諸經之內為病則變化而不常蓋神本妙用而難明風即神化而莫測其邪易中故作病也有為先為長之稱其用無方故生疾也有或變或化之用茍客於脉而不去則變為癘風之屬儻傷於表而入傳則變為腸風之類以數變而不可勝窮為他病而不可勝極夫何故風無常方而靡所不在性本務動而無所不有斯為百病之先變他證而不同矣經曰風者百病之長也至其變化乃為他病大義如此原夫論病而不論邪與不論等察邪而不察變與不察同惟能觀邪變之因故能明病勢之理今也風本無體因陽氣之使然用本無迹賴神化之所致逢虛入凑也先百病而乃有投間易容也長衆疾而為最至其邪數變而數化故其病異種而異端脉風不已因變而癘風以成外邪不除因傳而腸風以作或在於外而為寒熱或舍於裏而傳於臟腑以至風雜寒濕為諸痺之不一風兼寒邪為諸瘧之不同以風與濕之俱傷故為風濕之病以風與熱之並客故為風溫之名自風邪之變化為他病之形狀者何故哉風無常定之方則其用之莫測風本八方之氣則其性之不常用之難測故作病而為先性之不常故傳化而乃異然則風氣飄揚而無所不有故變病而弗能拘矣以經證之脉風成為癘又云風寒客於脉而不去名曰癘風又云風成為寒熱又云風寒濕三氣雜至合而為痺又曰瘧者風寒之氣不常也又曰風者百病之始也又曰風是四時之氣分布八方由是推之風非一定之邪故有如斯之變矣謹對第三道問與道合同對與道為一謂之合與道無間謂之同蓋道本難名也惟能合之則極渾融於難名之中道本無形也惟能同之則妙運用於無形之表故道其可道而有非常之道故人非常人而乃至真之人然則與道合同者實無心於合同而自然合同也經曰與道合同其意若此夫用智以求道則道愈昧而不明有心於求道則道愈逺而莫見惟真人也非求以合之而不期合而自合非求以同之而不期同而自同斂此道於毫芒之細而未嘗有餘散此道於宇宙之間而未嘗不足恍兮惚兮又孰知道之非我而我之非道杳兮冥兮亦不知身之在道而道之在身隱見莫測契於至理而不可名出入無間齊於妙用而不可喻提挈天地則妙天地不言之化把握隂陽則極隂陽不測之神以吾道為有則本虛而本無以吾道為無則隨寓而隨有達地通天而了無餘物自頂至踵而無非此真由是觀之則道之外豈復有所謂真人者乎亦强名之曰道可也下文曰惟真人也又王氏曰真人之身隱見莫測出入天地內外順道至真以生又上古天真論曰提挈天地把握隂陽以是數者言之則真人豈非與道合同者乎謹對假令論方義一道問假令仲景傷寒論云太陽病下之其脉促不結胸者此為欲解也脉浮者必結胸脉緊者必咽痛脉弦者必兩脅拘急脉細數者頭痛未止脉沉緊者必欲嘔脉沉滑者挾熱利脉浮滑者必下血竊詳治傷寒之法汗下之後其脉靜者為病已解今云太陽病下之後其脉促者此為欲解復有太陽桂枝一證醫反下之脉促者表未解也兩證俱屬太陽皆言下後脉促一云欲解一云未解理何如哉又本經云陽盛則促此皆病脉也大抵促非平脉今云欲解者必有說焉餘者七脉皆為下後之病脉獨以促脉為欲解者未審立法之意何如請陳其論對促脉內見明因下反下之源表證外存别欲解未解之候蓋太陽為病形表受邪因攻下而表證未除致裏虛而外邪遂入脉促而無結胸者知陽盛勝隂而欲解脉促而兼下利者知陽盛表邪之尚存一則無裏證而言一則兼裏證而論不可一概而推之也今觀前問假令仲景傷寒論云太陽病下之其脉促不結胸者此為欲解也脉浮者必結胸脉緊者必咽痛脉弦者必兩脅拘急脉細數者頭痛未止脉沉者必欲嘔脉沉滑者挾熱利脉浮滑者必下血竊詳治傷寒之法汗下之後其脉靜者為病已解今云太陽病下之後其脉促者此為欲解復有太陽桂枝一證醫反下之脉促者表未解也兩證俱屬太陽皆言下後脉促一云欲解一云未解理何如哉又本經曰陽盛則促此皆病脉也大抵促非平脉今云欲解者必有說焉餘者七脉皆為下後之病脉獨以促脉為欲解者未審立法之意何如請陳其論嘗謂百病之急傷寒是先施治合宜者猶有他證之增汗下乖理者誠有諸證之變雖脉候相同乎一診然本源則究乎兩端何哉邪傷形體之表病先太陽之經用藥不散其外邪攻下反虛其裏氣雖陽氣偏盛見促脉而相似然表裏有證分解利而不同且如太陽病下後脉促不結胸為欲解者蓋陽氣太盛促脉遂彰無結胸鞕痛之乖因陽氣勝隂之致所以為欲解者以陽盛勝隂不作結胸而解也又如太陽桂枝證反下之而脉促為未解者蓋風邪外中於形表解肌當行於桂枝反施攻下之方復見促脉之診裏氣既虛致下利之不止促脉既見知表邪之尚隆所以為病未解者以陽盛裏虛復兼下利之證也由是推之前證脉促為欲解以其裏虛邪入當作結胸今不結胸者以其無證候而知也後證脉促為未解以其表邪尚盛下利不止今反脉促者以其有證而明也又况下後七脉病匪一端脉浮者邪結上焦必為結胸脉緊者邪傳少隂必為咽痛弦脉內彰太陽傳少陽之分少陽受病兩脅有拘急之形細數者邪未傳裏故有頭痛沉緊者胃實上攻故為欲嘔沉滑者血勝氣虛必挾熱而下利浮滑者氣虛血勝必下血而無時是皆下後之未解各隨脉候而病生以是而知不結胸而欲解者無裏證也利不止而未解者有裏證也一則陽盛而勝於裏隂一則陽盛而帶於裏證故前證獨以促脉為欲解以無結胸而論也所以本注云太陽病下之後脉促胸滿者桂枝去芍藥湯主之審乎此則不結胸者為欲解明矣又注曰促為陽勝雖下利而脉促者知表未解也是知陽勝反下其證則一陽盛脉促其診復同有裏證則未痊無裏證則向解學者當深察而明辨之謹對假令法第一道問假令風經五臟恍惚候目即節氣當得何脉本因是何臟腑受病發何形候即今宜用是何方藥調理設有變動又當隨脉如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對臟氣不足致風邪之所經神氣不安斯恍惚而為候蓋臟守於中氣行於外臟實則外氣亦實故邪莫能傷臟虛則外氣亦虛故風乃從入使肝心脾肺腎之受邪致魂神意魄志之為病風經於臟而臟無所安故恍恍惚惚之無定邪干於神而神乖所守故昏昏憒憒之不寧此皆風經於五臟故為恍惚之候也目即春陽應至氣序發陳天地由是而氤氲肝木於茲而適王脉應微弦乃肝經應時之平脉也經曰春脉如弦是也今則不然切之於脉陽部彰緊急之形持之於診隂部應徐緩之象即脉求病故知風邪入經於五臟之間矣經曰隂緩陽急者表有風來入臟也本因臟氣虛衰外經不足風邪既得以侵凌神藏乃為於變病其狀怔怔忪忪而不能以自安恍恍惚惚而不能以自已者是其候也何則巢氏曰五臟處於內而氣行於外臟氣實者邪不能傷虛則外氣不足風邪乘之然五臟心為神肝為魂肺為魄脾為意腎為志若風氣經之是邪干於正故令恍惚詳此之證邪氣雖干於五臟病勢未顯於至危用竒方則猶可為效也宜用正一輔二竒方茯神湯以茯神一味為主病之正以防風逺志二味為佐正之輔三味合而服之使風邪却散神氣安寧臟得鎮守之和神無泪亂之候者是其藥之效也設若縱意違師忽於微而不療信巫拘鬼自於淺而及深邪氣日益五臟有虛衰之理病勢愈甚神氣有蕩散之愆始則恍惚而無所定今則奄忽而不知人喉中噫然而有聲舌本强硬而不語者則知病變為風癔之候也復診其脉既浮而且遲者是脉病之相應也經曰浮則為風又曰遲者臟也又巢氏曰風邪之氣若先中於隂病發於五臟者其狀奄忽不知人喉裏噫噫然有聲舌强不能言再詳此證邪氣甚於前時病勢重於往日用竒方而弗及施偶製而可效經曰竒之不去則偶之宜用正二輔四偶方附子獨活湯以附子獨活二味為正以防風桂枝乾薑甘草四味為輔六味合而服之使風邪散釋五臟安平精神俱治而無昏塞之證舌本運用無强急之形故風癔之侯必獲愈矣大抵病有輕重方有竒偶輕則治宜於竒重則療宜以偶此繩然之不可紊也謹按本草逐藥主療及修製之法處竒偶二方列之於後治假令風經五臟恍惚候正一輔二竒方茯神湯茯神為正味甘平療風止驚悸安魂魄養精神生泰山山谷丈松下馬藺為之使惡白斂畏牡䝉地榆雄黃秦艽龜甲去膜用一兩銼防風為輔味甘辛溫無毒主風邪生沙苑川澤及邯鄲琅琊上蔡惡乾薑藜蘆白蘞芫花去義枝用半兩逺志為輔味苦溫無毒主定心氣止驚悸生泰山及寃朐川谷畏真珠藜蘆蜚蠊文蛤去心用半兩甘草水煮焙乾右三味㕮咀每服三錢水一盞半煎至八分去柤溫服不拘時候治假令變證風癔候正二輔四偶方附子獨活湯附子為正味辛甘溫大熱有大毒主風寒生犍為山谷及廣漢地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參烏韭炮製去皮臍用二兩獨活為正味辛甘平微溫無毒主風寒所擊生雍州川谷或隴西南安豚實為之使用二兩防風為輔味甘辛溫無毒主風邪生沙苑川澤及邯鄲琅琊上蔡惡乾薑藜蘆白斂芫花去義枝用一兩桂枝為輔味辛甘大熱有小毒利肝肺氣宣導百藥無所畏生桂陽去粗皮用一兩乾薑為輔味辛溫大熱無毒逐風邪生犍為川谷及荆州揚州秦椒為之使惡黃連黃芩天鼠糞炮微裂用一兩甘草為輔味甘平無毒主五臟六腑寒熱邪氣生河西川谷積砂山及上郡术乾漆苦參為之使惡逺志反大㦸芫花甘遂海藻微炙用一兩右六味㕮咀每服五錢水二盞煎至一盞去柤溫服不拘時候謹對第二道問假令賊風候目即節氣當得何脉本因是何臟腑受病發何形候即今宜用是何方藥調理設有變動又當隨脉如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對風不從鄉是為竊害之邪人感作疾斯為賊風之候蓋時當冬至風忽南來邪有為虛之名風有急疾之勢非時而至故能殘害於冲和非鄉而來必至賊傷於正氣其傷人也但痛而不可按抑其害體也因痛而不能運用內則骨解而作痛外則身冷而欲尉此則賊風故使然矣目即春首發陳之時弦者平和之脉經曰春胃微弦曰平今也不然切之於脉反彰浮大之形持之於診復兼緊急之象經曰浮則為風又曰大則邪至又曰緊則為痛又曰緊則為寒本因冬至之日受南方虛風疾證之形在骨節而冷痛故其狀骨痛而身冷者是其候也何則巢氏曰賊風者謂冬至之日有疾風從南方來名曰虛風此風至能傷害於人故言賊風也其傷人也但痛不可得按抑不可得轉動痛處體卒無熱傷風冷則骨解深痛按之乃應骨痛也但覺身內索索冷欲得熱物尉痛處即小寬時有汗詳此之證邪雖在骨而疼痛體卒無熱而喜溫病勢未重竒方可行經曰君一臣二竒之制也宜用正一輔二竒方獨活湯以獨活一味為主病之正以附子乾薑二味為佐正之輔三味合而服之使風冷外除骨痛內已身體向溫而轉動自和者是其愈也設若醫士執方而無權病者縱意而勿藥致邪氣內盛而傳變不常熱氣復傷而相搏不已加之濕冷並襲風熱交擊始則疼痛而在骨今則附骨而成疽皮肉微急而洪腫如肥痺痛不隨而支節難動則知病變為附骨疽矣復診其脉弦洪相薄者此其應病之診也經曰診其脉弦洪相薄外急內熱欲發癰疽巢氏曰遇風熱氣相搏乃變附骨疽也又曰附骨疽者由當風入骨解風與熱相搏復遇冷濕或秋夏露卧為冷所折風熱復結壅遏附骨成疽再詳此證榮血壅潰而為膿疽瘡附骨而為痛邪氣留連病勢深重非竒方之可用必偶製而治之也經曰君二臣四偶之制也宜用正二輔四偶方木香連翹湯以木香連翹二味為正以黃耆芍藥防風甘草四味為輔六味合而服之俾血氣流行癰膿潰𣪚者是其藥之效矣吁病有輕而有重方有竒而有偶故輕則治之以竒方則不至失之於太過重則治以偶方則不至失之於不及要在審其病而施其藥則世無不愈之患謹按本草逐藥主療及修製之法處竒偶二方列之於後治假令賊風候正一輔二竒方獨活湯獨活為正味辛甘平微溫無毒療諸賊風百節痛生雍州川谷或隴西南安豚實為之使用一兩附子為輔味辛甘溫大熱有大毒主風寒生犍為山谷及廣漢地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參烏韭炮裂去皮臍用半兩乾薑為輔味辛溫大熱無毒主風邪生犍為川谷及荆州揚州秦椒為之使惡黃連黃芩天鼠糞炮用半兩右三味㕮咀每服三錢水一盞半煎至八分去柤溫服不拘時候治假令變證附骨疽候正二輔四偶方木香連翹湯木香為正味辛溫無毒主邪氣行藥之精生永昌山谷用二兩連翹為正味甘平無毒主癰惡瘡生泰山山谷用二兩黃耆為輔味甘微溫無毒主癰疽生川郡山谷白水漢中惡龜甲去蘆頭用一兩芍藥為輔味苦酸平微寒有小毒主邪氣順血脉生中嶽川谷及邱陵須元為之使用一兩防風為輔味甘平溫無毒主風行周身骨節疼痛生沙苑川澤及邯鄲琅琊上蔡惡乾薑藜蘆白斂芫花去義枝用一兩甘草為輔味甘平無毒主寒熱邪氣生河西川谷積砂山及上郡术乾漆苦參為之使惡逺志及大㦸芫花甘遂海藻微炙用一兩右六味㕮咀每服五錢水二盞煎至一盞去柤溫服不拘時候謹對運氣一道問乙丑年五運六氣所在所宜處方為對對太極初判開五運以更遷升降才分列六氣而為紀清濁既分於天地嵗運皆稟於隂陽過減相因迎隨相繼是以陽年太過法陽道之常饒隂年不及配隂道之常乏即上下加臨之相參别天符嵗㑹之有異考之者必究於年辰驗之者必推於支干其平也民物有康阜之祥其變也民物有衰病之眚自非先聖更相問難則運氣之奧何自而明哉經曰先立其年以明其氣者正謂是歟今觀乙丑之年上見太隂濕土司天中行少商金運下臨太陽寒水在泉是嵗也金運統嵗運行隂干謂之不及之年命曰從革之紀是謂折收收氣乃後生氣乃揚長化合德火政乃宣庶類以蕃其氣揚其用躁切其動鏗禁瞀厥其臟肺其病嚏咳鼽衄詳此之嵗乃同寒者以熱化宜用溫熱之藥治其一嵗之過愆夫天氣運動而不息則為之客地氣應靜而守位故為之主左右間氣以顯於中上下加臨以布於內且初之氣自甲子嵗大寒後至乙丑嵗春分六十日有奇上見厥隂風木為之客下臨木位為之主地氣遷寒乃去春氣正風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢筋絡拘强關節不利身重筋痿宜用辛凉之藥治其氣之過耳二之氣自春分至小滿六十日有竒上見少隂君火為之客下臨火位為之主大火正物承化民乃和其病溫厲盛行逺近咸若濕薰相薄雨乃時降宜用鹹寒之藥治其氣之過耳三之氣自小滿至大暑六十日有竒上見太隂濕土為之客下臨火位為之主天政布濕氣降地氣騰雨乃時降寒乃隨之感於寒濕則民病身重胕腫胸腹滿宜用苦熱之藥治其氣之過耳四之氣自大暑至秋分六十日有竒上見少陽相火為之客下臨土位為之主畏火臨鬱薰化地氣騰天氣否隔寒風曉暮薰熱相薄草木凝烟濕化不流則白露隂布以成秋令民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫宜用鹹冷之藥治其氣之過耳五之氣自秋分至小雪六十日有竒上見陽明燥金為之客下臨金位為之主慘令已行寒露下霜乃早降草木黃落寒氣及體君子周密民病皮腠宜用苦溫之藥治其氣之過耳終之氣自小雪至大寒六十日有竒上見太陽寒水為之客下臨水位為之主寒大舉濕大化霜乃積隂乃凝水堅氷陽光不冶感於寒則病人關節禁固腰脽痛寒濕持於氣交而為疾也宜用甘熱之藥治其氣之過耳由是必折其鬱氣而取化源使暴過不生苛疾不起治六氣之藥已布於前調一嵗之方今附於後治乙丑年五運六氣正一輔二竒方附子湯附子為正味辛甘溫大熱有大毒生犍為山谷及廣漢地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參烏韭炮裂去皮臍用一兩术為輔味平甘溫無毒生鄭山山谷漢中南鄭防風地榆為之使用半兩乾薑為輔味辛溫大熱無毒生犍為川谷及荆州揚州秦椒為之使惡黃連黃芩天鼠糞炮用半兩右三味㕮咀每服三錢水一盞半煎至八分去柤溫服不拘時候謹對
