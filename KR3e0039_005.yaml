body:
  text: 太醫局諸科程文格卷五大義第一道問清陽發腠理濁隂走五臟清陽實四肢濁隂歸六腑對外發腠理者輕清之陽充滿而實於四肢内走五臟者重濁之隂傳化而歸於六腑葢人身於天地同為一理臟腑稟隂陽合為一致天為陽而主外腠理四肢而清陽所宗地為隂而主内五臟六腑而濁隂所入發腠理而實四肢者莫非陽氣之外達走五臟而歸六腑者必假隂氣之内傳以其凡屬乎表而謂之陽故陽行於表凡屬乎裏而謂之隂故隂歸於裏然則陽性清而隂性濁陽務外而隂務内故二氣各從其類矣經曰清陽發腠理濁隂走五臟清陽實四肢濁隂歸六腑厥意如斯嘗謂清陽為天天何陽之所積濁隂為地地何隂之所凝以天為陽而論其陽之所積以地為隂而論其隂之所凝孰不思人身與兩儀流通形體與二氣參應陽屬乎表而隂屬乎裏外為陽而有輕清之性内為隂而有重濁之體豈非法象之自然歟今夫陽法天氣也而主外隂法地氣也而主内葢腠理四肢設乎外清陽同氣以相求五臟六腑處於中濁隂同聲而相應陽固從外能發腠理而實於四肢隂固處内能走五臓而歸於六腑發為散發之功實乃充實之道走者入行於其間歸謂經從於其裏何哉腠理為滲泄之門因清陽之散發故司於開闔五臟謂包藏之所因濁隂之入走故司於鎮守四肢則本於諸陽非陽氣充實無以見履攝之用六腑則為於倉廩非隂氣歸從何以明傳化之常合而言之陽氣衞固於表而旁達於四肢總而論之隂氣滋充於臟而流傳於倉廪二氣無偏則隂平陽祕而虛邪莫入兩者俱治則外充内養而諸疾不生茍或陽氣一虧故外不足以固膚腠旁不足以運四肢隂氣一弱故内不足以養神宫中不足以充六腑是知人之有生不離於隂陽氣之為用各從於内外氣之所歸故平則為和而偏則為疾矣何以明之王氏註曰腠理為滲泄之門故清陽可以散發五臟為包藏之所故濁隂可以走入又曰四肢外動故清陽實之六腑内化故濁隂歸之本經亦曰陽者天氣也主外隂者地氣也主内又曰清陽為天濁隂為地以是而參之天地之大不越於隂陽人身之微豈外隂陽者哉謹對第二道問其寒盛者則腫結痛深對寒盛客乆故為緩疽之病腫結遺遲斯作深痛之愆葢經絡感受於寒邪血氣疑澀於形體因隂寒之獨勝致榮衞之弗通且隂行至緩也為疽有徐緩之名腫毒漸深也作痛有深沉之候初則紫黯於皮膚乆則青黑於肌肉大者如拳小者如李留連嵗月而血肉始潰淹延日乆而疾勢方危非一朝一夕之腐壞成膿故其疽乃名緩矣巢氏曰其寒盛者則腫結痛深其意若此嘗謂榮者血也故絡主血而濡養周身衞者氣也故經行氣而周流四體得熱則淖溢而為病受寒則凝濇而為病今也寒客經絡之間邪摶血氣之分絡血故因是而稽留經氣故於斯而凝澀因榮衛之既壅致緩疽之乃成儻寒氣偏盛也故寒主收而腫必結隂邪濁隆也故隂主裏而痛必深腫因寒氣之使然痛亦寒氣之所致其腫周囘則上無頭而下無尾其疽無定則小如李而大如拳是皆寒盛則不能化熱熱少則未便成膿積日不潰而色變紫黯爛如牛領之形經嵗弗已而色變微青疽有膿成之兆其腫則悠乆而方潰應其隂之行緩其候則積漸而必危法其隂而主殺甚者一嵗而始傾輕者數年而弗愈此古人所以名緩疽者以其寒多隂盛腫結痛深血肉潰遲之故也上文所謂緩疽者由寒氣客於經絡致榮衛凝澀氣血壅結所成繼之曰其寒盛者則腫結痛深下文曰周囘無頭尾大者如拳小者如李外與皮肉相親著熱氣少其腫與肉相似不甚赤積日不潰乆乃變紫黯色皮肉俱爛如牛領形吁善養生者則經絡内調邪氣外却又何有癰疽之患乎謹對又大義第一道問地之濕氣感則害皮肉筋脉對地濕感受致血榮氣衛之不行邪正稽留使皮肉筋脉之有害葢地本積隂所成濕乃至隂所化處汚下則地氣薫騰而必甚居卑濕則隂邪濡溽而亦隆儻或保養無節因虛而感於是氣攝治乖宜乘隙而受於斯邪壅遏榮衛故皮肉失溫充而受其害稽留氣血故筋脉違灌溉而致其傷是皆濕邪流著於形體之中血氣弗榮於一身之故也經曰地之濕氣感則害皮肉筋脉其意如此嘗謂人之生也陶六氣之和而過則成疹體之立也稟五行之秀而虛則致疾分風寒暑濕之殊害形體臟腑之異今也兩儀之間在地則生於濕邪五行之内在濕則本於土化或熏騰於山澤之間或鬰發扵卑汙之處以至時雨霑濡氣候鬰溽形在氣中本無自以傷侵人或真虛遂因隙而感受氣衛於形感濕邪則氣必留滯血榮於體受薫氣而血必凝泣俾皮肉或失於灌溉使筋脉或乖於滋充其邪也雖摶於榮衛而實害於皮膚百脉之間其濕也雖凝於血氣而本傷於肌肉諸筋之分疾之所見或痺而或痿病之所生或攣而或縱大率痺之有五也不逃於肝心脾肺之合痿之有五也豈越乎肌肉筋脉之分因地濕而為邪本體虚而受病則善衛生之士謹於保養故渉履而無虞明於調攝雖濕邪而莫害也啟元子曰濕氣勝則榮衛之氣不行故害於皮肉筋脉内中央生濕又聖濟經曰寒濕之類隂化氣也巢氏云濕者水濕之薫氣也即此觀之邪之所感而有異疾之所作亦不同矣謹對第二道問血實宜决之氣虛宜掣引之對血之盛實决破以平其有餘氣之虧虛掣引則復其不足且經絡壅滯使榮血之不宣臟腑乖和致衛氣之不利血之實也不能流通壅遏於經絡之間氣之虛也不能循環失充於形表之分决之則削其有餘血脉宣通故實者自散掣引則扶其不足真氣條暢故虛者漸復於以知金鍼砭石用之有開决之功熊經鳥伸行之為導引之法矣經曰血實宜决之氣虛宜掣引之其意若此嘗謂井非穿而泉不通水非流而源不達泉不自通其通者必藉於穿鑿之力源不自達其達者本得於疎通之道矧夫血之實者豈不宜於破决氣之虛者何不行於掣引今榮者血也以行乎脉中衛者氣也而行乎脉外血主濡之諸經藉此以滋育氣主煦之百骸假是而溫充或寒熱之邪而結於血故有壅塞之愆或勞傷太過而損其氣迺見虧虛之證血實則不能宣通欲其通者以决破而實自平氣虛則不能條暢欲其和者以掣引而虛自復或開之以金鍼或射之以砭石此所謂之决破也或象之於熊經或俲之以鳥伸此所謂之掣引也大抵破决之法取剛利刺挿以散其榮之聚掣引之機取屈伸呼吸而調其衛之失又况癰腫之類無非血實之使然故必藉之以開决之法虛勞之屬無非氣弱之所致故必資之以導引之術如是隨其宜而用之使血氣無偏而底於安平之道矣考之於經則曰夫癰氣之息者宜以鍼開除去之夫氣盛血聚者宜石而寫之又難經曰聚則腫熱砭射之也巢氏虛勞候所論導引外轉兩足十徧引去心腹諸勞王氏註曰决謂决破其血掣讀為導導引則氣行條暢由是證之為醫之士固當抑其有餘扶其不足又烏有實實虛虛之過哉謹對第三道問熱之所過則為膿也對熱之所積既有以至於過毒之所潰斯有以作其膿葢陽邪太勝熱氣内隆薫鬰於榮衛之間既結塞而不解焮發於形體之外故癰腫之由生經絡因是而不宣愈增壅熱肌肉自茲而乃壞積漸為膿然則癰瘍潰壞而作膿者未有不由乎邪熱之所過也經曰熱之所過則為膿也厥意存斯嘗聞夫一身之内頼榮血以滋充百骸之間藉胃氣而灌養其和也則周流而有常受邪也則壅滯而為病今也外熱侵傷則血壅而失其運布陽邪乘客則氣滯而乖於流通致經絡閉塞於中使癰腫焮發於外因血氣之不通故其熱轉甚積陽邪之不散故其熱益隆始則焮赤於皮膚次則潰壞於肌肉何哉熱過則邪氣薫爍邪熾則血肉腐爛所以血腐而膿已化肉爛而膿已成淺者應皮色而微黃深者或肉色而不變此皆熱邪之所過留結潰壞而為膿也何以證之經曰榮衛相干遇熱加之血氣壅積結聚成癰熱積不散血肉腐壞化而為膿正理論亦曰熱之所過則為癰腫巢氏於癰候言之若熱甚者則為膿斯可見矣謹對假令論方義一道問假令太平聖惠方治濕癬痒不可忍方用鯽魚一枚入硫黃末一分從魚口中送入腹内用淨塼一口安魚在上以炭火周逥熁令魚焦黃碾為細末入膩粉三錢麻油調塗之據本草鯽魚主諸瘡硫黃膩粉皆殺蟲之要藥也然後條又載治浸滛瘡多汁者亦用鯽魚一枚去骨取肉豉二百粒相和搗爛傅於瘡上及觀本草豉主傷寒頭痛寒熱瘴氣惡毒等證迺不治瘡而古人特用此物相和搗之以傅瘡上此何意也願倂陳之對瘡癬發於外固當施塗傅之方藥物有其殊尤當辨制用之理且濕痒之癬本皮膚受風濕之邪浸淫之瘡乃心經有風熱之氣窮其源也既所得之有異施於治也故立法而亦殊或用鯽魚而兼乎硫黃之屬以塗其癬或以鯽魚而和於豆豉之物以傅其瘡治癬之方著聖典而灼見其理療瘡之法考本草而實存其疑自匪通變之機未可得而論矣伏承明問假令太平聖惠方治濕癬痒不可忍方用鯽魚一枚入硫黃末一分從魚口中送入腹内用淨塼一口安魚在上以炭火周逥熁之令魚焦黃碾為細末入膩粉三錢麻油調塗之據本草鯽魚主諸瘡硫黃膩粉皆殺蟲之要藥也然後條又載治浸淫瘡多汁者亦用鯽魚一枚去骨取肉豉二百粒相和搗爛傅於瘡上及觀本草豉主傷寒頭痛寒熱瘴氣惡毒等證迺不治瘡而古人特用此物相和搗之以傅瘡上此何意也願併陳之大哉此聖人惠民之妙宜學者玩味之深愚雖不敏請為敷陳竊原物具一性則水陸所産者皆可以治病之需性具一理則藥劑成功者亦由乎制用之妙必也得病情之源明治體之奥雖腑臟寒熱之病猶可以除况皮膚瘡癬之疾豈不能愈今夫風毒摶以為癬則濕而不乾血氣滯以生䖝則痒而不己然聖恵治法其方用鯽魚硫黃膩粉麻油之類考之本草鯽魚主諸瘡硫黃殺疥䖝欲鯽魚之為末非煨燼而不能茍硫黃之入火必飛走而不住以硫黃末入鯽魚腹中取其固伏而氣味皆全用熱火逼熁周逥令焦黃碾為細末復以膩粉和之麻油調之葢二物亦皆治癬殺䖝之要藥也鯽魚硫黃之熱所以燥爍於濕䖝麻油膩粉之潤所以浸襲於肌肉夫如是濕之必乾痒之必止矣此本草載其性用故聖人制以為方考之於經曷有疑乎後方治浸淫瘡多汁者亦用鯽魚兼淡豉以為治據本草所載豉味苦寒即無治瘡之文究巢氏所論浸淫瘡候乃因風熱之至夫浸淫瘡者是心家有風熱發於肌膚初生甚小先痒後痛而成瘡汁出侵潰肌肉浸淫而漸闊玩味於此用豉之義皎然明矣葢風熱客留於心經瘡瘍浸淫於皮腠痒痛不定汁出不乾所以内經亦云諸痛痒瘡皆屬於心斯可見矣以其瘡之所生者有風而兼熱豉之為性者既苦而且寒心經屬火苦則可以入心風熱皆陽寒則可以折熱内經亦曰苦入心又曰寒勝熱茲義著焉然則豉之一物雖本草不云治瘡復於藥性論載其豉寒熱風皆中瘡生者可搗為圓服之良且以作圓而服者從内而達外猶以為良設欲和膏而傅者自表而入中豈不為妙况乎此方之設鯽魚生用而不燒亦恐火毒以助熱但去其骨以一枚肉而為中相合其豉以二百粒而為數共和搗而為膏乃塗攤其瘡上俾風熱散釋於皮膚之間令浸淫自消於肌肉之分昧者不知乎此自謂豉不主瘡疑而勿用是末達變通之道也噫聖惠良方愽施濟衆雖瘡癬之微痾亦參求而立法聖人憂民如此醫士可不研究乎謹對又假令法第一道問假令風毒腫候目即節氣當得何脉本因是何臟腑受病發何形候今宜用是何方藥調理設有變動又當隨脉如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及脩製之法處方對答對形體既虛致風邪之入客氣血必壅故腫毒之由生且風性飄揚鼓動於八方之内人乖衛養進襲於一體之間邪干於正榮衛壅遏而不宣毒發於皮肌腠腫結而不散痛楚連連有焮赤之狀瘭漿壘壘類火灼之形窮其作病之源實自風毒之氣也目即春令届時發陳為候氣初通而未盛萬物有始萌之形脉雖出而未隆三部見微弦之象經曰春胃微弦曰平乃應時之脉也今夫診之指下無端直之形按於部中有輕浮之象經云浮則為風是應風毒腫之脉也本因腠理既虛而不固風邪乘虛而入傷其候也起赤腫而不消其狀也生瘭漿而作痛巢氏具其證云風毒腫者其先赤痛飈熱腫上生瘭漿如火灼是也詳此之證其毒猶輕當用竒方治之經曰近者竒之宜用正一輔二竒方升麻湯以升麻一味為主病之正以防風芎藭二味為佐正之輔三味合而服之使風毒既散而不留則赤腫自消而不聚矣設若皮毛之病而不求速治欺膚淺之患日以遷延則毒氣既甚傳流入深迺變為腫之候矣當此之際復持其脉浮而兼大者變病之象也經曰浮則為風又曰大則病進雖其候與風腫之無殊兼其外有壯熱之時作所以巢氏曰毒腫之病與風腫不同時令人壯熱其邪毒甚者入腹殺人復詳其證已重於前非竒方之可及唯偶方而乃効經曰竒之不去則偶之宜用正二輔四偶方沉香連翹湯治之以沉香連翹二味為主病之正又以獨活防己芎藭甘草四味為佐正之輔六味合而服之使毒氣不傳於中風腫自消於外則毒腫之證亦獲愈矣由是論輕重之二證隨巢氏而已具於前立竒偶之二方按本草而今附於後治假令風毒腫候正一輔二竒方升麻湯升麻為正味甘苦平微寒無毒主風腫生益州山谷用一兩剉防風為輔味甘辛溫無毒主風邪生沙苑川澤惡乾薑藜蘆白斂芫花用半兩剉芎藭為輔味辛溫無毒主腫毒生武功川谷白芷為之使用半兩剉右三味㕮咀每服三錢水一盞半煎至七分去柤溫服不拘時候治假令變證毒腫候正二輔四偶方沉香連翹湯沉香為正微溫療毒腫用二兩剉連翹為正味苦平無毒主癰腫生泰山山谷用二兩剉獨活為輔味苦甘平無毒主風寒所擊生雍州川谷或隴西南安豚實為之使用一兩剉防己為輔味辛苦平溫無毒主風腫生漢中山谷殷孽為之使殺雄黃毒惡細辛畏萆􅐺用一兩剉芎藭為輔味辛溫無毒主腫痛生武功川谷白芷為之使用一兩剉甘草為輔味甘平無毒主通經脉生河西川谷术乾漆苦參為之使惡逺志反大㦸芫花甘遂海藻微炙用一兩剉右六味㕮咀每服五錢重水二盞煎至一盞去柤溫服不以時候謹對第二道問假令卒被損瘀血候目即節氣當得何脉本因是何臟腑受病發何形候即今宜用是何方藥調理設有變動又當隨脉如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及脩製之法處方對答對動作弗謹卒有損折之愆血脉既傷遂成瘀塞之證葢歩履失防於躁速忽爾而僵仆於前登臨罔顧於險危遽然而墮墜於下形著於外既損傷而乖和血行乎中亦瘀搏而失運顯於證也或胷痞而脣萎腹不滿而自覺填塞發於候也或舌青而口燥意欲水不能下咽喜於健忘不欲聞聲觀此證之外形知榮血之内瘀又何疑焉目即莭氣已屬仲春脉應中規之象診為平人之常經曰春應中規今也脉象乖和而反見微大之形應至反常而復有來遲之狀此脉既彰卒損瘀血者有之矣本經曰脉微大來遲是應瘀血之病也本因起止失於隄防顛仆形於不測外既損形内必瘀血其候則脣口萎燥而不澤心志健忘而不定故巢氏曰夫有瘀血者其人喜忘不欲聞聲病人胷滿脣萎舌青口燥但欲水不欲咽無熱脉微大來遲腹不滿其人言我腹滿為有瘀血詳此之病證未深危方宜竒制經曰近者竒之宜用正一輔二竒方蒲黃散主之以蒲黃一味為正以生地黃牛膝二味為輔三味合而服之使經絡流通筋脉和緩則瘀血必然而散矣設使外不施於塗傅之方内不服以流暢之藥血氣因滯而愈虛風邪乘隙而相搏變証乃生而為被損乆瘀血之病也微大而遲之脉在今而不見小弱而濇之象於此而乃彰經云脉小弱以濇謂之乆病此其應也巢氏言其證曰此為被損傷仍為風冷搏故令血瘀在乆不差也復詳此病之重深不類前疾之輕淺竒方徒用而不能以痊偶方速施而猶可取効經曰逺者偶之宜用正二輔四偶方當歸没藥湯主之以當歸没藥二味為正以芍藥通草生地黃甘草四味為輔六味合而服之血脉無留塞之乖風冷有散逐之道乆瘀之血自茲而散矣夫如是病有淺深治有輕重施用之法已具於前竒偶之方附列於後治假令卒被損瘀血候正一輔二竒方蒲黃散蒲黃為正味甘平無毒主散瘀血生河東池澤用一兩生地黃為輔味甘苦大寒主墮墜踠折瘀血咸陽川澤惡貝母畏蕪荑用半兩剉牛膝為輔味苦酸平無毒主逐血氣血結生河内川谷惡螢火陸英龜甲畏白前酒浸一㝛取出焙乾用半兩剉右三味碾為細末每服三錢溫酒調下不以時候治假令變證被損乆瘀血候正二輔四偶方當歸没藥湯當歸為正味甘辛雖大溫無毒主止痛除客血内塞生隴西川谷惡䕡茹畏菖蒲海藻牡䝉酒洗焙乾用二兩剉没藥為正味苦平無毒主破血止痛生波斯國用二兩芍藥為輔味苦酸平微寒有小毒主散惡血生中岳川谷須丸為之使用一兩剉通草為輔味辛甘平無毒主利九竅血閉諸結不消生石城山谷隂乾用一兩剉地黄為輔味甘苦大寒主瘀血生咸陽川澤惡貝母畏蕪荑用一兩剉甘草為輔味甘平無毒主通血脉利血氣生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志反大㦸芫花甘遂海藻微炙用一兩剉右六味㕮咀每服半兩水酒各一盞煎至一盞去柤溫服不以時候謹對運氣一道問癸酉年五運六氣所在所宜處方為對對混淪未判之前總而為一氣隂陽既奠之後分而為兩儀天得一以清穹然而剛健於上地得一以寧隤然而柔靜於下運處上下之中回薄太虛之内原其始也分氣運而三者備矣要其終也本隂陽而一以貫之及乎支移而干變運易而氣移論環㑹則六十年而一周窮變化則十二月而一運所以相生相繼相尅相治者隂陽過欠之不齊或病或平或盛或衰者人物胥應而不紊故聖人恐一氣之或乖慮庶民為衆邪之所害乃隨上下客主之加臨預立寒熱溫凉以為治使疾疢不作災害不生同躋於仁夀之域矣今觀癸酉之年上見陽明燥金司天下臨少隂君火在泉中行少微火運是嵗也本為不及之年謂其火運統嵗適㑹在泉少隂之火而又隂年加之則曰同嵗㑹氣之平者也經曰隂年加之曰同嵗㑹其斯之謂歟命其紀曰升明正陽而治德施周普五化均衡其氣高其性速其用燔灼其化蕃茂其類火其政明曜其候炎暑其令熱其臟心其病瞤瘛詳茲之嵗同熱者多天化宜用微寒之藥治其一嵗之愆夫動而不息者天之氣則為之客靜而守位者地之氣則為之主左右間氣隨年辰顯一嵗之中上下加臨逐氣位布六歩之内且初之氣自嵗前大寒至當嵗春分六十日有竒上見太隂濕土為之客下臨木位為之主地氣遷隂始凝氣始肅水迺冰寒迺化其病中熱脹面目浮腫善眠􅍠䘐嚏欠嘔小便黃赤甚則淋宜用苦熱之藥治其過耳二之氣自春分至小滿六十日有竒上見少陽相火為之客下臨君火為之主陽迺舒物迺生榮厲大至民善暴死宜用鹹冷之藥治其過耳三之氣自小滿至大暑六十日有竒上見陽明燥金為之客下臨相火為之主天政布凉迺行燥熱交合燥極而澤民病寒熱宜用苦溫之藥治其過耳四之氣自大暑至秋分上見太陽寒水為之客下臨土位為之主寒雨降民病暴仆振慓譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜用甘熱之藥治其過耳五之氣自秋分至小雪六十日有竒上見厥隂風木為之客下臨金位為之主春令反行草迺生榮民氣和宜用辛凉之藥治其過耳終之氣自小雪至大寒六十日有竒上見少隂君火為之客下臨水位為之主陽氣布候反溫蟄䖝來見流水不冰民迺康平其病溫宜用鹹寒之藥治其過耳於是安其運氣無使受邪折其鬰氣資其化源治六氣之藥已布於前調一嵗之方今附於後治癸酉年五運六氣正一輔二竒方升麻湯升麻為正味甘苦微寒無毒生益州山谷用一兩剉人參為輔味甘微寒生上黨山谷去蘆頭用半兩剉前胡為輔味苦微寒無毒用半兩右三味㕮咀每服三錢水一盞半煎至八分去柤溫服不以時候謹對
