body:
  text: 太醫局諸科程文格卷八脈義第一道問脈浮有表無裏陽無所使不但危身并中其母對夏見浮而反下故表不解而裏復虗陽外偏而失使故心既傷而肝亦損且盛夏屆時脈應浮而汗之為當伏隂在臟醫既昧而下之為逆表熱仍在裏復受其所傷隂氣既虧陽無施其所使既妄治而不順其時非獨害於心火因誤下而并中其母亦兼傷於肝木然則醫之過失而傷肝心子母之臟者無他由夏日妄攻不究其脈形之浮也經曰脈浮有表無裏陽無所使不但危身并中其母其意若此嘗謂施治之道詎可不參於時汗下之法烏可不從於脈逆時違脈非惟邪氣之不除傷隂害陽反致臟真之受損今也時屬乎夏當隂氣歸伏於中脈應乎浮法陽熱正隆於外隂在內則腑臟易虛攻下之方固不可以輕用陽居表而汗液當泄蕩滌之劑尤不可以妄投粗工誤治與病脈失兩審之冝下藥亂施俾臟氣有重虗之弊所以裏之受損表熱弗可得而除隂之已虧外陽不能為之使隂陽錯雜而失其平臟真衰微而乖其用矧夫心火王於夏受疾則必在其經肝木生於心子病則亦虛其母即五行而言之火竊木氣之相生火衰則木無不損在五臟而論之心藉肝經之相助心虧則肝無不傷大抵當夏之時陽用其事脈應浮而必知表陽之咎治當汗而反施攻下之方致隂乖所守於中而裏氣之重虛俾陽無所使於外而表邪之不解在本位而不但危於心火之氣由其逆時而并復中於肝木之經所以然者肝為心母心為肝子妄下重虛則二臟俱傷而子母悉病實由醫之過也不然則上文所謂陽氣上出汗見於頭五內乾枯胞中空虛醫反下之此為重也本注曰陽盛脈浮則冝發其汗而反下之損於隂氣陽為表隂為裏經言陽為隂使隂為陽守相須而行脈浮故無裏也治之錯逆故令隂陽離别不能復相朝使下之不但傷心并復中肝觀乎此為醫之士必當謹候三部無逆四時然後可以無虞矣謹對第二道問三部沉浮正等按之無斷絶者有娠也對診三部沉浮而正等既無斷絶之形知二氣施化而皆和必有妊娠之道且胚胎肇始於中脈象相符於外沉浮相得既不偏於部分之間呼吸齊均斯弗絶於舉按之次此陽施隂化而勿奪乃成三部之和應血凝氣聚而無虧當有重身之兆是知經血留止脈象平調則決為娠者豈無所自而然耶經曰三部沉浮正等按之無斷絶者有娠也其意若此且夫脈體即血氣而成診之無偏者因血氣和調而至動應假隂陽而見按之不絶者由隂陽順適而彰脈既無作病之乖身必有成胎之道何者寸為陽部可以候榮衛之源尺主隂經足以察神精之本當尺寸上下之間為隂陽出入之界不大不小此血氣之通調應浮應沉乃隂陽之正等因舉按不絶於指必沖和有餘於中方其經忽閉而不月身有病而無邪脈既有應知衝任於化之無疑娠必肇始兹元氣符合之有道彼夫少隂動甚也診之者斷曰懷妊尺中别陽也得之者決為有子此一脈獨見猶如影響之不差况三部齊同定若桴鼓之相應診諸婦人欲知有妊之脈皆不可以他求當以是為法也上文有曰隂搏陽别謂之有子此是血氣和調陽施隂化也診其手少隂脈動甚者妊子也少隂心脈也心主血脈又曰腎名胞門子户尺中腎脈也尺中之脈按之不絶者妊娠脈也即是而推之三部正等以為妊娠者信不誣矣謹對大義第一道問二七而天癸至任脈通太衝脈盛月事以時下故有子對女數二七而天癸至則衝任既盛而應期日滿三旬而經血行故隂陽至和而有子蓋稟隂道為女子之質女子者全隂之生也受陽竒合天癸之數天癸者水干之名也至二七海滿而弗越其度每三旬經行而不失其時所以衝為血海而既滿由斯得輸泄之和任主胞胎而亦通自此有懷妊之道雖天癸之使然實生育之常數矣經曰二七而天癸至任脈通太衝脈盛月事以時下故有子其意如斯原夫有天地然後有萬物有萬物然後分男女蓋乾道成男男子為陽而數竒本七而合於少陽坤道成女女子為隂而數偶本八而應於少隂男七冝益故益其一而為八是陽得隂數而成焉女八冝損故損其一而為七是隂得陽數而立焉今夫女子雖集於衆隂資乾元以為本天真雖始於七歲稟陽道以相和况適當二七之數乃應初笄之時因天癸之方行致衝任之通盛血海由茲以滿必盈溢而欲其流轉月事以時而下當通泄而見其調勻如晝夜之更迭若海水之朝夕遇三旬而輸寫應環會之無差合二氣之氤氲有淳化之至妙以其衝者通也故經至此而方行任者妊也則子由兹而乃有是知形之所囿而不能免數之所定而莫能逃逮夫經水絶止而地道不通衝任衰微而形壞無子至是之時固自有數則始終成敗皆不出於自然之理故也何以言之王氏注曰癸謂壬癸北方水干名也任脈皆竒經脈也腎氣全盛衝任流通經血漸盈應時而下然衝為血海任主胞胎二者相資故能有子又巢氏云衝脈任脈之海皆起於胞內手太陽小腸之經也手少隂心經也此二經為表裏主下為月水又曰隂陽和調二氣相感陽施隂化是以有娠以是而知人生於地命垂於天男女雖不同盛衰實由於天數矣謹對第二道問欲令胎夀當治其母對當胚胎已肇之初欲令子以全夀即血氣既凝之際當治母以平調方其為母也衝任通盛而為妊子之期逮其懷軀也血氣溫充而為夀胎之本今因胎養胎而欲得其夀必先事慮事而預為之防不善治則散其凝聚斯不得以成胎或挾寒則濁其血氣故不能以致壽亦如雞之伏子拔一毛則覆子不遍正謂人之養胎受外寒則育胎不成故欲令胎夀要當治其母者也經曰欲令胎夀當治其母其意如斯夫論治病之道者必求本以為先務養胎之法者當治母以為要且人生於地命垂於天言其立命雖假天地以生成原其賦形實賴血氣而化育兆於胞胎之內資血凝氣聚而成冥於隱默之中食氣味形精而養然則食氣於母所以養其形故得於母者為甚多食味於母所以養其精故稟於母者為甚衆是以或謂之胎既食於母謂資始也或謂之胚未成為器猶之坯也至於娠則時動懷則身依論是數者非謂胎已具而不由於母必待母先和而可保於胎今夫自經斷血閉於一月之後當氣聚血凝於三月之時不可挾寒而傷胎惟務得溫而養體故陽主生而隂主殺陽氣清而隂氣濁逺取諸物譬如伏子之雞一羽不覆則溷濁於中近取諸身類夫養胎之母一氣不調則動變於內儻母有挾寒則必見腹寒掌逆之證如工之施治則無出溫經養胎之方故知治則夀而違則天熱則祿而寒即濁有妊之人可不為之戒哉上文所謂有一婦人來診自道經斷即去師曰一月血為閉二月若有若無三月為血積譬如雞伏子中寒即濁中熱即祿下文有云挾寒懷子命則不夀也譬如雞伏子試取雞一毛拔去覆子不遍中寒者濁今夫人有軀少腹寒手掌反逆奈何有軀婦人因言當奈何師曰當與溫經湯舉是而論之欲以夀其胎當以治其母者豈不信然謹對第三道問衰其大半而止對毒藥不容於不用既衰其太半之病毒藥不可以全用當明其即止之法且胞胎內繫血氣始凝茍有大積大聚之證何懼攻邪破堅之藥然藥本攻邪也豈能遽逹於胞胎劑不盡行也恐有過傷於子臟若執以傷胎破血之論則母病不去而子安能保當行以解急有毒之藥則勢衰太半而病無深害母既無殞胎亦自安在重身固當以避其毒至於病勢急切而犯之者蓋所以存其大也經曰衰其太半而止厥意如此夫流變在乎病則病有輕而有重主治在乎藥則藥有大而有小小病而投於大毒之藥則藥毒過而反傷其正大病而施以無毒之劑則藥力緩而弗及其邪雖或病勢難勝於毒藥而非憑毒藥之療固不能以瘳其病而良工必用於毒藥而能衰其病之半則但不可過於用也今夫人有重身假血氣之內聚病非常證由積聚之中堅若拘於懷胎而不施之以削堅之藥茍執於有娠而不投之以峻駃之劑母之疾既弗瘳子在胎而豈保屆此雖解急之時固烈劑不可以不施當斯已太半之病則藥服不可以全用所以黃帝興重身可毒之問先師舉有故無殞之辭有積有聚也但衰其病之太半不當全以害其生可毒可行也當從其禁而乃止無反過約而傷其正其或工以過禁藥欲盡邪病不能以勝藥毒或有以傷胎儻不衰半而即止寧能無殞而俱生至於母有病而不去將有羸弱之乖藥慮毒而弗施必有危因之咎所以明醫治療處以中庸與疾適當知半而止之勿過而餘則何疑於攻治哉何則本經上文曰婦人重身毒之何如歧伯曰有故無殞亦無殞也繼之曰衰其太半而止過者死聖濟經曰母將羸弱子安能保又下文曰大毒治病十去其六又曰無毒治病十去其九夫如是為醫之士要在知其藥性得其病情施於治療之間斯無一偏之失矣謹對假令論方義一道問假令晉王叔和脈經云婦人産後七八日無太陽證少腹堅痛此惡露不盡不大便四五日趺陽脈微實再倍其人發熱日晡所煩躁者不能食譫語利之則愈冝承氣湯又云婦人産訖五臟虗羸唯得將補不可輕㵼今産後復用承氣湯者恐有實實虛虛之咎理何如哉請陳母略對論婦人新産之後既惡露之不除致邪熱藴結於中須蕩滌而乃愈蓋産育之後其治非比於平時承氣之藥其用豈同於常劑雖血氣之皆虛固當補其不足然穢惡之未盡猶可折其有餘顯於證而少腹痛堅及煩躁發熱之屬形於候而大便祕澀兼譫語不食之類以太陽證之不見也此必血結於膀胱診趺陽脈之微實也亦或熱蒸於胃腑所謂承氣湯者斯可得而用焉伏承明問假令晉王叔和脈經云婦人産後七八日無太陽證少腹堅痛此惡露不盡不大便四五日趺陽脈微實再倍其人發熱日晡所煩躁者不能食譫語利之則愈冝承氣湯又云婦人産訖五臟虛羸唯得將補不可輕㵼今産後復用承氣湯者恐有實實虛虛之咎理何如哉請陳母略大矣哉此古人之髙議也愚雖不敏請申之抑嘗謂精氣奪則虛虛則補之而為要邪氣盛則實實則㵼之而為冝雖有兩途各存一理今夫産育未久必血氣之皆虛調衛無方致穢惡之不盡血積於膀胱之內則少腹堅痛而不和熱蒸於胃腑之間則大便固結而不利甚至於日晡之頃晡應於陽明之時所以熱發於外穀食欲進而不能躁擾於中語言不次而妄發况乎太陽乃膀胱之經太陽無證者不頭項強痛而非類傷寒也趺陽本胃腑之脈微實再倍者知熱邪躁盛而結在裏分也故下文曰以熱在裏結於膀胱也經曰太陽者膀胱經也又云趺陽者胃脈也考其病證於經則有云諸痛為實復曰實則譫語以此數者推之可驗血實於內也是以知實則㵼之蕩滌之方固可以用裏者泄之攻下之劑尤可以投叔和於此特立承氣湯而治者深有旨也以其脈證雖言於産後之疾其法與傷寒之論一體故承氣湯有四方有大承氣湯小承氣湯調胃承氣湯桃核承氣湯論其所主也各有其治考其為用也大率相同無非大黃之類芒硝之屬皆大寒峻下之藥有蕩滌破血之功服之使藴熱之邪蕩然而去則五臟調暢俾瘀惡之血決然而釋則諸證悉除故王氏立承氣之名不專於一欲醫士當施用之際必務其詳故調胃承氣湯小承氣湯與大承氣湯桃核承氣湯俱能攻其結熱最能破其瘀血者非桃核承氣湯不可也要在量輕重而制方隨所冝而為用則厥疾必瘳矣儻若執産後之虛羸而唯務補益捨毒藥之攻下而坐待平和何異膠柱而調瑟守株而待仲景所謂心迷意惑動失紀綱者厥有旨哉大抵療男子固異於婦人拯胎産尤難於雜病補㵼一或有差禍不旋踵而至雖古人有實實虛虛之戒醫士當有以致其審要不可以拘焉謹對假令法第一道問假令妊娠腹痛候目即節氣當得何脈本因是何臟腑受病發何形候即今冝用是何方藥調理設有變動又當隨脈如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對胎結於中或受風寒之氣邪干於正遂成腹痛之疾且陽施隂化雖沖和之所資氣聚血凝務溫充而為養或胚胎之前挾冷疹而不去或妊娠之後感風邪而入傷與血氣相搏而攻擊於腑臟之間致邪氣交爭而㽱痛於腹裏之分然妊婦有此證之見乃傷胎之本也目即玉宇橫秋金行用事草木零落也獨枝條之猶存脈象輕虛也有微毛之相應經曰秋胃微毛曰平乃應時之脈矣今也不虛浮於輕舉之間反沉動於重按之際經曰沉為在裏又曰動則為痛沉動相兼此腹痛之脈應矣本因胎前有冷妊後挾風其候㽱結而不寧腹裏而作痛故巢氏有云腹痛皆由風邪入於腑臟與血氣相擊搏所為妊娠之人或宿挾冷疹或新犯風邪㽱結而痛也詳此之病其勢尚輕當處竒方治之經曰近者竒之冝用正一輔二竒方芎藭湯以芎藭一味為主病之正以乾薑芍藥二味為佐正之輔三味合而服之其痛必獲愈矣設若以妊娠而不可進劑雖腹痛而不即服藥致風冷之邪豈能以散釋俾胞胎之本必失於充榮由是而變為妊娠胎動之候也復持其脈動而芤者變病之診也經曰動則為痛芤則為虛巢氏曰胎動不安者多因勞役氣力或犯冒冷熱或飲食不適或居處失冝輕者止轉動不安重者便致傷墮若其母有疾以動胎治母則胎安復詳變病之生又非前證之比疾勢既深竒方難已冝用正二輔四偶方阿膠艾葉湯主之以阿膠艾葉二味為正以當歸芎藭乾地黃桑上寄生四味為輔六味合服使外邪散而痛止內血盛而胎安其病必能愈矣由是病有重輕窮本始而布敘於前方有竒偶隨主療而處方於後治假令妊娠腹痛候正一輔二竒方芎藭湯芎藭為正味辛溫無毒主腹痛溫中生武功川谷白芷為之使用一兩銼乾薑為輔味辛溫大熱無毒主腹痛生犍為川谷秦椒為之使惡黃芩黃連天鼠糞用半兩炮裂銼芍藥為輔味苦酸平微寒有小毒主邪氣腹痛生中嶽川谷須丸為之使用半兩銼右三味㕮咀每服三錢水一盞半煎至八分去滓溫服不計時候治假令變證妊娠胎動候正二輔四偶方阿膠艾葉湯阿膠為正味甘平微溫無毒主安胎生東平郡煮牛皮作之出東阿畏大黃搗碎蛤粉炒成珠用二兩艾葉為正味苦微溫無毒主婦人漏血生田野用二兩銼當歸為輔味甘辛溫大溫無毒主溫中止痛生隴西川谷惡䕡茹畏菖蒲海藻牡蒙酒洗焙乾用一兩銼芎藭為輔味辛溫無毒主腹痛溫中生武功川谷白芷為之使用一兩銼乾地黃為輔味甘苦寒無毒主女子傷中生咸陽川澤惡貝母畏蕪荑用一兩銼桑上寄生為輔味苦甘平無毒主安胎生洪農川谷桑木上用一兩銼右六味㕮咀每服半兩水二盞煎至一盞去滓溫服不計時候謹對第二道問假令産後虛煩候目即節氣當得何脈本因是何臟腑受病發何形候即今冝用是何方藥調理設有變動又當隨脈如何治療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對新産未久必有傷血之乖中氣不宣故生虛煩之候且懷胎之時血氣凝聚而為養臨蓐之際血氣輸寫而俱傷五臟六腑乏於中不能運布百骸四肢羸於外未復經常因氣布而未調使胸中壅塞而不通以內虛而未暢故心下擾煩而不定婦人育子之後多有此證者蓋亦虛之使然也目即時惟九月序屬三秋氣應容平之候脈見中衡之形方為平人之脈也經曰秋應中衡茍或診乖時序三部無中衡之至六脈見虛數之體經云數為虛為熱又曰數則熱煩是應虛煩之病也本因産育有傷血氣未復其候昏悶而不清煩擾而不定是其病也巢氏曰産後血氣俱傷臟腑虛氣在內不宣故令煩也詳此虛煩之為病亦乃産後之微疾處以竒方可使必愈冝以正一輔二竒方黃耆湯主之以黃耆一味為正以茯苓人參二味為輔三味合而服之使血氣調平臟腑充實則虛煩自已設若治療失時待其自差始則壅塞於中次則發越於外變為産後虛熱之候也當此之時復持其脈雖虛數之猶存兼輕浮而併見經云浮則為虛又云浮為在表又云數則為熱復考巢氏書云産後臟腑勞傷血虛不復而風邪乘之搏於血氣使氣不宣泄而否澀生熱或支節煩憒或唇口乾燥但因虛生熱故謂之虛熱此證既見已甚於前施竒方而不及唯偶方而可已經曰逺者偶之冝用正二輔四偶方黃耆秦艽湯主之以黃耆秦艽二味為正以乾地黃人參芍藥甘草四味為輔六味合而服之其虗熱之證必獲愈矣夫如是病形之本皆具於巢源藥物之性實存乎本草證列於前方附於後治假令産後虗煩候正一輔二竒方黃耆湯黃耆為正味甘微溫無毒主補虗生川郡山谷惡龜甲用一兩蜜炙銼茯苓為輔味甘平無毒主煩滿生泰山山谷大松下馬蘭為之使惡白蘞畏牡蒙地榆雄黃秦艽龜甲用半兩銼人參為輔味甘微寒微溫無毒主補五臟調中生上黨山谷茯苓為之使惡溲蔬反藜蘆去蘆頭用半兩銼右三味㕮咀每服三錢水一盞煎至八分去滓溫服不計時候治假令變證産後虛熱候正二輔四偶方黃耆秦艽湯黃耆為正味甘微溫無毒主補虛生川郡山谷惡龜甲用二兩蜜炙銼秦艽為正味苦辛平微寒無毒主寒熱邪氣生飛烏山谷菖蒲為之使去土用二兩銼乾地黃為輔味甘苦寒無毒主寒熱生咸陽川澤惡貝母畏蕪荑用一兩銼人參為輔味甘微寒微溫無毒主補五臟生上黨山谷茯苓為之使惡溲蔬反藜蘆去蘆用一兩銼芍藥為輔味苦酸平微寒有小毒主寒熱生中嶽川谷須丸為之使用一兩銼甘草為輔味甘平無毒主寒熱邪氣生河西川谷术乾漆苦參為之使惡逺志反大戟芫花甘遂海藻用一兩炙銼右六味㕮咀每服半兩水二盞煎至一盞去滓溫服不計時候謹對運氣一道問甲戌年五運六氣所冝處方為對對穹窿而覆於上者本清陽之所宗磅礴而載於下者由濁隂之所化既天地位於上下而分兩儀故五運遷於其中而統一嵗然後隨嵗干之異而分太過不及之紀察氣運之同而别天符歲會之年其平也為德化政令之詳其乖也有災眚變易之咎明勝復辨吉凶莫不由斯而見鑒盈虛識變化悉皆因是而知物應之而有興有廢固非人之所為民隨之而或病或平亦在藥之所治大抵為醫之士審劑調經明標探本冝先悉意於此矣今觀甲戌之年上見太陽寒水司天下臨太隂濕土在泉中行大宫土運是歲也本為太過之年謂其土運統歲適會在泉太隂之土而以陽年加之則曰同天符又土運臨四季是謂歲會同天符之年氣之平者也命曰備化之紀氣協天休德流四政五化齊修其氣平其性順其用髙下其化豐滿其類土其政安靜其候溽薰其令濕其臟脾其病否詳兹之歲乃同寒濕者燥熱化冝用辛熱之藥治其一歲之過愆夫動而不息者天氣也則為之客靜而守位者地氣也則為之主左右間氣隨辰顯一歲之中上下加臨逐位布六氣之內且初之氣自歲前大寒至當歲春分六十日有竒上見少陽相火為之客下臨木位為之主地氣遷氣乃大溫草乃早榮民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍冝用醎冷之藥治其過耳二之氣自春分至小滿六十日有竒上見陽明燥金為之客下臨君火為之主大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始冝用苦溫之藥治其過耳三之氣自小滿至大暑六十日有竒上見太陽寒水為之客下臨相火為之主天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死冝用甘熱之藥治其過耳四之氣自大暑至秋分六十日有竒上見厥隂風木為之客下臨土位為之主風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉萎足萎注下赤白冝辛涼之藥治其過耳五之氣自秋分至小雪六十日有竒上見少隂君火為之客下臨金位為之主陽復化早乃長乃化乃成民乃舒冝用鹹寒之藥治其過耳終之氣自小雪至大寒六十日有竒上見太隂濕土為之客下臨水位為之主地氣正濕令行隂凝太虛埃昏郊野民乃慘悽寒風以至反者胎乃死冝用苦熱之藥治其過耳於是必折其鬱氣先資化源抑其運氣扶其不勝無使暴過而生其疾由是治六氣之藥已布於前調一歲之方今附於後治甲戌年五運六氣正一輔二竒方附子湯附子為正味辛甘溫大熱有大毒生犍為山谷炮裂去皮臍用一兩銼术為輔味苦甘溫無毒生鄭山山谷用半兩銼乾薑為輔味辛溫大熱無毒生犍為川谷炮裂用半兩銼右三味㕮咀每服三錢水一鍾半煎至七分去滓溫服謹對
