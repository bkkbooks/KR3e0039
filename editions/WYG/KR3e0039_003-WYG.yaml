body:
  text: 太醫局諸科程文格卷三大義第一道問肝氣通於目目和則知黒白矣對肝臟内隱既目竅之上通精華外和斯黒白之俱辨葢臟不自通於竅本氣用而相闗目不自司於視由臟和之所致色澤固易見也氣不通則目不能以有見黒白固易知也氣不和則目不能以有知如瞻視之際判然無淆混之差眉睫之間了然無纎毫之惑自非内則因臟氣之通達外則本精華之滋充又安能别其黒白者哉經曰肝氣通於目目和則知黒白矣大意若此嘗謂天有兩曜則無物不歸乎照臨人有雙眸則有象悉由於明辨且兩曜非自明其所以能明者宗隂陽之精氣雙眸非自視其所以能視者本肝氣之上闗是以肝液為淚䰟居舎榮目有淚管也豈非肝氣之相通肝主血輪也無非目竅之相應肝經無病則氣通於目而目有以自和䰟臟不衰則氣闗於眼而眼得以明視自内及外而臟氣貴乎相通因通致和而精明宜其不失如豖膏烏羽之異目和則曉然可知若煤炲枯骨之殊精明則顯然可見以其大不相侔者黒白之容細無不燭者眼目之鑑肝氣不可以不和而和之則無病身鑑不可以不脩而脩之則不昏使其不脩雖離婁不能以逞其明如其得和雖師冕復可以辨其色夫精明者所以視萬物茍或以長為短以白為黒如是則精明已衰又安有肝氣通目之和哉經有曰肝受血而能視又聖濟經曰目和而視五色其所以然者臟氣之所自通也又曰眼者身之鑑也常居欲頻脩又上文曰五臟者當上闗於九竅也又經曰入肝為淚又曰在臟為肝繼之曰在竅為目以此而知肝目既和黒白乃分黒白既分則天下之色無所不察也謹對第二道問司嵗備物則無遺主矣對物當司嵗氣味純全而不􅃜藥備専精主用無遺而有凖葢藥物固非於一品性味不越於五行氣司於嵗也分天地之所産物專其精也别氣味之所育如少隂司天為熱化在泉為苦化太陽司天為寒化在泉為醎化屆少隂之主年專採苦熱之藥値太陽之直嵗悉備醎寒之味收貯為藥氣味既純而既全制用為方治療無遺而無略儻或非於司嵗則質同而性異乖於採摘乃物是而嵗非徒有療疾之名永無必愈之効求無遺畧安可得乎經曰司嵗備物則無遺主矣其意若此原夫天地散精動植均賦金石草木皆藥也未嘗不稟於五行羽毛鱗介亦藥也豈能外質於六氣在氣者既分司嵗之主育物者斯别專精之化聖人備藥要當謹候於年辰前賢已疾惟務收採於藥物且如子午之年少隂司天故性熱之藥得天氣之專精卯酉之嵗少隂在泉故味苦之藥得地氣之純正辰戌則太陽司天所以寒化而純全寅申則厥隂在泉所以醎化而濃厚豈司天在泉之若是在餘嵗主氣之亦然當其司嵗則氣味厚而性用躁値其主年則治保多而力化深取以候嵗收貯於防閑之日將以療疾施用無遺畧之功故推司嵗於先明收採於後分六氣循環之用審百藥氣味之宜惟務司嵗之專精弗取非年之散氣不惟味專而氣足斯亦功的而効全夫如是備物司嵗施用無遺失者自非深明年辰之主又安能臻於是哉考之於經則下文所謂天地之專精也帝曰司氣者何如岐伯曰司氣者主嵗同然有餘不足也帝曰非司嵗物何謂也岐伯曰散也故質同而異等也氣味有薄厚性用有躁靜治保有多少力化有淺深此之謂也由此推之治病之工固當謹候於嵗冝司嵗之藥要必採摘於暇日故治病鮮有不愈者矣謹對又大義第一道問凡鈎割及用鍼不得在旦對舉外治以療目施鈎割用鍼之法慮内虗以暈悶禁陽升在旦之時葢赤脉貫於兩眥瘜肉生於雙眸非鈎割取盡而曷除匪火鍼斷熨而難愈施之務戒於非時用之當避於平旦寅朝則飲食未進五臟皆虛平旦則人氣方生諸經未盛其法勿施於斯時恐臟虛而暈悶其治宜禁於此際慮形弱而顛躋然則聖人特戒於在旦而不忌於他時者葢以平旦非鈎割鍼刺之際也經曰凡鈎割及用鍼不得在旦其意如此嘗謂眼者身之鑑治之各有其法明者身之寶療之亦有其時且用鍼之常尚無刺於太飢矧治目之要豈不戒於在旦是故朝主甲乙而屬木木則入通於肝經寅主平旦而屬陽陽則方升於木位飲食未進正五臟之氣皆虛經脉未隆非九鍼之法當用葢眼之為竅輕膜裹水而不耐纎埃目之為用精華受血而不容少損輕則以藥石而獲安重則用鈎鍼而方愈今也因兩眥赤脉之貫致雙眸瘜肉之生捨鈎割而弗去匪鍼熨而莫除扶之正定而勿傾其首鈎之令起而使離其珠割以鈹鍼而盡去淫膚熨以火鍼而斷除赤脈乃知瞳人甚薄當於穩審神水易傷務於詳緩原赤脉瘜肉之證多是虛人而鍼割火熨之法特忌在旦眀所以然者斯時腹空慮其昏悶醫科於此可不謹諸至於水榖入胃輸精在脾腑臟充盈經絡滋盛則鈎割鍼刺隨其患之淺深而神水瞳人不至憂其損失豈有治之過歟上文曰眼若兩眥頭有赤脉及瘜肉者宜鈎起以鈹鍼割取令盡下文曰旦則腹空五臟皆虛即暈悶便倒亦須著人扶頭若有此候皆是虛弱之人由是推之鈎割鍼鎌誠為治目之要法矣謹對第二道問隂陽之氣清靜則生化治對隂陽運布既清而有常氣候調平故生化而自治葢陽動於嵗半之前則積溫至於暑隂動於嵗半之後則積凉至於寒隨時迭運本來徃以相推順序遞遷皆安平而叶應故氣候有清靜之理則生化有調治之常是皆二氣之相和人物各得其分也内經曰隂陽之氣清靜則生化治大意如此且夫太極奠位於天地一元肇判於隂陽論人物之附麗雖兩儀覆載之功究人物之化生實隂陽斡運之德今夫氣分四序化應羣生陽用事於嵗半之前則始於温而盛於暑播於春夏之時隂用事於嵗半之後則始於凉而盛於寒布於秋冬之令寒熱溫凉既隨時而有凖生長收藏必應候而有常二氣齊等而不偏兩者平調而相守氣候之來則清靜而調適人物之應則保治於安平生生而悉賦其形化化而各得其分既無災眚之變俱全終始之功自非二氣調平隂陽清靜安能神應如是哉内經曰隂陽者天地之道也又曰生生化化品物咸章上文曰陽之動始於溫而盛於暑隂之動始於清而盛於寒又曰氣之相守司也如權衡之不得相失也王氏註曰天地之氣寒暑相對溫清相望如持秤也兩者齊等無相奪倫則清靜而生化各得其分也聖濟經曰一隂一陽之謂道由是推之氣候推遷既適平而相應人物賦稟别生化以循常大哉洪造之元功貴均和而施用也謹對第三道問在竅為目對肝氣内通故在竅而為目目竅外開實在臟而繫肝葢肝藏於血肝本受血而能視肝主於色目因在竅而上闗雖物之巨細頼神水精明而可覩而目之光華捨肝氣通達而難辨是知肝為目之本目應肝之竅大抵由中及外特以在竅為目者肝也經曰在竅為目之意嘗觀夫九竅者内屬於臟五臟者外設為官五臟外闗也既有自而孚應九竅内合也必有源而流通矧目竅之司明藉肝經而為本且肝為東方之木目為肝經之竅屬於木也木具形色之象位於東也東為陽升之方陽氣升則必明故日於是而乃出肝木達則必散故目由是而乃明肝有兩葉故雙眸類甲坼之象眼有五輪故兩目有血輪之屬為隂中之陽也則左目為陽而右目為隂屬甲乙之肝也則左目應甲而右目應乙在志為怒所以忿發則見於眼者豈非在竅為目乎液為泣所以肝病則墮於淚者豈非内應於肝乎然則肝脉上連於目系木精内注於瞳子肝之為用可見其在竅而為目矣經曰肝藏血又曰肝受血而能視則其在竅為目者可知又曰肝主色王氏曰目所以司見形色難經曰肝氣通於目目和則知黒白矣即是論之則肝氣既通於目而所以在竅為目者尤為不誣也謹對假令論方義一道問假令處方之道當遵本草而本草合和之法凡有七情繼云當用相須相使者良勿用相惡相反者以此觀之則知處方之際不可用畏惡者宜矣今聖惠方治肝腎虛風眼生黒花其方用丹砂磁石神麴及觀千金方亦載此劑名曰神麴丸以治眼目之疾考之本草丹砂惡磁石不知古人處而為方者何也况神麴不治眼病今用之以治眼者又何也古人制用立方必有深意願盡陳之對因病立方貴達感受之本隨證命藥當明通變之宜何則有非其治而能治者必求本為先有非其用而復用者當適事為要故或取之以性味專達則不拘於所治所主或取之以君臣制攝則不泥於一偏一曲要當隨病機變態之宜達權通意使之妙至於畏惡避忌激發制攝亦有時而取用者豈執一以廢百哉今承明問假令處方之道當遵本草而本草合和之法凡有七情繼云當用相須相使者良勿用相惡相反者以此觀之則知處方之際不可用畏惡者宜矣今聖惠方治肝腎虛風眼生黒花其方用丹砂磁石神麴及觀千金方亦載此劑名曰神麴丸以治眼目之疾考之本草丹砂惡磁石不知古人處而為方者何也况神麴不治眼病今用之以治眼者又何也古人制用立方必有深意願盡陳之嘗謂治病有五難而處方預其一合和有七情而相惡居其次葢治病莫難於用藥而用藥尤難於處方處方之體君臣佐使均相宣攝處方之難畏惡避忌互有違戾雖方有脩製之法而弗為法之所拘雖書有合和之制而不為制之所執如麥門冬相宜於地黃而古人未嘗於俱用欵冬花有得於紫菀而古書未嘗於並行桂不見火千金有熬炒之法丹砂不入湯外臺有煑服之論半夏用生薑者常也豈論其相畏乳石用參术者衆矣不問其相忌仙方甘草丸有防風而復用細辛俗方五石散有栝蔞而復用乾薑此古人處方之妙世人未或易論也泛觀於此則丹砂有惡磁石之理神麴有不治眼之意可即是而類明矣抑嘗思之一身之有雙眸配層霄之有兩曜兩曜之光尚有盈􅃜雙眸之明豈無損益是以隂陽相盪則日月顯明而不􅃜水火相勝則眼目昏瞑而不慧倘非丹砂磁石孰能治之故本草有曰丹砂法火色赤而主心磁石法水色黒而主腎此之謂歟雖然藥有畏惡而方家所忌得無論焉畏之在我惡之在彼畏之則我不敢徃惡之則彼不得來此方所以用之者取其同而不和各司其治也雖神麴不治於眼然神麴味甘而屬土水懼土制自不尅於丹砂之火丹砂得土自無惡於磁石之水於是三者各有制持皆不能為害也譬猶冦賈輔漢程周佐呉大體既正而不以私情為害矣故千金方亦有此劑名曰神麴丸以謂神麴於眼獨不言治者深述君臣之體是無為而在上者君之道也其丹砂磁石有為而在下者臣之道也何以見之此方不立丹砂磁石之名而特名之曰神麴圓者豈無自而然耶所以神麴為君丹砂磁石為之輔佐者明矣内經曰君一臣二竒之制也三味合而服之何患眼目之疾不愈哉康子饋藥孔子拜而受之則曰丘未達不敢嘗葢藥之為用誠難事也後之學者當盡心於立方之妙制用之法也歟謹對假令法第一道問假令目風赤候目即節氣當得何脉本因是何臟腑受病發何形候即今宜用是何方藥調理設有變動又當隨脉如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及脩製之法處方對答對肝為中守既感於風熱之邪氣衝外竅斯成於目赤之證且肝者䰟之居目者肝之竅風邪在内因隙而乘於肝經熱氣相兼投間而客於䰟舍其邪也自臟而發於竅其氣也從肝而衝於目眼帶迎風而下淚本氣邪相感之使然目瞼受熱而皆赤由熱氣内盛之所致故目風赤候良由是矣目即天暑地熱陽盛物繁一身則血氣淖溢六脉則洪大有餘經曰立夏得大脉是其本位今反診得舉指有餘一息七八至者知其病目風赤之候也經曰浮為風又曰數為虛為熱本因肝氣内虛風熱入乘内凌於肝木之經外衝於兩目之竅乃成目風赤之疾矣巢氏曰目者肝之竅風熱在内乘肝其氣外衝於目故見風淚出目瞼皆赤詳此之證病勢尚輕猶可以竒方治之經曰近者竒之宜用正一輔二竒方菊花散主之以菊花一味為正以栀子甘草二味為輔三味合而服之使風熱之邪消釋肝臟之氣自平目風赤候未有不愈也設若違師極療望病自痊留連日深病必傳變前證不除必變為目赤爛眥之候也復診其脉滿指洪隆者是其變病之脉也經曰大則病進又巢氏曰此由冒觸風日風熱之氣傷於目而眥瞼皆赤爛見風彌甚也亦云風眼再詳此證重如前疾非竒方之可去必偶制以為宜當用正二輔四偶方獨活防風散主之以獨活防風二味為正以山梔子菊花黃芩甘草四味為輔六味合而服之風熱日消眥瞼日減則目赤爛眥而漸復如常也由是病有小大則不可不分藥有輕重則不可不察要在臨病之際隨宜變通可以獲十全之效矣謹按本草逐藥主療及脩製之法處竒偶二方今附於後治假令目風赤候正一輔二竒方菊花散菊花為正味苦甘平無毒主風目欲脱淚出生雍州川澤及田野术枸杞根桑根白皮為之使去枝梗用一兩梔子為輔味苦寒大寒無毒主五内邪氣療目熱赤痛生南陽川谷去皮用半兩甘草為輔味甘平無毒主寒邪氣生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志及大㦸芫花甘逐海藻用半兩炙剉右三味為細末每服二錢白湯調下食後服治假令變證目赤爛眥候正二輔四偶方獨活防風散獨活為正味苦甘平微溫無毒主風􅄆風邪生雍州川谷或隴西南安䐁實為之使去蘆頭用二兩防風為正味甘辛溫無毒主風邪目盲無所見生沙苑川澤及邯鄲瑯琊上蔡殺附子毒惡乾薑藜蘆白斂芫花去蘆頭幷义枝用二兩梔子為輔味苦寒大寒無毒主五内邪氣療目熱赤痛生南陽川谷去皮用一兩菊花為輔味苦甘平無毒主風目欲脱淚出生雍州川澤及田野术枸杞根桑根白皮為之使去枝梗用一兩黃芩為輔味苦平大寒無毒主諸熱生秭歸川谷及寃胊山茱茰龍骨為之使惡葱實畏丹砂牡丹藜蘆用一兩甘草為輔味甘平無毒主五臟邪氣生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志反大㦸芫花甘遂海藻微炙用一兩右六味為細末毎服三錢白湯調服食後服謹對第二道問假令目淚出不止候目即節氣當得何脉本因是何臟腑受病發何形候即今宜用是何方藥調理設有變動又當隨脉如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及脩製之法處方對答對臟氣因虛既不制於津液目淚常出初不因於風邪葢五臟居中六腑相配俱有津液而通於眼悉布精華而注於目臟實則收制而為和臟弱則散漫而為淚目不當風而淚出無時眼非受邪而淚流不止外無紅赤之色内無疼痛之候大抵目不因風而淚出者皆臟氣不足而有也目即夏令已臨火氣適王萬物則垂枝布葉六脉則來疾去遲診合如鈎之象脉為無病之形經曰夏脉如鈎是也今反診得應指極細而微徃來難且散者乃應病之脉也經曰微則為虛又曰濇則少血本因臟氣不足不因風邪侵凌其候津液不能收制自然淚出不止也何則巢氏曰夫五臟六腑皆有津液通於目者為淚若臟氣不足則不能收制其液故目自然淚出亦不因風而出不止本無赤痛詳此之證病勢尚輕治宜於竒經曰近者竒之宜用正一輔二竒方肉蓯蓉圓以肉蓯蓉一味為正以枸杞子川椒二味為輔三味合而服之則臟氣轉盛津液收制目淚出不止之候必獲愈矣設若違師不時即治臟氣轉虛津液日耗則知其病變為目暗不明之候也經曰病乆則傳化復診其脉小弱以濇者知其病之乆矣經曰脉小弱以濇謂之乆病又巢氏曰夫目者五臟六腑隂陽精氣皆上注於目若為氣充實則視瞻分明血氣虛竭則風邪所侵令目暗不明再詳此證積􅃜成損病乆已成非竒方之可療宜偶制以治之經曰竒之不去則偶之宜用正二輔四偶方枸杞子菊花圓主之以枸杞子菊花二味為正以肉蓯蓉巴㦸天莵絲子乾地黃四味為輔六味合而服之臟氣漸復目暗漸明而有向愈之道也大抵治病必分於輕重施方當别於先後庶幾竒偶合宜與疾適當謹按本草逐藥主療及脩製之法處竒偶二方列之於後治假令目淚出不止候正一輔二竒方肉蓯蓉圓肉蓯蓉為正味甘酸醎微溫無毒主七傷養五臟强隂益精生河西山谷及代郡鴈門酒洗去土焙乾用一兩枸杞子為輔味苦微寒無毒補内傷生常山平澤及諸邱陵坂岸揀净用半兩川椒為輔味辛溫大熱有毒調闗節生武都川谷及巴郡杏仁為之使畏欵冬揀去枝梗及目幷閉口者用半兩炒出汗右三味為末煉蜜為圓如梧桐子大每服三十圓白湯送下不拘時候治假令變證目暗不明候正二輔四偶方枸杞子菊花圓枸杞子為正味苦微寒無毒補内陽生常山平澤及諸邱陵坂岸揀净用二兩菊花為正味苦甘平無毒主目欲脱淚出生雍州川澤及田野术枸杞根桑根白皮為之使去枝梗用二兩肉蓯蓉為輔味甘酸鹹微溫無毒主七傷養五臟益精生河西山谷及代郡鴈門酒洗去土焙乾用一兩巴㦸天為輔味辛甘微溫無毒安五臟補中益精生巴郡及下邳山谷覆盆子為之使惡朝生雷丸丹參去心用一兩莵絲子為輔味辛甘平無毒補不足乆服明目生朝鮮川澤田野得酒良山松脂為之使惡葦茵水淘浄去沙土用一兩酒浸焙乾乾地黃為輔味甘苦寒無毒主補五臟内傷不足通血脉利耳目去苖幷沙土用一兩酒浸焙乾右六味為末煉蜜為圓如梧桐子大毎服五十圓白湯送下不拘時候謹對運氣一道問丙辰年五運六氣所在所宜處方為對對太極肇判兩儀位分六氣上橫於太虛五行下列於磅礴氣化分太過不及之殊運統有先天後天之異其平和也民康而物阜其過欠也民病而物衰先立其年以明其氣矣今觀丙辰之年上見太陽寒水司天下臨太隂濕土在泉中行太羽水運是嵗也運行陽干本為太過之年以其運與司天適相符合謂之天符之年命曰靜順之紀藏而勿害治而善下五化咸整其氣明其性下其用沃衍其化凝堅其類水其政流演其候凝肅其令寒其臟腎其病厥詳此之嵗運同寒濕冝用燥熱之藥治其一嵗之過愆經曰同寒濕者燥熱化是也夫動而不息以應天氣為之客靜而守位以應地氣為之主動靜相召隨辰以顯於一嵗之中上下加臨逐氣以布於六位之内且初之氣自乙卯年大寒至丙辰嵗春分六十日有竒上見少陽相火為之客下臨木位為之主地氣遷氣迺大溫草迺早榮民迺厲溫迺作身熱頭痛嘔吐肌腠瘡瘍宜用鹹冷之藥治其過耳二之氣自春分至小滿六十日有竒上見陽明燥金為之客下臨君火為之主大凉反至民迺慘草迺遇寒火氣遂抑民病鬱中滿寒迺始宜用苦溫之藥治其過耳三之氣自小滿至大暑六十日有竒上見太陽寒水為之客下臨火位為之主天政布寒氣行雨迺䧏民病寒反熱中癰疽注下心熱瞀悶不治者死宜用甘熱之藥治其過耳四之氣自大暑至秋分六十日有竒上見厥隂風木為之客下臨土位為之主風濕交爭風化為雨迺長迺化迺成民病大熱少氣肌肉萎足痿注下赤白宜用辛凉之藥治其過耳五之氣自秋分至小雪六十日有竒上見少隂君火為之客下臨金位為之主陽復化早迺長迺化迺成民迺舒宜用鹹寒之藥治其過耳終之氣自小雪至大寒六十日有竒上見太隂濕土為之客下臨水位為之主地氣正濕令行隂凝太虛埃昏郊野民迺慘悽寒風以至反者胎迺死宜用苦熱之藥治其過耳大哉天地變化以隂陽為先隂陽運用以六氣為始察盛衰損益之化明造化迎隨之機有勝有復有平有眚皆布於運氣之中悉列於年辰之内治六氣之藥已布於前調一嵗之方今附於後治丙辰年五運六氣正一輔二竒方附子湯附子為正味辛甘溫大熱有大毒生犍為山谷及廣漢火炮裂去皮臍用一兩术為輔味苦甘溫無毒生鄭山山谷漢中南鄭用半兩甘草為輔味甘平無毒生河西川谷積砂山及上郡微炙用半兩右三味㕮咀毎服三錢水一盞半生薑七片煎至七分去渣溫服不拘時候謹對
