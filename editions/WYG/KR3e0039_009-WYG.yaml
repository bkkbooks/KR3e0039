body:
  text: 太醫局諸科程文格卷九墨義第一道問夫生人之道莫不養小為大對夫生人之道莫不養小為大若無於小卒不成大故易稱積小以成髙大詩有厥初生民傳云聲子生隱公此之一義即是從㣲至著自少及長人情共見不待經史然小児氣勢㣲弱醫人雖欲留心救療急切難差今之學者多不存意由嬰兒在於襁褓之内乳氣腥臊醫者操行英䧺詎肯瞻視靜而言之可為太息者矣小品曰黄帝言凡又年六歲以上為小十六歲已上為少二十已上為壯五十已上為老其六歲已下經所不載所以乳下嬰兒有病難療者皆無所承據也中古有巫姥者立小兒顱􅇟經以占夭夀判疾病死生俗相傳受始有小兒方焉凡百居家皆冝逹兹養小之術謹對第二道問療小児百病諸癎熱口不開對牛黄味苦平有小毒主驚癎寒熱熱盛狂痓除邪逐鬼療小児百病諸癎熱口不開大人狂癲又墮胎乆服輕身增年令人不忘生晉地平澤於牛得之即隂乾百日使時燥無令見日月光人参為之使得牡丹菖蒲利耳目惡龍骨地黄龍胆蜚亷畏牛膝謹對第三道問少陽之至乍大乍小對少陽之至乍大乍小乍短乍長陽明之至浮大而短太陽之至洪大而長太隂之至𦂳大而長少隂之至𦂳細而㣲厥隂之至沉短而實此六者是平脉耶將病脉也然皆王脉也其氣以何月各王㡬日然冬至之後得甲子少陽王復得甲子陽明王復得甲子太陽王復得甲子太隂王復得甲子少隂王復得甲子厥隂王王各六十日六六三百六十日以成一歲此三陽三隂之王時日大要也謹對脉義第一道問弦急者客忤氣對脉彰弦急因風搏而變於經常病為客忤本神弱而感於異氣且嬰童之際精魄未全襁褓之時䰟神尚怯儻保衛不謹忽瞻於未識之人鞠育昧冝偶覩於非常之物因神弱而客邪忤犯致神驚而脉象異常切之而弦也故弦為虛之使然持之而急也故急亦邪之所致是知脉弦者神虛而不守脉急者邪干而弗寧殘賊之脉形於診中者能為小兒客忤之氣也此經所謂弦急者客忤氣之意嘗謂人之初生臟腑弱而未周形之始育膚革踈而未成柔脆則外邪易犯懦弱則異氣易傳正資保愛之冝全藉鞠養之法今也衛䕶無方出處不謹物或見於非常人或覩於未識或沾惹牛馬異類之氣或經歴惡暴神鬼之祠從於外而至者謂之客乘其􅌷而犯者謂之忤感於邪也非止於一端應於脉也莫逃乎二象循而切之有若弓弦之至按而紀之又兼勁急之来弦者虛之所生本神虗而失守急者邪之所至由邪犯而不寧形之於証也吐下作而病類諸癎之狀見之於候也腹痛生而目無上視之形吐下若極則水穀以解離腹痛至甚則色象而變易是皆神氣不守而藏氣不安其為客忤者明矣質之於經曰脉舍神又曰弦則為虛又聖惠方云夫小兒客忤者是神氣軟弱忽有非常之物或見未識之人氣息犯之謂之客忤也或乳母及父母從外来還或經履鬼神麄惡暴氣或牛馬之氣皆為忤也其狀吐下青黄赤白水穀解散腹痛夭矯面變五色狀似發癎但眼不戴其脉弦急數者是也又聖濟經曰神不守而客忤又云養㓜難即此推之客忤之病皆調䕶不謹之使然弦急之脉悉神氣不寧之所致以脉合證如鼓之應桴響之應聲也謹對第二道問脉沉而數者骨間有熱對沉數之脉既兼見於指下熱邪之病必深藏於骨間蓋重按始得而為沉去来急促而名數以沉而論之也則本於腎脉即數而言之也則應於陽邪骨乃腎之所合熱為陽之所化故二脉兼呈病非肌肉之分兩診並見熱生骨髓之中是沉為裏而數為陽故童穉得之乃骨間之有熱矣經曰脉沉而數者骨間有熱大義如此且夫小兒之脉亦以舉按而辨其形嬰兒之診尤在徃來而别其象病有淺而有深即脉形而不驗邪有寒而有熱因診切而乃明今也以舉按而推之沉脉則重按而始得以徃來而考之數脉則至數而過常胡不觀少隂本乎沉而沉乃主於骨髓諸陽見於數而數乃應於熱邪沉非在骨而不彰數非有熱而不顯茍脉獨見乎沉雖主裏而不應有熱若脉兼見乎數乃有熱而實為在裏以其二診俱見疾非在表之邪兩脉共呈應骨間之熱内求診而兼應於沉數之形外觀証而就按於冷清之處盖骨熱者深藏之患故脉象雖按指有餘而沉中兼見數脉之軆也經曰沉為在裏又曰沉脉舉之不足按之有餘一云重按之乃得又曰腎主骨又曰數則為熱又曰數脉去來促急又曰數者陽也又下文曰欲以腹就按冷清也即是而觀則淺深之疾寒熱之証莫不以是脉而知之矣謹對大義第一道問位天者天文也位地者地理也通於人氣之變化者人事也對貫三為一則道無徃而不在裂一為三則氣各隨其所司且道始於一而有太極位奠於三而有三才天位乎上故清陽之氣著為燦然之文地位乎下故濁隂之氣積為凝然之理運司變化之為用中傍人事之相通自迹而求之初若遼絶以道而觀之實為貫通仰觀乎天而文即氣之所為俯察乎地而理即形之所積上下奠位而表著既定變化居中而先後不齊天文也地理也人事也裂之則異而貫之則一也經曰位天者天文也位地者地理也通於人氣之變化者人事也大意若此原夫一元既判而兩儀肇分兩儀既分而三才始備昧之者以是理而别於異端明之者縂是道而同於一致今夫司天之氣分三隂三陽而上統乾元司地之氣别三隂三陽而下統坤德人處氣交之中運合變化之用是知位天而為天之文故明如日月而麗如雲霓是亦積氣而為之文焉位地而為地之理故髙若山嶽而深若河海是亦積形而為之理焉及乎雨暘之變星辰之應皆可自此而占候汚崇之勢早晏之節悉能由是而類推在人為事則見於日用之無窮以事通氣則合於變化之無已嗚呼擬諸三極其中各有所㑹擬諸三元其氣各有所統貫之則一分之則三仰觀俯察豈難測而難量乾旋坤轉見為文而為理大抵道居天地之先妙縂隂陽之化氣之為用而各有所司道之所通則無乎不在故得其道者縂為一致昧其道者分為兩塗不然上文何以有曰夫道者上知天文下知地理中知人事又啓元子注云三隂三陽司天司地以表定隂陽生化之紀是謂位天位地也五運居中司人氣之變化故曰通於人事也又聖濟經曰貫三為一則道無二致而理亦同歸即此推之上而司天下而司地中而統運大哉之道則可一而貫之矣謹對第二道問重陽者狂重隂者癲對邪并於陽乃生狂妄之疾邪并於隂乃見癲仆之候且陽之為性則躁而舒隂之為性則靜而惨陽并於陽則為之重陽隂并於隂則為之重隂陽氣偏勝躁動而神不自安故少卧譫語而為狂此重陽之使然也隂氣獨隆止静而志不自慧故直視僵仆而為癲此重隂之所致也夫如是狂癲二証各本隂陽重并而為患也經曰重陽者狂重隂者癲之意嘗謂一隂一陽之為道偏隂偏陽之謂疾是故百骸之滋育頼二氣之平調隂平陽治則底於安和偏勝獨隆則成其疾患今也保攝乖冝邪氣乘客并於陽則陽氣偏勝故有重陽之疾并於隂則隂氣獨隆故有重隂之患以其陽舒而躁也故少卧不飢則好歌而妄行隂静而惨也故其意不樂則直視而僵仆或自髙自貴之態故狂候非止一端或濕癲馬癲之類故癲證分為五種陽邪偏盛則實於四肢而充於百脉烏得不形為狂隂邪獨隆則入於五臟而并於三隂烏得不發為癲隂不勝陽故諸經薄疾而狂乃生陽不勝隂故五臟氣爭而癲乃作吁狂癲之病有重陽重隂之異者豈非陽動隂静之使然歟内經曰隂不勝其陽則脉流薄疾并乃狂陽不勝其隂則五臟氣爭九竅不通又巢氏云狂病者由風邪入并陽所為也又曰邪入於隂則為癲疾又内經曰邪入於陽則狂本經曰狂之始發少卧不飢而自髙賢也自辨智也自貴倨也妄笑好歌樂也妄行不休是也癲之始發意不樂直視僵仆又曰隂静陽躁又曰隂惨陽舒以此推之則二者之証謂之隂陽偏隆之所致詎不信然謹對第三道問形寒飲冷則傷肺對皮毛者肺之合形寒則邪傷於外胃口者肺之脉飲冷則病在於中且肺為華蓋臟屬太隂外則氣合於皮毛内則脉循於胃口茍避禦不謹則寒邪乗客而傷形調養失冝則冷飲過咽而入胃以其肺臟輸精於皮毛之外太隂循環於胃口之間從其所合而必致華盖之傷究其所自而是謂正經之病然則肺惡於寒故形寒飲冷者因其所患而為害也經曰形寒飲冷而傷肺之意嘗謂臟腑於中病不能以遽起隂守於内疾無自而頓生原其所起必自外合而歸中推於所致必循經脉而入臟明於養生者避其所惡而臟不受傷昧於保命者犯其所惡而臟乃所損今也罔識節宣而外無閉拒之冝常多縱欲而内失温養之道形傷於寒而先侵於皮毛之分飲恣於冷則必入於胃口之中殊不知皮毛之間頼肺臟輸精之和胃口之際為肺脉循環之所從其合也襲於陽中之太隂循於經也入於鬲間之牝臟是謂正經之自病實非他邪之相干盖魄之所處則欲温而畏寒氣之所藏則喜暖而懼冷以肺則經屬於隂故寒則喜傷於隂又况清寒者肺之本邪故形寒飲冷而肺臟不傷者未之有也内經欬論云皮毛者肺之合也皮毛先受其邪氣邪氣必從其合其寒飲食入胃從肺脉上至於肺則肺寒肺寒則内外合邪又鍼經曰手太隂之脉起於中焦下絡大腸循環胃口又經曰肺惡寒又經曰有正經自病即此為論則所傷之因可得而求其病之本矣謹對假令論方義一道問假令太平聖惠方治小児心痛但覺兒將手數數摩心腹即啼是心痛不可忍宜服芍藥散方用赤芍藥人参白术黄芩川大黄當歸為麄散以水煎服竊詳小兒臟腑軟弱不可輙吐下又心痛之病本因寒邪冷氣傷於心之别脉搏於經絡得之今觀芍藥散皆性寒之藥既心痛因寒而得今復用之豈不反傷其正氣乎願詳其意而陳之對拯病之道要當以意而黙㑹施治之法尤冝囙證而變通盖小兒則臟腑柔脆嬰童則腸胃怯弱易􅌷易實用藥而不可茍易寒易熱投劑而不可忽今寒冷之邪傷於經絡之中疼痛之候發於心包之分察候之始既得以意料制方之要貴合於病情大抵㣲者逆之而為冝甚者從之而為要故心痛之病本寒甚而使然治療之方必從之而乃効由是因病立法以寒療寒雖小兒之腑臟軟弱用之合冝豈有反傷之過哉今承前問假令太平聖惠方治小兒心痛但覺兒將手數數摩心腹即啼是心痛不可忍宜服芍藥散方用赤芍藥人参白术黄芩川大黄當歸為麄散以水煎服竊詳小兒臟腑軟弱不可輙吐下又心痛之病本因寒邪冷氣傷於心之别脉搏於經絡得之今觀芍藥散皆性寒之藥既心痛因寒而得今復用之豈不反傷其正氣乎願詳其意而陳之此聖人通變之法愚雖不敏試陳之嘗謂小児之病口未能言雖言語而不可辨是不可以問而知之童稚之疾脉未有定又啼呌而不可持是尤難切而知之也使工者無所用其工巧者無所施其巧是知治病之難無難於小兒也既不可以問而知又尤難以切而曉果何知其病之生耶大抵即心會理則理因心會而可明以意識病則病因意識而可曉何以言之兒言固未可辨今數摩心腹則可以因意而推求幼脉固難以診今手近即啼則可以即理而黙會是必寒凑於心經邪客於包絡由其作痛而手舉摩腹因其痛甚而摩腹即啼以此推之是其痛之不可忍也手摩雖本於黙識其實因望而可知聲啼雖本於意求其實因聞而可見經所謂望而知之謂之神聞而知之謂之聖是不待工巧為能而造乎聖人之妙矣與夫察病之際既以燭其情施療之間尤欲通其法且病有㣲甚方有逆從㣲者逆之而以寒治熱以熱治寒甚者從之而以寒治寒以熱治熱今心痛者裏熱之使然裏熱者邪甚之所致經曰邪氣盛則實又曰諸痛為實是邪盛而為痛證矣故甚者從之當以寒而治寒實者㵼之當以通而去塞論至於此故古方用芍藥散者豈不冝乎觀芍藥散方用赤芍藥人参白术黄芩川大黄當歸六味之藥其間以芍藥人参之㣲寒以黄芩川大黄之大寒正所謂以寒治寒以㵼去實蕩滌心包之邪踈通寒熱之氣致邪却而疼已俾實散而痛除誠變通之良法也茍或以寒病而不可用寒以小兒而不可輙下則甚者當從故逆之而格拒不入痛者宜下故塞之而疼楚轉加王氏謂大寒内結以熱攻除痛發尤甚聖濟經曰謂冝通而塞則為痛理亦明矣故知小兒心痛之病用㣲寒攻下之劑者誠藥病之相投標本之相得又烏有反傷正氣之弊哉抑又觀巢氏云小兒始生氣尚盛無有虛勞㣲惡則須下之所損不足言及其愈病則致深益若不時下則成大疾疾成則難治矣以此言之則小兒平常有患亦須下之今心腹大痛而不可忍又安畏其寒凉也聖賢之論可謂權冝通變如調瑟之法不可膠柱待之術不可守株固當隨機應變豈可拘於以寒治熱以熱治寒之道姑以此而塞明問執事以為如何謹對假令法第一道問假令解顱候目即節氣當得何脉本因是何臟腑受病發何形候即今冝用是何方藥調理設有變動又當隨脉如何救療各須因本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對腎氣不足則骨髓無滋養之榮顱􅇟開解則頭縫失閉合之道且産母臨於九月胎氣資於少隂始於胚胎而腎氣不成後為童稚而骨髓不足骨者腎之合腎弱而骨無所充腦者髓之海髓虛而腦無所養故初生而顱不合漸大而􅇟自開者必然之理也目即春令正值發陳之時脉見㣲弦乃為平和之診經曰春胃㣲弦曰平今反診得㣲弱之脉乃應解顱之候經曰㣲則為􅌷又曰弱則為虛本因在胎之時少隂失於榮養既生之後骨氣乖於滋充􅇟門漸大而漸開頭縫當合而不合者是也巢氏曰解顱者其狀小兒年大􅇟應合而不合頭縫開解是也由腎氣不成故也詳此之病其勢尚輕可用竒方治之經曰近者竒之當用正一輔二竒方龜甲圓主之以龜甲一味為主病之正以乾地黄山蕷二味為佐正之輔三味合而服之則髓氣復榮腎臟滋養解顱之候必然而漸合矣倘若昧於鞠育失於治療使腎氣之益衰骨髓之愈弱遂變為小兒行遲之証也經曰病成而變復診其脉徐緩者是變病之脉也經曰緩則為虛又曰尺脉緩脚弱其証骨無幹立之和體有軟弱之態當行而未能行乃有後時之患矣故太平聖惠方云小兒行遲者是肝腎氣不足致骨氣􅌷弱筋骨無力故行遲也復詳其病既甚於前時非竒方之能及唯偶方之可用冝以正二輔四偶方附子五加皮湯主之以附子五加皮二味為正以黄耆􅒝薢牛膝甘草四味為輔六味合而服之使肝腎全盛筋骨和柔行遲之病無復憂也謹按本草逐藥主療及修製之法處竒偶二方列之於後治假令解顱候正一輔二竒方龜甲圓龜甲為正味甘平有毒主小兒􅇟不合生南海池澤惡沙参蜚亷用一兩醋炙黄剉乾地黄為輔味甘苦寒無毒填骨髓補五臟内傷不足生咸陽川澤黄土地者佳惡貝母畏蕪荑用半兩剉焙乾山蕷為輔味甘温平無毒充五臟生嵩髙山谷柴芝為之使惡甘遂用半兩剉右三味為細末用狗腦和丸如麻子大每服三十丸白湯送下乳食前服治假令變証行遲候正二輔四偶方附子五加皮湯附子為正味辛甘温有大毒主不能行歩生犍為山谷地膽為之使惡蜈蚣畏防風黒豆甘草黄耆人参烏韭炮裂去皮臍用一兩剉五加皮為正味辛苦温㣲寒無毒主小兒不能行生漢中逺志為之使畏蛇皮𤣥参用一兩剉黄耆為輔味甘㣲温無毒主小兒百病生白水漢中惡龜甲用半兩蜜炙萆薢為輔味苦甘平無毒主强骨節生真定山谷薏苡為之使畏葵根大黄柴胡牡蠣用半兩剉牛膝為輔味苦酸平無毒填骨髓主膝痛不可屈伸生河内川谷惡螢火陸英龜甲畏白前用半兩酒浸一宿焙乾剉甘草為輔味甘平無毒堅筋骨生河西川谷積沙山及上郡术乾漆苦参為之使惡逺志反大㦸芫花海藻甘遂用半兩炙剉右六味㕮咀每服二錢重水一小盞生薑五片煎至四分去滓食前温服謹對第二道問假令壯熱候目即節氣當得何脉本因是何臟腑受病發何形候即今冝用是何方藥調理設有變動又當隨脉如何救療各須用本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對榮衛壅盛致五臟生熱於中病勢薫發使一體壯熱於外盖嬰童全藉於調養腑臟易致於盛衰今血氣皆盛因無踈逺之冝臟氣乖和迺有壅滯之患致陽氣之偏勝令邪熱之内生其邪也則薫發於肌膚其熱也則壯熱於皮表蒸蒸然而身無暫凉熇熇然而體若燔炭肌熱至甚而無漸發之理邪氣獨隆斯為壯熱之名矣目即三春届序萬物啓陳脉應㣲弦之形命曰平人之診經曰春胃㣲弦曰平今也不然診之有洪大之體持之兼數疾之形乃為壯熱之脉矣經曰大則氣强又曰數則為熱本因血氣壅盛臟氣生熱其證有極熱之狀者是也巢氏曰小兒壯熱者是小兒血氣盛五臟生熱薫發於外故令身體壯熱其發無漸壯熱甚也竊詳是病熱邪尚淺未為重甚之時施治所冝當用竒方之制經曰近者竒之當用正一輔二竒方柴胡湯主之以柴胡一味為主病之正以黄芩甘草二味為佐正之輔三味合而服之使熱邪泄越正氣平和必得其愈矣儻若隱忍冀差違於治療之方荏苒既深必有傳變之患使熱實於内神氣不安遂變為驚之候矣經曰病成而變復持其脉動而數者是也經曰動則爲驚又云數則為熱巢氏曰小兒驚者由血氣不和熱實在内心神不定所以驚復詳其證勢重於前竒方力淺當用偶方經曰逺者偶之冝用正二輔四偶方丹砂人参散主之以丹砂人参二味為正以蠍蜈蚣牛黄麝香四味為輔六味合而服之使心神安静驚熱消散小兒發驚之候不容不差矣謹按本草逐藥主療及修製之法處竒偶之二方列於後治假令壯熱候正一輔二竒方柴胡湯柴胡為正味苦平㣲寒無毒主寒熱邪氣生𢎞農川谷半夏為之使惡皂莢畏女萎藜蘆去苖用一兩剉黄芩為輔味苦平大寒無毒主諸熱生姊歸川谷山茱萸龍骨理石為之使惡蔥實畏丹砂藜蘆用半兩剉甘草為輔味甘平無毒主寒熱邪氣生河西川谷术乾漆苦参為之使惡逺志反大㦸芫花甘遂海藻用半兩炙剉右三味㕮咀每服二錢水一小盞煎至四分去柤温服不計時候治假令變証驚候正二輔四偶方丹砂人参散丹砂爲正味甘㣲寒無毒主身體五臟百病生符陵山谷惡磁石畏鹹水用一兩别研如粉人参爲正味甘㣲寒㣲溫無毒止驚生上黨山谷茯苓為之使惡溲蔬反藜蘆去蘆頭用一兩剉蠍爲輔味甘辛有毒主手足抽掣用半兩去毒炙蜈蚣為輔味辛溫有毒療心腹寒熱生太湖川谷用一條赤足者去毒炙用牛黄為輔味苦平有小毒主驚癎生晉地平澤於牛得之人参為之使惡龍骨地黄龍膽蜚亷畏牛膝用半兩别研麝香爲輔味辛温無毒主癎痓生中臺用一錢别研令細右以蠍人参蜈蚣為細末却入丹砂麝香牛黄末再研和匀每服一錢白湯調下不拘時候謹對運氣一道問己巳年五運六氣所在所冝處方爲對對天道動而不息統六氣以周行地道静而守位列五行而環布天地相召上下相符五運之政逥薄於太虛之中五化之常主通於民物之用分德化政令之不同有勝復淫治之不等惟聖人也仰觀俯察推盛衰之原審劑調經施五味扶抑之法髙者抑而下者舉損其盛而益其衰必也先立其年以明其氣今也己巳之年上見厥隂風木司天下見少陽相火在泉中行少宫土運是歲也上下無相加臨以隂干支運行後天故曰不及之年命曰卑監之紀是謂减化化氣不令生敢獨彰長氣整雨迺愆收氣平風寒並興草木榮美秀而不實成而粃也其氣散其用静其動瘍涌分潰癰腫其發濡滯其臟脾其病留滿否塞詳此之歲宜以辛調上以鹹調下此一歲之大法也夫應天者為客故動而不息應地者為主故静而守位左右間氣隨辰以見且初之氣自戊辰歲大寒至己巳年春分六十日有竒上見陽明燥金為之客下臨木位為之主寒始肅殺氣方至民病寒於右之下冝以苦温之藥以調其氣二之氣自春分至小滿六十日有竒上見太陽寒水為之客下臨火位為之主寒不去華雪水氷殺氣施行霜迺降名草上焦寒雨數至陽復化民病熱於中治冝甘熱之藥以調其氣三之氣自小滿至大暑六十日有竒上見厥隂風木為之客下臨火位為之主天政布風迺時舉民病泣出耳鳴掉運治冝辛凉之藥以調其氣四之氣自大暑至秋分六十日有竒上見少隂君火為之客下臨土位為之主溽暑濕熱相薄争於左之上民病黄癉而為胕腫冝用鹹寒之藥以調其氣五之氣自秋分至小雪六十日有奇上見太隂濕土為之客下臨金位為之主燥濕更勝沉隂迺布寒氣及體風雨迺行治冝苦熱之藥以調其氣終之氣自小雪至大寒六十日有竒上見少陽相火為之客下臨水位為之主畏火司令陽迺大化蟄虫出見流水不氷地氣大發草迺生人迺舒其病温厲冝用鹹冷之藥以調其氣由是必資其化源賛其運氣無使邪勝治六氣之藥已布於前調一歲之方今附於後治己巳年五運六氣正一輔二竒方細辛湯細辛為正味辛溫無毒生華隂山谷用一兩剉防風為輔味甘辛温無毒生沙苑川澤去蘆頭用半兩剉澤㵼為輔味甘鹹寒無毒生汝南池澤用半兩剉右三味㕮咀每服三錢水一盞半煎至七分去柤温服不拘時候謹對
