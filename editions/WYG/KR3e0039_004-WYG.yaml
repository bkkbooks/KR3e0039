body:
  text: 太醫局諸科程文格卷四大義第一道問生而勿殺長而勿罰化而勿制收而勿害藏而勿抑對推五運之統嵗既上下處平正之和察五化之主時斯氣令無凌犯之過葢天地俱正則四時咸遂其宜氣運偕和則五化各安其序既無偏盛之由罔有侵凌之害木之平也生化迺榮金氣無肆殺之傷火之正也長化迺布水氣無縱罰之弊化氣主嵗此為土得其平收氣司年是迺金適其正土臨備化則生氣勿恣於相凌金至審平則長氣弗專於縱害至於水運之平和知其藏氣之勿抑夫如是五化各獲於平正萬物皆遂於生成所以謂之平紀者不亦宜乎經曰生而勿殺長而勿罰化而勿制收而勿害藏而勿抑大畧如此原夫五氣者既不可以太過尤不可以弗及太過者失之暴盛而相凌不及者失之委靡而不振恃强以相凌者則彼有求報之愆卑弱而自退者則已有受侮之患今夫天地底於安平上下無有侵客主於時也春夏秋冬皆不紊其序施於化也生長收藏亦不亂其倫且生氣主時木運之嵗也當和氣敷布而生榮長氣司年火運之紀也當威明升騰而長育故生榮之時收氣雖在而孰得以縱其殺長育之際藏氣雖存而莫能以縱其罰以至土運平和木弗制土而化氣迺行金氣脩正火弗害金而收氣無犯逮乎水之平也金藏化於冬時土勿抑也安政令於茲嵗無勝無復使四序之適宜不盛不衰俾羣生之獲遂儻非平氣之年則未免於太過不及之失本經有云木曰敷和火曰升明土曰備化金曰審平水曰靜順又王氏註曰生氣主嵗收氣不能縦其殺長氣主嵗蔵氣不能縱其罰化氣主嵗生氣不能縱其制收氣主嵗長氣不能縱其害藏氣主嵗化氣不能縱其抑夫如是皆天氣平地氣正五化之氣不以勝尅為用故謂曰平舉此推之則上下無相奪倫斯生長化收藏皆安於平氣之年可得而知矣謹對第二道問齒已後至㑹厭深三寸半對齒及㑹厭皆七衝要㑹之門數有度量法三元五行之義且形體皆有法象尺寸俱可凖量以齒牙為戸門則摧伏水榖而下咽以㑹厭為吸門則引納冲和而入胃水榖下咽則三焦以為之道路冲和入胃則五臟悉為之滋充所以三焦則配於三元五臟則合於五氣自齒後至㑹厭之門故深三寸半者是法三五之數而然也經曰齒已後至㑹厭深三寸半大意如此嘗謂人肖天地之貌以生體合隂陽之數以成首足則象其方圓腑臟則配其竒偶雖曰口齒咽喉之微亦有規矩凖繩之法今也近自齒牙而皆有法象終及㑹厭而俱可度量齒牙有催物之功㑹厭有吸門之號物運三焦而各司其職氣充五臟而悉歸其用人有三焦五臟之分天有三元五行之化故天與人身而貫通為一齒及㑹厭而深淺有數容五合之大則皆有其機深三寸之半則可明其理以其三寸法三元之數五分應五行之常長短闊狹各存自然之理淺深大小悉有可量之宜故深乎三寸半豈無謂而然乎何以明之素問謂其生五其氣三王氏註云言人生所運為内依五氣以立應三元以成又本經曰齒為戸門㑹厭為吸門又註曰度之得此之數又下文曰大容五合舉此證之一寸一分必有理寓焉謹對又大義第一道問春氣始於下秋氣始於上夏氣始於中冬氣始於標對論四時布化之常既生長收藏而有異推四氣運行之始則上下中標而迺殊葢隂陽密運時序遞遷三陽初布而為春則春迺發陳之令萬寶告成而為秋則秋迺容平之時以春氣之方臨也故潜者發而屈者伸此始於下而可知以秋氣之既至也故殘者飛而成者墜此始於上而可見逮乎夏氣始於中散於外則物有蕃秀之宜冬氣始於標歸於根則物有閉藏之理夫如是四序之變更生更化而無窮四氣之行一始一終而不息觀乎此則天地萬物之情可見矣經曰春氣始於下秋氣始於上夏氣始於中冬氣始於標大略如此抑嘗聞隂陽布化而為於四時天地散精而生於萬物時立氣布斯成一嵗之功物變氣遷迺有周㫷之候然則四時更代其於生化之妙者有所不同一氣周行其於上下之次者有所不等高卑弗紊升降靡差觀夫物之生成知其氣之本始生因春而長因夏則自下以及中收因秋而藏因冬則從上而至標且春布暄淑之和施於物者主乎生榮秋行慘肅之政臨於物者主乎揫斂春氣自下而漸騰秋氣從上而始布羣芽坼吐迺知春令之臨得不謂始於下乎一葉飄空已應秋化之至得不謂始於上乎至於自春而徂夏由秋而至冬夏為蕃茂之時冬迺潛伏之際夏氣之至也已踰於下而始於其中冬氣之行也既越於上而始於其標觀乎萬物繁盛無非自中而敷榮一氣伏藏是亦從標而歸本夫如是善言時者必有騐於氣善言氣者必有彰於物論夫品物之生變則四氣之所始可得而推焉本經有曰生因春長因夏收因秋藏因冬又曰彼春之暖為夏之暑彼秋之忿為冬之怒又曰時立氣布如環無端又曰善言氣者必彰於物舉此而推則四序之氣於生化收藏莫不有上下本末之理焉謹對第二道問脣至齒長九分對營脣齒之二脉應手足陽明之經凖度量之九分法金土資生之數葢自脣至齒推其數之所長原始要終悉有理之可考謂貫頰侠口者手陽明大腸之金以循鼻入齒者足陽明胃腑之土金之生數而為四土之生數而為五舉金土之相資推四五之相合所以自脣至齒長九分者誠有謂焉經曰脣至齒長九分其意如此嘗謂大鈞播物斡旋一氣之機元牝賦形備具五行之理形之長短而各有法象體之分寸而各有規繩近取脣齒之微亦法度量之數且以脣者聲之扇而有飛門之名齒者骨之餘迺有戸門之號脣則一翕一張如飛之象齒則或啓或閉如戸之設因末而可以求其本即始而可以要其終脣之所營則頼乎手陽明之經齒之所養則資乎足陽明之脉胡不觀貫頰俠口者手經陽明之所系應於大腸循鼻入齒者足經陽明之所行闗於胃腑大腸屬金而金得四數之主胃腑屬土而土有圍五之用以四數而合五數則以應九數之理自脣後而至齒門則以合九分之長短長之理具五行之機緘分寸之微無一毫之差忒至於此則長短闊狹之在人身者皆有法則之妙存乎其中矣鍼經曰手陽明之脉其支别者上頸貫頰還出俠口又云足陽明之脉下循鼻外入齒中又經曰大腸者肺之府又曰金者肺又云其數四又曰胃者脾之府又云胃圍尺五又云其數五舉此而論之人一身之中各有尺數之可凖葢亦屬乎手足三隂三陽之經矣謹對第三道問其政為明對火當臨於其政明乃顯於斯時葢火本陽熱之生熱乃南方之化究其為體則因附物而後見施於為政乃由中虛而外明燭乎羣物則羣物無隱遁之情耀乎六合則六合無蔽匿之體小如爝火而光亦不泯大致燎原而明乃愈彰然則政者正也其政為明者是亦火之正性也經曰其政為明大意如此嘗謂兩儀奠位散精於五行五行分司各御乎一位司於位也有東西南北居中之異宜專於方也别木火金水與土之常政隨其運之所化因其化之所使故火本南方之化位處離麗之鄉天地之情於此以著萬物之嘉因斯而會且􅄆者齊而萬物與之並行昧者明而天地與之偕昌鑚木煙飛則因陽極而始飛擊石光發則由熱甚而始發觀其所自則附物而後見施於有政則應火而為明以其離卦中虚而善照火體炎上而有光運當不及則命曰伏明之紀氣如太過則取於赫曦之年大而言之則日象火而旁燭無疆小而論之則爝為火而熹微之著其五香散方用沉香木香雞舌香薫陸香麝香之類是通氣散毒者明矣由是推之咽喉腫痛者豈但因熱而生非獨宜寒而療若執以五香性溫而不當用又疑其非是主對咽喉之藥是泥於一曲而治病不求其本也大率有熱則當用寒有寒則當用熱有惡氣結塞者宜用以散毒通氣之藥是皆推源索本隨病施治者也不然則經不曰若臟熱則喉腫塞氣不能通若腑寒則哽哽如有物常欲痛痒多涎唾是以熱則通之寒則補之不寒不熱依經取之寒熱平和病不生矣又聖濟經曰鬰而不散邪氣内實而不通壅滯於肺胃之間攻衝於咽喉之内非諸香之芳美則不能去其惡毒之邪非五香之辛溫則曷能散其結塞之氣觀之本草沉香微溫療毒腫去惡氣木香辛溫去邪氣消諸毒薫陸香專主於風毒雞舌香亦去其惡氣以至麝香辟邪而散惡毒五物擣碎而水煎服使惡散毒除腫消痛愈則咽喉通暢氣道平和乃古人善治之良法也倘若論病而不推其本療疾而不究其源但執咽喉為熱治當用寒殊不知因寒邪兆疾者投之則其勢轉增因惡氣而結塞者用之則其證愈盛至於腫塞不通水漿不下速於危殆者有矣吁咽喉之患誠為不測所起則微所闗則大臨病之工宜須精審固不可一概論也謹對假令法第一道問假令脣瘡候目即節氣當得何脉本因是何臟腑受病發何形候即今宜用是何方藥調理設有變動又當隨脉如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及脩製之法處方對答對陽邪内鬰留於脾胃之中熱氣外薫發為脣瘡之候且口脣者肌肉之本肌肉者脾胃之候脾之與胃以膜相連脣之有瘡因熱所發所以天五之經既失其平和四白之華必見於腫痛是皆熱氣之上薫遂至脣瘡之外發原其本始實脾胃有熱而使然矣目即氣應容平之時脉合微毛之象經曰秋胃微毛曰平儻診彰數脉動見闗部此為中焦之有熱乃見應病之脉也經曰脾部在右手闗上以胃合為府又曰數則為熱本因熱薫脾胃之中瘡發脣吻之上者是也本經曰脾與胃合足陽明之經胃之脉也其經起於鼻環於脣其支脉入絡於脾脾胃有熱氣發於脣則脣生瘡詳此之證熱邪微而未盛病熱淺而尚輕宜以竒方治之經曰近者竒之宜用正一輔二竒方黃連膏主之以黃連一味為正以蘖皮甘草二味為輔三味合而用之使熱毒消散瘡疾復平夫復何憂矣儻或以為輕淺而不顧忽於治療而勿藥復感風寒濕毒之邪必致瘡腫而濕爛乃變為脣𦂳之候矣經曰病成則變復切其脉洪大而數者乃應變病之脉也經曰大則病進又曰數則為熱其證瘡作於脣吻之間疾兼於腫爛之證或冷或熱而不已乍差乍發而遷延故本經曰脾與胃合胃為足陽明其經脉起於鼻環於脣其支脉入絡於脾胃脾胃有熱氣發於脣則脣生瘡而重被風邪寒濕之氣傳於瘡則微腫濕爛或冷或熱乍差乍發積月累年謂之𦂳脣復詳其病豈唯熱毒之已盛抑且風濕之相攻察傅貼外治之注難以成功必服餌内治之藥乃獲全効宜用正二輔四偶方獨活升麻散主之經曰逺者偶之以獨活升麻二味為正以大黃沉香犀角甘草四味為輔六味合而服之内則宣通脾肺之積熱外則消散脣口之腫瘡故𦂳脣之病必得愈矣竒偶之方既具於前脩製之法今列於後治假令脣瘡候正一輔二竒方黃連膏黃連為正味苦寒微寒無毒主熱氣療口瘡生巫陽川谷黃芩龍骨理石為之使惡菊花芫花黒參白鮮畏欵冬花用一兩剉蘖皮為輔味苦寒無毒主肌膚熱口瘡生漢中山谷惡乾漆取皮火炙用半兩剉甘草為輔味甘平無毒主長肌肉觧毒生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志及大㦸芫花甘遂海藻用半兩炙剉右三味為細末以臘月豬脂調成膏子塗患處時時用之治假令變證𦂳脣候正二輔四偶方獨活升麻散獨活為正味苦甘平無毒主風寒所擊止痛生雍州川谷豚實為之使用二兩剉升麻為正味甘苦微寒無毒主風腫諸毒口瘡生益州山谷用二兩剉大黃為輔味苦寒無毒主蕩滌腸胃生河西川谷黃芩為之使無所畏用一兩剉沉香為輔微溫療腫毒去惡氣用一兩剉犀角為輔味苦酸鹹寒微寒無毒主諸毒氣生永昌山谷松脂為之使惡雷丸鎊取屑用一兩甘草為輔味甘平無毒主長肌肉觧毒生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志反大㦸芫花甘遂海藻用一兩炙剉右六味為麄末每服三錢水一盞煎至七分去柤溫服不拘時候謹對第二道問假令咽喉疼痛候目即節氣當得何脉本因何臟腑受病發何形候即今宜用是何方藥調理設有變動又當随脉如何救療各須因本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及脩製之法處方對答對風熱内盛既搏脾肺之經邪氣上攻故作咽喉之痛且咽主地氣而合乎脾經之容納喉主天氣而通乎肺臟之輕清今風熱相搏而經絡失流利之和邪毒攻衝則上焦無宣通之理所以氣之上下否澀而作痛物之嚥納壅滯而為疼由其邪摶於脾肺之經遂有咽喉疼痛之候矣目即九秋届序萬寶告成氣應容平之令脉有中衡之和經曰秋應中衡此應時之平脉也今診其右手之寸闗反見浮數之二脉故為咽痛之脉也何以知之經曰肺部在右手闗前寸口是也又曰脾部在右手闗上是也又曰浮則為風又曰數則為熱本因脾肺受風邪熱氣之侵上焦有壅滯否塞之患其候咽喉不利而為痛矣太平聖惠方云夫咽喉者氣之所通流呼吸之道路若風邪熱氣摶於脾肺則經絡否澀氣不通利邪熱攻衝上焦壅滯故令咽喉疼痛也詳此之病風熱初傷邪氣易去當以竒方治之經曰近者竒之宜用正一輔二竒方桔梗湯主之以桔梗一味為主病之正以升麻甘草二味為佐正之輔三味合而服之使風熱消散脾肺平和咽喉之間疼痛自愈矣設若忽於治療致於淹延熱氣結聚而不散必變為風毒腫痛之證矣經曰浮則為風又曰大則病進又曰數則為熱其候咽喉腫痛者是也太平聖惠方云夫咽喉者氣液之通流脾肺之道路呼吸出入水榖徃來莫不自於咽喉也若隂陽不調脾肺壅滯風邪搏於經絡伏留於上焦攻注咽喉結聚腫痛故名風腫也復詳其病風邪結聚疾勢深重宜以偶方治之經曰逺者偶之宜用正二輔四偶方犀角射干散主之以犀角射干二味為主病之正以天麻防風桔梗甘草四味為佐正之輔六味合而服之使風邪之毒因而消散脾肺之氣得其平調雖變為風毒腫痛之病豈有不愈者乎謹按本草處竒偶二方及脩製之法附之於後治假令咽喉疼痛候正一輔二竒方桔梗湯桔梗為正味辛苦微寒有小毒療咽喉生嵩高山谷節皮為之使畏白芨龍眼龍膽用一兩剉升麻為輔味甘苦平微寒無毒主風腫諸毒口瘡生益州山谷用半兩剉甘草為輔味甘平無毒主解毒生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志反大㦸芫花甘遂海藻用半兩炙剉右三味為㕮咀每服三錢水一盞煎至八分去滓放溫食後細細呷服治假令變證咽喉風毒腫痛候正二輔四偶方犀角射干散犀角為正味苦酸鹹寒微寒無毒主諸毒氣生永昌山谷松脂為之使惡雷丸錯取屑用二兩射干為正味苦平微寒有毒主喉閉咽痛生南陽川谷田野用二兩剉天麻為輔味辛平無毒主諸風生鄆州用一兩細剉防風為輔味甘辛溫無毒主風邪生沙苑川澤惡乾薑藜蘆白斂芫花去蘆頭用一兩剉桔梗為輔味辛苦微寒有小毒療咽喉生嵩高山谷節皮為之使畏白芨龍眼龍膽用一兩剉甘草為輔味甘平無毒主解毒生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志反大㦸芫花甘遂海藻用一兩炙剉右六味為麄散每服半兩水一盞煎至七分去柤放溫食後細細呷服謹對運氣一道問庚午年五運六氣所在所宜處方為對對太極既判兩儀肇分輕清辟乎上而為天統六氣以下臨重濁辟乎下而為地列五行而上奉運則逥薄於太虛之中氣則主適於人事之變於是形氣相感而損益以彰上下相召而盛衰以著是以氣之平和也物阜而民康氣之過減也物衰而民病必也先立其年以知其氣矣今觀庚午之年上見少隂君火司天下則陽明燥金在泉中行太商金運是嵗運行陽干本為太過之年以其金運下加在泉之金名曰同天符之年也經曰太過而加同天符是為平氣命曰審平之紀收而不爭殺而無犯五化宣明其氣㓗其性剛其用散落其化堅斂其類金其政勁肅其候清切其令燥其臟肺其病欬詳此之嵗運同地氣治宜溫熱之藥以治一嵗之氣耳夫應天者為客故動而不息應地者為主故靜而守位左右間氣隨辰以見且初之氣自己巳年大寒至庚午嵗春分六十日有竒上見太陽寒水為之客下臨木位為之主地氣遷燥將去寒迺始蟄復藏水迺冰霜復降風迺至陽氣鬰民反周密闗節禁固腰脽痛炎暑將起中外瘡痬宜用甘熱之藥以調其氣二之氣自春分至小滿六十日有竒上見厥隂風木為之客下臨火位為之主陽氣布風迺行春氣以正萬物應榮寒氣時至民迺和其病淋目瞑目赤氣鬰於上而熱宜用辛凉之藥以調其氣三之氣自小滿至大暑六十日有竒上見少隂君火為之客下臨火位為之主天政布大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作欬喘目赤宜用鹹寒之藥以調其氣四之氣自大暑至秋分六十日有竒上見太隂濕土為之客下臨土位為之主溽暑至大雨時行寒熱互至民病寒熱嗌乾黃癉􅍠衂飲發宜用苦熱之藥以調其氣五之氣自秋分至小雪六十日有竒上見少陽相火為之客下臨金位為之主畏火臨暑反至陽迺化萬物迺生迺長迺榮民迺康其病溫宜用鹹冷之藥以調其氣終之氣自小雪至大寒六十日有竒上見陽明燥金為之客下臨水位為之主燥令行餘火内格腫於上欬嗽甚則血溢寒氣數舉則霧霿翳病生皮腠内舎於脇下連少腹而作寒中地將易也宜用苦溫之藥以調其氣由是必抑其運氣資其嵗勝折其鬰發先取化源無使暴過而生其病也治六氣之藥已布於前調一嵗之方今附於後治庚午年五運六氣正一輔二竒方厚朴湯厚朴為正味苦溫大溫無毒去麄皮剉薑汁炒用二兩天雄為輔味辛甘溫大溫有大毒炮裂去皮臍剉細用一兩乾薑為輔味辛溫大熱無毒用一兩炮剉右三味為㕮咀每服三錢水一盞半煎至七分去滓溫服不拘時候謹對
