body:
  text: 太醫局諸科程文格卷一墨義第一道問故治病者必明天道地理對天不足西北左寒而右涼地不滿東南左熱而右溫其故何也歧伯曰隂陽之氣髙下之理太少之異也東南方陽也陽者其精降于下故左熱而右溫西北方隂也隂者其精奉于上故左寒而右涼是以地有髙下氣有溫涼髙者氣寒下者氣熱故適寒涼者脹適溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常太少之異耳帝曰其于夀夭何如歧伯曰隂精所奉其人夀陽精所奉其人夭帝曰善其病也治之奈何歧伯曰西北之氣散而寒之東南之氣收而溫之所謂同病異治也故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也假者反之帝曰善一州之氣生化夀夭不同其故何也歧伯曰髙下之理地勢使然也崇髙則隂氣治之汚下則陽氣治之陽勝者先天隂勝者後天此天理之常生化之道也帝曰其有夀夭乎歧伯曰髙者其氣夀下者其氣夭地之小大異也小者小異大者大異故治病者必明天道地理謹對第二道問服此水去溫氣對泉水味甘平無毒主消渴及胃熱痢熱淋小便赤澀兼洗滌瘡瘍癰腫令散久服却溫調中下熱氣利小便並多飲之又新汲水百一方云患心腹冷病者若男子病令女人以一杯與飲女子病令男子以一杯與飲又解合口椒毒又主食魚為骨所鯁取一杯水合口向水張口取水氣鯁當自下又主人忽被墮損腸出以冷水噴之令身噤腸自入也又臘日夜令人持椒井傍無與人語內椒井中服此水去溫氣博物志亦云凡諸飲水療疾皆取新汲清泉不用停汙濁暖非直無效固亦損人謹對第三道問肝靑象木對肝青象木肺白象金今肝得水而沉木得水而浮肺得水而浮金得水而沉其意何也然肝者非為純木也乙角也庚之柔大言隂與陽小言夫與婦釋其微陽而吸其微隂之氣其意樂金又行隂道多故令肝得水而沉也肺者非為純金也辛商也丙之柔大言隂與陽小言夫與婦釋其微隂婚而就火其意樂火又行陽道多故令肺得水而浮也肺熱而復沉肝熱而復浮者何也故知辛當歸庚乙當歸甲也謹對脈義第一道問人之居處動靜勇怯脈亦為之變乎對人之居處既有動靜勇怯之不同脈之應見亦隨性情變易之各異蓋稟氣于天立形于地居處之不同也動則陽以擾靜則隂以定故在脈者亦有躁靜之分稟賦之有異也勇則氣以行怯則氣以著故在診者豈無強弱之辨以人形于外既無一定之體而脈應于中乃有變易之候此善診之士必觀人之居處動靜勇怯而察脈為之變者蓋以形諸外而必有驗諸中故也經曰人之居處動靜勇怯脈亦為之變乎其意如此原夫人生于地氣稟于天其生于地也晝作夜息分躁靜之不同其稟于天也肖形賦貌别強弱之有異人性異常脈形隨變故聖人即其如是之形而驗其為變之脈者燭照數計初不能有毫髮之間也蓋嘗求其故矣動則氣行于陽經靜則氣行于隂分氣行于陽經也則脈隨之而動若浮洪者豈非陽之屬乎氣行于隂分也則脈隨之而彰若細沉者豈非隂之類乎此動靜之見于脈者然也勇則氣行而已怯則氣著而病病已于氣行也則診應有常而和平皆無病之形病成于氣著也則診乖其候而變異亦成病之象此勇怯之應于脈者然也以其氣之不常則動靜勇怯既非可以一體觀脈之多變則強弱浮沉尤不可以一診取然則持脈之道又豈可安常守故而昧變通之冝哉考之下文曰診病之道觀人勇怯骨肉皮膚能知其情以為診法也又經有曰脈肥人責浮瘦人責沉即此推之則知診病之道必觀其脈之變者以其人無一定之形而脈亦無一定之候豈可執于膠柱調瑟知常而不知變者乎謹對第二道問寸口脈沉滑者中有水氣對脈朝于寸既彰沉滑之形病在于中必為水氣之候蓋脈分三部寸總諸經沉脈重按而方得病為水而主中則法其潤下之體滑脈往來而流利病為實而主飲則象其流注之性既二脈俱見于寸口則水氣必在于體中是皆積飲稽留而不行水氣停貯而為病故變如斯之脈也經曰寸口脈沉滑者中有水氣厥理若是嘗謂疾之所起未有不因于自縱脈之所變靡有不參于病源故水氣停積居裏分而總謂之中則脈象沉滑見部分而皆應于寸何哉冬日飲湯所以敵于寒氣夏日飲水所以消於熱邪皆適事知節而有常故行津布液而無病儻小渴咽乾因縱飲而不已或內虛熱少因寒飲而太多脾胃守常也猶尅化而內消倉廪或虛也必停積而不散故凡積飲之證皆曰水氣之名診其寸口脈沉者沉為水而主裏按其關前脈滑者滑為飲而有風以沉脈則按指有餘應水屬隂而潤下以滑脈則往來流利類水得風而慓疾故其為病也攻於上則面目有腫滿之形發於外則身體有生熱之證以其中先有水外感於風所以命名曰風水也何以見之下文曰面目腫大有熱名曰風水又經曰積飲成水又朱肱云水氣者皆因飲水過多所致又巢氏曰脾胃虛不能制水又曰滑為有飲又脈經曰沉為水又曰沉為在裏又曰滑為風况夫大渴欲水者猶令與之不足茍縱飲無節積而不化焉得不為水氣之患歟謹對大義第一道問彼春之暖為夏之暑彼秋之忿為冬之怒對積暖而為暑本陽氣因春而為夏積忿而為怒乃隂情因秋而為冬蓋二氣因變而乃通四時由微而至著陽勝固為暑也然不生於夏之時隂極固為寒也本不起於冬之令熙然而暖實夏暑之基凄然而忿乃冬怒之漸故暖未幾而為暑皆陽氣之漸勝忿未幾而為怒本隂情之密移為於此者雖有可見之迹變於彼者實有難明之妙然則春夏以言其氣秋冬以象其情各分於隂陽之主也經曰彼春之暖為夏之暑彼秋之忿為冬之怒大槩如斯嘗謂造化更王於二氣本因微而至著機緘默運於四時必由變而能通故陽之積也由復而至於乾隂之積也由姤而至於坤猶人之生自童稚而至壯大曰加益而不自知猶木之盛自萌芽而至合抱日加長而不自覺是以觀物之妙必觀其微察時之變必察其本信夫陽氣方升於厚載之下而萬象皆春隂氣始凝於太虛之中而一葉知秋方其春也荄者萌而甲者拆孰不知有登臺之樂方其秋也華者成而實者收莫不知有落葉之悲故積陽不已必為夏之暑則草木蕃而金石流積隂不已必為冬之怒則霜露降而氷雪堅寒固變而為暑也然不變於寒之時暑固變而為寒也然不變於暑之月春之暖者乃異時之暑秋之忿者即後日之怒故履霜堅冰其所由來者漸而流金爍石其所著見者微以其陽主於氣隂主於情是皆為於此而生於彼也何以明之王氏曰春暖為夏暑言陽生而至盛秋忿為冬怒言隂少而至壯又經曰陽之動始於溫盛於暑隂之動始於清盛於寒又曰隂陽之往復寒暑彰其兆又曰春夏則陽氣多而隂氣少秋冬則隂氣盛而陽氣衰又曰春夏歸陽為生秋冬歸隂為死即此推之則知造化密移機緘潛運即其微則可以觀其著因其始則可以究其終也謹對第二道問西北之氣散而寒之東南之氣收而溫之對人稟於氣因地勢之不同惟地勢不同故醫之用藥當知治法之不一且均是方也食熱則外實食涼則外弱而其人不能以不異同是氣也散之則為寒收之則為溫而其法不能以不殊故當風髙氣凛之方則欲寒而外散者乃所以去其食熱之害在地土卑濕之處則冝溫而內收者蓋將以治其食涼之疾此稟氣不同則用藥有異皆因地勢之使然則治法不得不爾也經曰西北之氣散而寒之東南之氣收而溫之其意如此嘗謂論方而不論其氣則混寒溫以一致求治而不求其宜則同散收為一法蓋方本無異也而異之者以其有溫涼之氣治本不殊也而殊之者以其有散收之冝是以古人析其土壤辨其方宜者抑豈若是之強為區别哉然則論方而不論其氣求法而不求其宜其可乎抑嘗論之人之處世也飲食起居初無一定之性醫之用藥也溫涼散收亦無一定之宜其在西北者則風髙氣凛其人食熱而外實其在東南者則水濕土卑其人食涼而外弱外實之人則邪不能傷於形體而常起於腑臟之內外弱之人則病不能起於腸胃而多生於腠理之間故因其食熱也而治之者所以宜寒而外散隨其食涼也而療之者所以宜溫而內收故治之以毒藥施之以微針皆散寒之類治之以砭石用之以灸􅌊亦收溫之法然則施治之士豈可昧其方宜同其治療而不知變者乎何以見之下文曰所謂同病異治也故曰氣寒氣涼治之以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也又異法方宜論云一病而治各不同皆愈何也歧伯曰地勢使然也即此推之則知古人為治之妙誠不可一槩而論茍無變通執一藥以盡天下之病守一法以論天下之疾是昧於得病之情施治之體求治愈切而為效愈邈矣謹對第三道問陽之汗以天地之雨名之對論身形之汗泄既本於至陽之氣即天地之雨降斯得其同類之名蓋兩儀雖大而雨有潤澤之道一身雖小而汗有滋通之理雨不自降本天氣臨地而使然汗不自流亦陽氣加隂之所致取而類之也蓋因類而求類即而名之也實能名而可名然則所謂名之者本其法象之似同故其理可以並稱之也經曰陽之汗以天地之雨名之大義若此且夫漉漉之汗初何關乎雨降之時而霖霖之雨本無與乎汗泄之證自其迹而言之則泥於迹而無相通之道取其意而思之則得其意而有可名之理况人之一身與乾坤而並立而體之四大與上下以相參是宜觀雨降之自天如汗流之浹背雲騰於上則沛然而莫之能禦陽發於外則濈然而不能自已彼之功也可以足江河而滋草木此之用也可以潤毛髮而充皮膚以至病在表而汗乃解則亦如霖雨之應時病當汗而表不潤則有類密雲而不雨出而偏沮者乃施澤未周之象多而亡陽者亦霖霪不已之如夫如是則陽之汗豈非類天地之雨乎何以明之王氏曰夫人汗泄於皮腠者是陽氣之發泄爾然其取類於天地之間則雲騰雨降而相似也又經曰陽加於隂謂之汗又曰地氣上為雲天氣下為雨由是觀之陽之汗以天地之雨名之者實其理之自然矣謹對假令論方義一道問素問所載東方青色入通於肝南方赤色入通於心中央黃色入通於脾西方白色入通於肺北方黑色入通於腎皆以臟法五行色通五臟至於金石之類草木之品無非法象之相符也今觀神農本草首卷云丹砂法火色赤而主心是丹砂色赤法南方之火故丹砂之功可以専主乎心也如今之方論所載靈砂桂心之屬皆能治心亦色赤之類如麥門冬逺志之輩亦治心之藥而色不赤何也諸君以醫為業所當講論請陳其意而毋略對物存法象固當博究於根源藥具功能豈在専求於色類夫二氣之散布俾萬物以滋生自其造化而論則隂陽配合各有自然之機因其事物而推則形色性味悉有使然之利故適於器用者取其材色以為要施於藥石者擇其氣味以為先審乎此則丹砂主心而法火即光色瑩赤稟南方氣化之純餘藥治心而安神即物類通靈隨本類功能之驗唯明其色類而法象紀其性用而施為斯通術而循理逹藥物之要也伏承明問素問所載東方青色入通於肝南方赤色入通於心中央黃色入通於脾西方白色入通於肺北方黑色入通於腎皆以臟法五行色通五臟至於金石之類草木之品無非法象之相符也今觀神農本草首卷云丹砂法火色赤而主心是丹砂色赤法南方之火故丹砂之功可以専主於心也如今之方論所載靈砂桂心之屬皆能治心亦色赤之類如麥門冬逺志之輩亦治心之藥而色不赤何也諸君以醫為業所當講論請陳其意而毋略可得而詳議焉嘗觀夫洪造産物本以氣而感寓羣形賦質亦以氣而充成唯氣之所召隨類而不齊故物之所化分數有不等有得天地之中和者如稼穡之致飬有得天地之純粹者如金石之效珍鱗甲羽毛生屬不一要不外於隂陽根莖華實形狀不同悉不逃於氣化是知形色之既備俱有配象而可推且生而後有象象而後有滋滋而後有數三者物之所受也流動而生色感發而布氣成熟而具味三者物之所成也至於性有燥濕材有剛柔體有輕重質有大小雖各賦之於物豈能出於二氣五行之變化哉此所以形氣既具博物者必究其源性味既存用藥者必逹其理則法象之本功效之著因是而兩盡之矣今夫物存五色色合五行八石之至赤者選於丹砂五官之純赤者推於心臟故以丹砂之法火南方神化之所寓心臟之屬火陽精運化之所通以瑩赤之物而主色赤之宫以法火之物而治屬火之臟是謂得其同類必能致於全功然古人究物取形色法象者衆良醫用藥取形色配合者希玉石之有色色之著者多純草木之有色色之變者多雜故本草注但以五石而法五行良由此也如空青法木雌黃法土瑩青純黃得木土二色之正雲母法金磁石法水瑩白純黑得金水二色之正不特此也石英有五色各隨色而補五宫石脂有五色各隨色而補五臟赤芝透丹益心氣以增慧青芝透緑補肝氣以安魂豈唯石類為然草類亦有是也如是則丹砂中外之瑩赤色悠久而鮮華全火化之至精為心經之上藥內以安神明之正外以殺鬼魅之邪不唯取顔色配合之全亦以取材性神靈之正也若夫靈砂色赤非本色也乃硫黃汞白之所化桂心色赤非純赤也有澤黑皮黃之所包特以硫汞二氣之存因火而感之必安於心氣肉桂木中之靈取心而用之則尤養於心神本非以色赤而言也麥門冬為君有調中保神之效逺志為君得定心同志之升以類求之不止此焉松下茯苓抱根而有神也用之去木能益志而心開藕上蓮實通中而至潔也用之取肉能養神而心喜亦皆以性味功效為用奚以形色法象為事哉大抵神農嘗藥物原性味以紀功天師明治法因氣味以致用香湊脾腥湊肺以氣而主五臟也酸入肝苦入心以味而攻五臟也因嵗而言色者有之矣嵗木不及其穀蒼是也隨方而定色者有之矣南方赤色其穀黍是也雖有法象之理然非治療之機其他如鐵落治狂取質之重而形色不存蘭草治渴取氣之芳而形色不與又豈若本草以大小色類子母兄弟不可同行之説而施用乎要以得五行之正者可以類推受五氣之偏者難以例舉故石膏滑石皆白而不聞専主肺代赭鉛丹皆赤而不聞専治心如此色類言之則似相違戾矣所以丹砂法火主心之説實取其材性之能因以五行而附會爾用藥之法誠不必泥可也故圖經序云昔神農嘗百草之滋味以救萬民疾苦又曰藥有酸鹹甘苦辛五味又有寒熱溫涼四氣及有毒無毒繼之曰良醫以意量得其節也內經氣味之説兹不復言聖濟經曰物有氣臭有性味交取互用以為虛實補㵼之法由是推之元牝賦形形色法象者固不可以不究逹士論藥藥物氣味者尤不可以不明審其性用而但取夫材之良紀其功效而勿拘於物之合然後權通而意使致用而協宜斯為醫道之淵微逹藥理之要妙也謹對假令法第一道問假令虛勞盜汗候目即節氣當得何脈本因是何臟腑受病發何形候即今冝用是何方藥調理設有變動又當隨脈如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對形神妄用體因虛極以成勞陽氣不充汗因寐出而名盜蓋形設乎外神守於中形太用則勞也陽氣失衛固之和神太用則耗也真氣無固密之用因其安卧則陽氣入行於隂經失其充營則津液發逹於形表是以寐之已熟身體漉漉而常濡寢之方濃汗液津津而常潤乘卧而出於肌表遇覺而止於皮膚所以類盜而潛行名盜汗而為候無非虛勞之使然矣目即氣序當春盛德在木天溫地發二氣至此而氤氲隂降陽升品彚屆斯而榮美萬物始生而未盛六脈微弦而未隆斯為春時之平脈也經曰春胃微弦曰平今反診得虛弱而不實細微而不足斯為應病之脈也經曰脈虛弱細微皆為盜汗脈也本因外勞其形內損其神陽氣無緻密之和津液有妄出之咎其狀遇卧而汗出潛行而如盜也巢氏云盜汗者因眠睡而身體流汗也此由陽虛所致詳此之證病在外而尚淺治處方而用竒經曰近者竒之冝用正一輔二竒方黃耆湯以黃耆一味為主病之正以牡蠣麻黃根二味為佐正之輔三味合而服之使陽氣外密津液內固則虛勞盜汗之候必獲愈矣設若忽於微細怠於服藥致陽氣轉虛津液日耗形體羸瘠而不充肌膚瘦悴而不澤則知病必變為虛勞羸瘦之候也經曰病成而變復診其脈小弱以澀謂之久病又巢氏曰夫血氣者所以榮養其身也虛勞之人精髓萎竭血氣虛弱不能充盛肌膚故羸瘦也又曰久病不已令人羸瘠枯瘦心氣不足亡津液故也再詳此證積虧成損病久已深非竒方之可去必偶制之可行經曰竒之不去則偶之宜用正二輔四偶方鹿茸石斛湯以鹿茸石斛二味為正以黃耆當歸乾地黃桂四味為輔六味合而服之血氣日滋精髓日盛則肌膚充滿而漸復於常也大抵治病之法必當分于輕重處方之冝實不逃於竒偶要在適事為故而效如影響謹按本草逐藥主療及修製之法處竒偶二方列之於後治假令虛弱盜汗候正一輔二竒方黃耆湯黃耆為正味甘微溫無毒補虛損五勞生川郡山谷白水漢中惡龜甲蜜炙用一兩銼牡蠣為輔味鹹平微寒無毒止汗生東海池澤貝母為之使惡麻黃吳茱茰辛夷火煅取粉用半兩麻黃根為輔味苦溫無毒能止汗生晉地及河東用半兩銼右三味㕮咀每服三錢水一盞半煎至七分去柤溫服不拘時候治假令變證虛勞羸瘦候正二輔四偶方鹿茸石斛湯鹿茸為正味甘酸微溫無毒主虛勞羸瘦火燎去毛酥炙令黃用二兩銼石斛為正味甘平無毒主虛勞羸瘦生六安山谷水傍石上陸英為之使惡凝水石巴豆畏殭蠶雷丸去根用二兩銼黃耆為輔味甘微溫無毒補虛損五勞羸瘦生川郡山谷白水漢中惡龜甲蜜炙用一兩銼當歸為輔味甘辛大溫無毒補五臟生肌肉生隴西川谷惡䕡茹畏菖蒲海藻牡蒙酒洗去土及蘆頭用一兩銼乾地黃為輔味甘苦寒無毒填骨髓長肌肉主五勞七傷生咸陽川澤黃土地者佳惡貝母畏蕪荑去蘆頭用一兩銼桂為輔味甘辛大熟有小毒主理踈不足生桂陽去粗皮用一兩銼右六味㕮咀每服半兩水二盞煎至一盞去渣溫服不拘時候謹對第二道問假令傷寒悸候目即節氣當得何脈本因是何臟腑受病發何形候即今宜用是何方藥調理設有變動又當隨脈如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對逆府藏而受邪因名傷寒之病昧汗下而停飲遂成悸動之疾蓋傷寒則其經有六悸動則其源有二或因攻發氣虛而不制於水飲或因陽病熱少而不消於水漿引飲過多停於胸臆之內與水無厭留於膺膈之間殊不知心屬火而惡水裏因虛而畏寒水乘於心使神氣之妄動水積於裏致正氣之弗寧故築築然惕惕然而不安必怔怔然忪忪然而無定夫如是傷寒之悸豈不為氣虛停飲之所致者哉目即三春屆候萬物發陳陽氣方升故脈有耎弱之象品彚始育故診有寬虛之形是以耎而弱寬而虛乃為應時之弦脈茍或切之而脈如轉索持之而診若切繩斯為緊脈之形乃應傷寒之悸也仲景曰假令咳者坐飲冷水故令脈緊也則緊為停飲者是矣不特此也仲景又曰緊為寒脈經亦曰趺陽脈浮少陽脈緊心下必悸此緊為傷寒悸者明矣本因冬感殺厲之氣病為傷寒之名或汗下後而引飲不化或太陽病而飲水過多其候水停心下而築築悸動者是矣巢氏曰悸者動也謂心下悸動也此由傷寒病發汗已後因又下之內有虛熱則渴渴則飲水水氣乘心必振寒而心下悸也太陽病小便不利者多飲水心下必悸小便少者必苦裏急夫脈浮數法當汗之而愈下之身體重心悸不可發汗當自汗出而解所以然者尺中微裏虛表實津液自和便自汗出愈詳此之病邪氣雖傷而未致於傳變水飲雖停而未致於深重惟竒方之可療也宜用正一輔二竒方茯苓湯以茯苓一味為主病之正以半夏生薑二味為佐正之輔三味合而服之使水飲之消散俾正氣之安寧則悸動之證何復而有矣設若治不求本水飲無自而除療不窮源正氣無由而定殊不知水性流散病變多端浸於肺而為喘為咳停於胃而為􅎪為噎溢於皮膚則病生腫滿漬於腸間則疾成泄利夫若是者此皆病成而必變也始則氣虛停飲而為悸今則飲盛肺浮而為喘復切其脈既彰洪大之形再詳其診仍兼盛滿之象故知其病必變傷寒喘促之候也經曰大則病進又曰上盛則氣髙巢氏曰傷寒太陽病下之微喘者表未解故也夫發汗後飲水者必喘以水停心下腎氣乘心故喘也以水灌之亦令喘也復審變病之候治非前證之比竒方不能及也當用偶方治之經曰竒之不去則偶之冝用正二輔四偶方厚朴杏核仁湯以厚朴杏核仁二味為正以半夏茯苓桂乾薑四味為輔六味合而服之使傳變之邪豁然而散致稽留之飲釋然而消肺臟安和於中正氣調順於內呼吸有常而喘息自定此其施治之效矣大抵病分輕重方别竒偶前證病輕而用以竒後證勢重而制以偶故為治病之要法立方之妙論也故經有曰君一臣二竒之制也君二臣四偶之制也正此之謂謹按本草逐藥主療及修製之法處竒偶二方列之于右治假令傷寒悸候正一輔二竒方茯苓湯茯苓為正味甘平無毒主恐悸及膈中痰水生太山山谷大松下馬藺為之使惡白蘞畏牡蒙地榆雄黃秦艽龜甲去皮用一兩銼半夏為輔味辛平生微寒熟溫有毒主傷寒及消心腹胸膈痰熱生槐里川谷射干為之使惡皂莢畏雄黃生薑秦皮龜甲湯浸七次去滑曝乾用半兩銼生薑為輔味辛微溫主傷寒上氣生犍為川谷及荆州揚州秦椒為之使殺半夏毒惡黃芩黃連天鼠糞用半兩切右二味㕮咀入生薑片和勻每服三錢水一盞半煎至八分去柤溫服不拘時候治假令變證傷寒喘候正二輔四偶方厚朴杏核仁湯厚朴為正味苦大溫無毒消痰下氣生交趾寃句乾薑為之使惡澤㵼寒水石硝石去粗皮塗薑汁炙乾用二兩銼杏核仁為正味苦甘平無毒主咳逆上氣湯浸去皮尖用二兩炒銼半夏為輔味辛平生微寒熟溫有毒主上氣生槐里川谷射干為之使惡皂莢畏雄黃生薑秦皮龜甲湯浸七次去滑曝乾用一兩銼茯苓為輔味甘平無毒主胸脅逆氣膈中痰水生太山山谷大松下馬藺為之使惡白蘞畏牡蒙地榆雄黃秦艽龜甲去皮用一兩銼桂為輔味甘辛大熱有小毒利肝肺氣生桂陽去粗皮用一兩銼乾薑為輔味辛溫大熱無毒主胸滿咳逆上氣生犍為川谷及荆州揚州秦椒為之使惡黃芩黃連天鼠糞炮微裂用一兩銼右六味㕮咀每服五錢水二盞煎至一盞去渣溫服不拘時候謹對運氣一道問甲子年五運六氣所在所宜處方為對對太極未判之先則名為混沌太極既判之後則氣有隂陽清陽上積以為天濁隂下辟以為地寒暑燥濕風火由是而布於穹窿木火土金水火於斯而列於磅礴五運經橫於氣交至神宰制於橐籥司天在泉者即年辰而可考統運主氣者自支干而乃明陽年則為於太過應陽道而常饒隂年則為於不及應隂道而常乏或天與運符而謂之天符或嵗與運會而謂之嵗會茍三合平治之年為太一天符之紀其平和也則德化政令及於物而應於人或過減也則勝復盛衰及於人而見於物要當察其所在而施於藥物審其所宜而施於方治和其運而調其化折其鬱而資其源髙者抑之而不致於太盛下者舉之而不致於太衰使上下而無相奪倫俾氣運而得於平治自非聖人存仁民惻隱之心更相問難著而為書則嵗之氣運何自而明調之正味何自而知矣考之內經有曰先立其年以明其氣今觀甲子之年甲為諸干之先故天氣始於甲子為衆支之首故地氣始於子子甲相合而嵗紀始立君臣答問而氣運方明是嵗也上見少隂君火之司天中行大宫之土運下臨陽明燥金之在泉以陽干復遇於陽支兩陽相配故為太過之年經曰陽年為太過正此謂也土運有餘名曰厚阜之紀經曰厚阜之紀是謂廣化厚德清靜順長以盈至隂內實物化充成煙埃蒙鬱見於厚土大雨時行濕氣乃用燥政乃辟其化圓其氣豐其政靜其令周備其動濡積并結其德柔潤重淖其變震驚飄驟倒潰其經足太隂陽明其臟脾胃其病腹滿四支不舉大風迅至邪傷脾也詳此之嵗乃同地者溫熱化宜用溫熱之藥治其一嵗之過愆夫天氣運動而不息則為之客地氣鎮靜而守位則為之主左右間氣以顯於其間上下加臨必布於其內且初之氣自癸亥年大寒節寅初一刻交入甲子年初之氣分終六十日而餘八十七刻半至春分日子丑時夜半止上見太陽寒水為之客下臨木位為之主地氣遷燥將去寒乃始蟄復藏水乃氷霜乃降風乃至陽氣鬱民乃周密關節禁固腰脽痛炎暑將起中外瘡瘍冝用甘熱之藥治其氣爾二之氣自春分節子中之左交入二之氣分終六十日而餘八十七刻半至小滿日戌之後四刻止上見厥隂風木為之客下臨君火為之主陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱宜用辛涼之藥治其氣爾三之氣自小滿節亥初一刻交入三之氣分終六十日而餘八十七刻半至大暑日酉正止上見少隂君火為之客下臨火位為之主天政布大火行庶物蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤宜用鹹寒之藥治其氣爾四之氣自大暑節酉中之北交入四之氣分終六十日而餘八十七刻半至秋分日未後四刻止上見太隂濕土為之客下臨土位為之主溽暑至大雨時行寒熱互至民病寒熱嗌乾黃疸鼽衄飲發宜用苦熱之藥治其氣爾五之氣自秋分節申初一刻交入五之氣分終六十日而餘八十七刻半至小雪日午正止上見少陽相火為之客下臨金位為之主畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康其病溫宜用鹹冷之藥治其氣爾終之氣自小雪節午中之右交入終之氣分終六十日而餘八十七刻半至大寒日辰正之後四刻止上見陽明燥金為之客下臨水位為之主燥令行餘火內格腫於上咳喘甚則血溢寒氣數舉則霧霧翳病生皮腠內舍於脅下連少腹而作寒中地將易也宜用苦溫之藥治其氣爾由是抑其運氣資其嵗勝折其鬱發先取化源使暴過不生苛疾不起治六氣之藥已布於前調一嵗之方今附於後治甲子年五運六氣正一輔二竒方附子湯附子為正味辛甘溫大熱有大毒生犍為山谷及廣漢地膽為之使惡蜈蚣畏防風黑豆甘草黃耆人參烏韭炮微裂去皮臍用一兩銼乾薑為輔味辛溫大熱無毒生犍為川谷及荆州揚州秦椒為之使惡黃芩黃連天鼠糞炮微裂用半兩銼术為輔味苦甘溫無毒生鄭山山谷漢中南鄭防風地榆為之使用半兩銼右三味㕮咀每服三錢水一盞半煎至八分去渣溫服不拘時候謹對
