  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0039_WYG_000-1a, image: WYG0743/WYG0743-0001a.png}
body:
  text: 提要太醫局程文九卷醫家類臣等謹案太醫局程文九卷宋時考試醫學之制也其命題有六一曰墨義試以記問之博二曰脈義試以察脈之精三曰大義試以天地之奧與藏府之源四曰論方試以古人製方佐輔之法五曰假令試以證候方治之宜六曰運氣試以一嵗陰陽客主與人身感應之理考宋史醫學初𨽻太常寺元豐間始置提舉判局設三科以教之曰方脈科針科瘍科凡方脈以素問難經脈經為大經以巢氏病源龍樹論千金翼方為小經針科瘍科則去脈經而增三部針炙經常以春試學生願與者聽逮崇寧間改𨽻國子監分上舍內舍外舍其考試法第一場問三經大義五道次場方脈及臨證運氣各二道針科瘍科試小經大義三道運氣二道三場假令治病法三道中格髙等為尚藥局醫師以下職乾道中罷局而存御醫諸科後更不置局僅存醫學科淳熙中又稍變其制焉此太醫局係紹熙二年後所置程文以墨義為第一道較舊制又稍異矣其裒為一集不知何人所編世亦别無傳者今從永樂大典中排纂得墨義九道脈義六道大義三十七道論方八道假令十八道運氣九道謹釐次為九卷其文皆通貫三經及三部針灸之法暨金石之品草木之性辨析精微足資啓發蓋有宋一代于醫學最為留意自皇祐中於古來經方脈論皆命孫兆林億髙保衡等挍刋頒行垂為程式故學者沿波討流各得以專門名家觀于是編可以見當時討論之詳矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書太醫局諸科程文格目録第一卷原牒原序墨義三道脉義二道大義三道論方一道假令二道運氣一道第二卷墨義三道脉義二道大義三道論方一道假令二道運氣一道第三卷大義五道論方一道假令二道運氣一道第四卷大義五道假令二道運氣一道第五卷大義五道論方一道假令二道運氣一道第六卷大義五道論方一道假令二道運氣一道第七卷大義五道論方一道假令二道運氣一道第八卷脉義二道大義三道論方一道假令二道運氣一道第九卷墨義三道脉義二道大義三道論方一道假令二道運氣一道太醫局諸科程文格原牒嘉定五年十月十四日准尚書省劄子禮部申據太常寺申據太醫局申承成安大夫特差判太醫局何太任公文照對本局自來依准指揮以十三科取醫士其文體格式並係用崇寧之制迄今遵行然契勘從前脫離場屋及見今䝉被教養者大扺止皆京邑輔郡之人甚非聖朝設科立學以待天下醫士之意蓋緣居常中選程文及諸科當習篇目未嘗流布是以外方之士不知蹊徑雖欲從之而不可得大任不才具員深愧無補每感於斯遂率本局教官搜括從來合格程文拔穎取尤每科各列三場仍分類諸科當治之經冠於篇首大任今欲開板流傳庶使外方之士知所矜式翕然肯來上可無負朝廷待遇之意今録草本一部隨狀見到伏乞寺廷繳申省部備申朝廷聽候指揮以憑遵守施行申寺侯指揮本寺所據太醫局備據判局成安何大夫所乞事理備録在前并程文草本一部五册隨狀繳連見到伏乞省部備申朝廷取自指揮施行申部候指揮右所據太常寺申到事理備録在前本部今勘㑹如䝉朝廷從太官所乞徑劄下本局施行上件事理伏乞朝廷指揮施行侯指揮右劄付太醫局從所申事理施行准此太醫局諸科程文格原序昔孟氏有言太匠誨人必以規矩學者亦必以規矩蓋為匠而舍規矩則無以致其巧為學而舍規矩則無以知其道况醫之為事功用甚博學者其可以易言之自神農嘗百草黃帝岐伯相問難而醫始有書自周人建六官設醫師瘍醫之職而醫始制祿自唐貞觀立醫學開元置博士如國子教生徒而醫之教始盛皇朝崇寧中課試有式而取士之制備矣其書參天地契隂陽察人經絡血脉以起百病之本故能轉劇為愈變死為生上可以事君親次可以濟人又其次可以攝生故歷代帝王崇尚不廢賢能智巧之士盡心於是而名垂史筆方册者昭然也六飛南幸修舉舊章乃復局學設判局以為之長列教授以分其教又有長諭職事綱領其徒三嵗取士與科舉同月書季考與文武二學同大方脉至書禁凡十有三科然俱以七經為本亦如六藝之文皆聖賢之格言大訓學者所當篤意也其文則有墨義脉義大義論方假令運氣六者之别皆崇寧之制也墨義者欲觀其記問之賅博也脉義者欲觀其察脉之精審也大義則推明天文地理之奧腑臟受病之源論方則辨析古人用方之意假令則假設證候方治之疑發為問目以驗其識趣之髙下運氣則推究一嵗隂陽客主以論治療之大體文之典實有據者為中格不貴泛引他書故其辭簡朴而不得出意見竒也大任寡識謭才濫司是職每惟國朝設科立學之意蓋欲網羅天下之良才今也局學生徒幾三百員率皆京邑輔郡之人外此豈無遺逸得非自來諸科所習篇目及課試之文未嘗流布逺方之士無所指南雖欲從之而不可得大任深感于斯偶幸一時教官皆博習醫經樂於作成遂相與搜括近年合格程文拔頴取尤每科依式各列三場仍分類當治之經冠於篇首捐俸鋟梓以廣其傳使凡有志於斯者得所矜式翕然肯來儻異才由是而出庶無負科目之設大任固不敢以大匠自視學者其可忘孟氏之訓不以為規矩乎若夫非常之彥道貫三才識窮萬有如古之論醫以及國原診以知政者大任方將率諸生以從其後敢以斯文示之嘉定五年仲秋朔旦成安大夫特差判太醫局濠梁何大任序太醫局諸科程文格原序考證第一頁前六行原本作醫師疾醫之職疾醫當是瘍醫之訛謹改正
