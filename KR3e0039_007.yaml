body:
  text: 太醫局諸科程文格卷七大義第一道問吾上知天文下知地理天地夫人教吾禁名能禁疫鬼對惟吾身於天地能通文理之機故天地之夫人教吾禁疫鬼之法且天有文華而列於穹窿地有井里而處於磅礴人居覆載之中位在氣交之分仰觀於天也上則可以知其文俯察於地也下則可知其理四時有疫鬼之氣故天后教吾以禁名一嵗有瘟癘之邪故地后授吾以禁法斷疵癘以消除辟瘟疫以退散以其能窮天地之機故天地夫人教我以禁疫之法矣經曰吾上知天文下知地理天地夫人教吾禁名能禁疫鬼其意若此原夫乾象穹窿非智淺之可測坤元廣博非悟性之難明測之者窮是理而靡所不知明之者逹是道而無所不曉惟能得貫通之機故能傳呪禁之法今也天象昭垂地形厚載虹霓雲霧日月星辰凡緯於天者謂之文山嶽河海分野州域凡麗於地者謂之理天以文而列於上吾則仰觀而可知地以理而辟乎下吾則俯察而可盡是故天皇夫人教我以禁疫之名地皇夫人授我以去邪之法茍疫鬼之干正或瘟氣之害真以至四時之間氣序不調而非節一嵗之內長幼有病而似同或謂時行之氣亦名瘟疫之邪持此禁呪之法治其疫癘之邪自非先聖有好生之德著書立篇流傳於後世者其禁法何所自而有哉經曰夫道者上知天文下知地理又曰天有八紀地有五里又下文曰六壬六癸百鬼速出急急如律令又仲景曰一嵗之內長幼之病多相似者此則時行之氣也然則禁法之妙固自本乎天地夫人之傳授則凡見行持作用之際尤不可以不謹也謹對第二道問凡欲學禁先知五戒十善八忌四歸對五戒十善凡學法則貴於先明八忌四歸欲持禁必冝於備曉且法不可以易持禁不可以輕受戒總有五當持於未學之先善總有十欲知於未行之始妄不親於八忌亂不犯於四歸修德以治其身正已以參乎道由是萬神扶助則禁法通行而靈驗矣經曰凡欲學禁先知五戒十善八忌四歸其意如此嘗謂三才之間惟人最貴萬物之內有生最靈法清淨則與道合同謹齋戒則與神胥應於是神靈則禁無不靈已正則法無不正此行法之道畢矣今也學禁有要持戒為先明之則清淨而禁法通行昧之則昏濁而呪術徒用五戒冝避也如殺盜淫妄之類十善可行也皆恭謹慈善之屬八忌者勿近於汚濁四歸者不犯於邪穢有戒有善貴知於欲學之初有忌有歸當明於受持之始修身合道則萬神扶助而符禁通靈正已無偏則衆聖護持而呪術有驗或取於三才之和或借於三光之氣誦神祕之密言噀清淨之法水將以禁病而病無不除施於禁邪而邪無不伏自非謹持於齋戒修治於形神則欲其禁法之行者難矣經曰凡受符禁者皆清淨齋戒百日不得近死亡産乳房室又曰凡持禁之法當齋戒百日精心不行淫欲惟得清淨沐浴著新淨衣口常不出惡言罵詈精思淨念勿生異想又曰皆能治此者萬神扶助禁法乃行由是觀之不知戒謹則豈足以與語行禁之法哉謹對又大義第一道問天陽在上人陽在中隂陽在地水從下流唾腫消化對禁隂邪之偏勝取三才陽氣之和呪水液之下流散一身水腫之病且天屬陽而在上故陽中有隂地屬隂而在下故隂中有陽人居天地之間形稟隂陽之氣濕傷於外也故水濕浸漬而腫必生飲積於中也故水液散漫而腫亦作禁之有法假三才純陽而制其隂濕之害呪之有理使水濕下逹而去其濡潤之邪雖水腫之洪隆得呪唾而消化故知禁法之妙其神捷之若是也經曰天陽在上人陽在中隂陽在地水從下流唾腫消化其意如此嘗謂隂能制陽陽能制隂者此隂陽之常理水曰潤下火曰炎上者亦水火之自然明二氣之無偏逹五行之妙用夫如是則禁呪之術始可以語其機矣今也天處乎上本積陽之所成故天雖陽也而肅肅之隂出焉地處乎下由積隂之所致地雖隂也而赫赫之陽發焉人身法天而象地形體負隂而抱陽惟均等而得於平治無偏勝而底於安平今隂邪偏勝於身腫滿外見於體或水濕之所致本濕傷而氣血不行或水飲之使然由水勝而濕邪不散聖人立禁腫之法取陽氣於三才之分聖人設禁腫之言呪水流於至下之鄉以陽和而制於濕邪故濕邪自釋即水流而導其水氣故水氣自行必也唾之則以正而去邪故腫無不消噀之則以平而却病故腫無不化然則水腫之病得其行禁法者則效隨手驗病無不差矣經曰天有隂陽地亦有隂陽又曰人之生也負隂而抱陽又曰足脛腫曰水又曰濕勝則濡㵼甚則水閉胕腫洪範云水曰潤下于以是而論呪禁之法啓自誠心之所感非輕慢褻瀆之所學至於臨危施治以真氣相資以正氣相輔腫毒之患烏能不成效乎謹對第二道問六甲六乙邪鬼自出六丙六丁邪鬼入冥對行禁法以治病呼天干木火之神即正氣以去邪逐肝心客忤之鬼蓋六甲六乙應木德於東方六丙六丁應火干於南位神存諸干假神化以去其邪干寓五方資干德以祛其鬼儻肝魂不足致外邪客忤於中心神稍虧使鬼氣凌犯於內稱甲乙之木神則安其魂而邪出於外祝丙丁之火氣則保其神而鬼入於冥故鬼邪客忤之氣即此而可禁矣經曰六甲六乙邪鬼自出六丙六丁邪鬼入冥之意夫天地區分皆五行之宰制人身兆立亦五行之斡旋得其常則為正為和失其常則為邪為病所以禁鬼之法故必取於五行祛病之功故必贊於十干若此者以天地之正氣去人身之邪氣也是以五臟虧虛七神衰弱致外邪之浸傷受鬼氣之客忤其候則腹痛而吐利其症則氣衝而悶絶禁之有法必稱十干之神呪之有要必取五行之氣六甲六乙也則干屬東方之木六丙六丁也則干屬南方之火肝藏魂而屬木呼木干則肝魂自安心藏神而法火贊火干而心神自定魂安於內逐邪氣而出體神守於中祛鬼厲而入冥舉而言之則其干有四通而論之則其干有十從類而應於五臟隨合而却於外邪所以聖人禁客忤之鬼必取其十干之名何以言之下文曰六戊六已邪鬼自止六庚六辛邪鬼自分六壬六癸邪鬼自死急急如律令又巢氏曰小兒神氣軟弱忽有非常之物或未識之人犯之與鬼神氣相忤而發病謂之客忤也又曰人有魂魄衰弱者則為鬼氣所犯忤又隂陽書曰甲乙屬木丙丁屬火即此觀之資天地五行之氣去人身五臟之邪捨神禁之妙又曷能至是哉謹對第三道問逢水難土王擊之對若逢水難以戕其生必呼土王以致其擊蓋患處異途治擊同類或水運太過之年或水鬱暴發之際臨深履危而偶值於洪濤登舟涉險而忽逢於流衍遇見則乃為水難禁法則擊以土王土王乃中央之尊土盛則擊制於水如是則因其呪禁得以平之故聖人流傳後世附於書禁之門以備一時捍禦之無措也經曰逢水難土王擊之其意如此嘗謂在天為雨露在地為泉源因地而為曲直因器而成方圓至柔也其流則有經趣下也其行則有理𣲖分萬殊而所適不同會於一源而所本有異善為時雨使竭者枯者皆得以被其澤若彼鬱發致苖者秀者因得以為其害何哉嵗水太過鬱發暴行及於物而有霖霪驟注之愆在於人而有漂泄沃涌之患以至臨險或逢於水厄登舟忽至於洪波出乎倉卒至於無措有祝禳之法可以脫難有書禁之方可以備急呼以土王擊其所勝水得土而乃平土制水而乃治庶可以免洪濤沒溺之虞因是以得全生安平之自所以土擊其水取夫相尅之義兹前賢流傳設為書禁以備不測之難也內經曰太過何謂岐伯曰水曰流衍又曰水鬱之發陽氣乃辟隂氣暴舉又曰水得土而竭又隂陽書曰土尅水下文曰逢土難木王擊之逢刀難陽精擊之由是禁法之行各有尅制之相擊要不可以妄求也謹對假令論方義一道問假令千金翼方載太白仙人禁腫一法云一二三四五六七百腫皆疾出急急如律令竊詳腫之為病固自不一無非有所壅結而成也今獨念此七字而令百腫皆疾出何以言之甚寡而效之甚速如此請論立法之意對邪盛而正衰者受病之本始法簡而效著者行禁之神功蓋疾病兆作也能明根本之源則可以行治療之方禁呪施用也能通簡妙之法則可以臻急速之效能明於此則太白仙人之禁腫一二至七之呪言精意貫行之無有不驗者矣今觀前問假令千金翼方載太白仙人禁腫一法云一二三四五六七百腫皆疾出急急如律令竊詳腫之為病固自不一無非有所壅結而成也今獨念此七字而令百腫皆疾出何其言之甚寡而效之甚速如此請論立法之意大哉簡易之法請得而論之矣嘗謂兩儀位乎上下民庶處於中央感其正氣也則為平而為和受其邪氣也則為災而為病故受病之始既因邪氣之所致則治病之法必假正氣而可除或施湯藥之功或行針艾之制或導引而按古法或禁呪而布神方悉以正道而去邪誠心而拯苦所以療病皆愈也今夫腫疾外作病本不同有因濕熱之毒侵客於形體之間有因風寒之氣入舍於經絡之內使經脈壅滯而不暢致血氣凝澀而不通結於形表之中發為諸腫之病故黃帝內經曰氣傷痛形傷腫又曰因於氣為腫巢氏諸腫候曰腫之生也皆由風邪寒熱毒氣客於經絡使血氣澀而不通壅結皆成腫也至於無頭無根者由風邪之內客有頭有根者本寒邪之內凝色赤而作痛者因熱毒之所攻不赤而不痛者因風寒之未盛有發為堅癢有腐為血膿或著胸背手足之間或生頭項臍腹之分言其候則非一論其名則多端故古人總而言之今曰百腫者也况腫疾之治方法具存湯液醪醴治其中針石鑱艾治其外或塗藥以散或傅膏以摩煎藥汁以外淋行水角而速射凡治療之法皆欲去邪而安正則書禁之設亦為持正而去邪然太白仙人以一二三四五六七之呪使百腫皆疾出者深有説焉蓋聖人立教以揆物至於十而乃終古人取數以行禁至於七而足用五星配於日月合七政而照臨萬物北斗處於帝座列七星而斡旋四方七曜周旋也四方廣照以至明而釋幽暗之愆七星定位也衆宿拱奉以正氣而鎮鬼魊之厲所以禁呪之立法多取七數以為先如瓦器盛水以七盞而祭神魁罡效法以七舉而為步取氣則以七咽為凖持齋則以七日為期或七遍以誦文或七吸而納氣審乎此則立法自一而至七者深有旨也夫一以應天而在上二以應地而處卑三則象於三才四則合於四序五以法五行之數六以參六律之音至於七數而呪成則效七星而羅列皆乾坤正氣之所寓造化真氣之所存仙人之法獨取此數以治腫而不治他疾者亦有意也以他病之生皆邪氣散入而作獨諸腫之證因雜邪結聚而成所發之處有髙下之不常所得之源有隂陽之不定故取造化七數隂陽在中包羅總念而治之取其以至正之法除不正之邪一唾隨呪而速行百腫乘時而疾出雖大腫如山堅髙而可以破小腫如粟碎雜而可以消應若影響不容毫髮之遲急如律令不容頃刻之緩此太白仙人之呪簡易徑捷與其餘禁腫之法不同也譬如九針之論上應天地四時隂陽亦具數而立法云一天二地三人四時五音六律七星八風九野身形亦應之是用針之道有九數之所存如行禁之方有七數之所寓論其法象之意其揆一也由是觀之天下之事唯真可以銷偽萬古之道唯正可以治邪或取於五方之神或求於造物之數上聖包羅而立法智士精誠而奉行則幽顯感通病邪應效行書禁以療疾冝留意於此焉謹對又假令法第一道問假令金瘡血出不止候目即節氣當得何脈本因是何臟腑受病發何形候即今冝用是何方藥調理設有變動又當隨脈如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對金刃所犯既成瘡而未愈皮膚因損斯出血以無時且犯於刃病為金瘡其輕也傷皮肉筋骨之間其重也害腸胃腑臟之內使榮衛不以循其道致血流不得以運乎經隨瘡口之溢出則未嘗而暫止乘孔穴之散漫則無時而或斷故金瘡血出不止者良由是矣目即春候屆時陽和用事萬物於是而方生人氣屆斯而未定脈應中規而曰平今反診得澀脈之形者故為失血之脈也經曰澀則少血本因金刃所傷其證出血而不斷者是也巢氏曰金瘡血出不斷其脈大而止三七日死金瘡血出不止前赤後黑或黃或白肌肉腐臭寒䩕強急者其瘡難愈亦死詳其證而未危得其疾而未久冝用正一輔二竒方麒麟竭散以麒麟竭一味為主病之正以花乳石硫黃二味為佐正之輔三味合而傅之使瘡合血止者是其藥之效也設若違師治療用藥乖冝亡血過多而心守不安失血太甚而驚悸不定故知必變為金瘡驚悸之候也巢氏曰金瘡失血多者必驚悸以其損於心故也心主血血虗則心守不安心守不安則喜驚悸悸者動也復切其脈指下動搖之形者故為驚悸之脈也經曰動為痛為驚再詳其證病勢甚於前時疾證生於神臟用竒方傅貼而弗及必偶制服餌而可效冝用正二輔四偶方人參當歸散以人參當歸二味為正以丹砂芎藭乾地黃茯苓四味為輔六味合而服之使榮血漸生心神鎮守斯為藥之效矣謹按本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處竒偶二方列之於後治假令金瘡血出不止候正一輔二竒方麒麟竭散麒麟竭為正味甘鹹平有小毒主金瘡用二兩研細末花乳石為輔主金瘡止血出陜華諸郡用一兩碾為細末石硫黃為輔味酸溫大熱有毒主止血生東海牧羊山谷中及太山河西山用一兩為末右三味除麒麟竭外將花乳石石硫黃二味為末入瓷罐內鹽泥固濟用炭火五斤煆炭盡為度取出頓地下出火氣一宿再碾細將麒麟竭末和勻傅患處無時治假令變證金瘡驚悸候正二輔四偶方人參當歸散人參為正味甘微寒微溫無毒止驚悸生上黨山谷中及遼東茯苓為之使惡溲蔬反藜蘆去蘆頭用二兩當歸為正味甘辛溫大溫無毒主金瘡補五臟生隴西川谷惡䕡茹畏菖蒲海藻牡蒙去蘆頭及土酒浸一宿焙乾用二兩丹砂為輔味甘微寒無毒養精神生符陵山谷惡磁石畏鹹水用一兩研細水飛芎藭為輔味辛溫無毒主金瘡生武功川谷斜谷西嶺白芷為之使用一兩乾地黃為輔味甘苦寒無毒補五臟內傷不足生咸陽川澤惡貝母畏蕪荑用二兩茯苓為輔味甘平無毒主驚邪恐悸生泰山山谷去赤皮用一兩銼右六味為細末每服三錢溫酒調下不拘時候謹對第二道問假令金瘡著風腫候目即節氣當得何脈本因是何臟腑受病發何形候即今冝用是何方藥調理設有變動又當隨脈如何救療各須引本經為證及本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處方對答對金瘡未巳既感於風寒之氣邪正相搏必生於洪腫之愆且形因金刃之傷病為金瘡之候微則皮開而肉拆甚則骨斷而筋傷知於保調者則封護而外邪莫侵昧於將理者則祼露而風邪斯入風搏於氣而氣不宣流氣搏於風而風無通泄俾皮腫而瘡髙致肉䐈而瘡突所以然者金瘡著風之故也目即春陽已至物彚始生榮衛至此而方通人氣於斯而漸盛故脈應微弦曰平今反診得浮虗之象者故為風邪之脈矣經曰浮為風為虗本因金刃既傷風邪又入其證皮膚腫起瘡口髙突者是也巢氏曰此由瘡著於風風氣相搏故腫也詳其證而尚輕受其邪而猶淺冝用正一輔二竒方防風散以防風一味為主病之正以芎藭雄黃二味為佐正之輔三味合而服之使風邪散釋洪腫漸消此其藥之效也設若治之稍緩療之失時故風寒自外而歸中外邪從表而入臟其狀背直而口急其候頭搖而馬鳴故知其病必變為金瘡中風痙候矣巢氏曰夫金瘡痙者此由血脈虗竭飲食未復未滿月日榮衛傷穿風氣得入五臟受寒則痙其狀口急背直搖頭馬鳴腰為反折復切其脈浮而兼遲者為金瘡風痙之脈也經曰浮則為風又曰遲者臟也再詳其證病則甚於先時邪則入於五臟用竒方而不及必偶方而可效冝用正二輔四偶方防風芎藭湯以防風芎藭二味為正以當歸天雄獨活乾薑四味為輔六味合而服之使風邪散釋臟氣安和則背直腰反之證悉得愈矣謹按本草逐藥主療所出州土性味畏惡正輔佐使重輕竒偶及修製之法處竒偶二方附之於後治假令金瘡著風腫候正一輔二竒方防風散防風為正味甘辛溫無毒主風邪及金瘡生沙苑川澤及邯鄲琅琊上蔡惡乾薑藜蘆白芫花去義枝用一兩芎藭為輔味辛溫無毒主中風及金瘡生武功川谷斜谷西嶺白芷為之使用半兩雄黃為輔味苦甘平寒大溫有毒主絶筋破骨百節中大風用半兩别研細用水飛右三味為細末每服二錢溫酒調下不拘時候治假令變證金瘡中風痙候正二輔四偶方防風芎藭湯防風為正味甘辛溫無毒主金瘡內痙生沙苑川澤及邯鄲琅琊上蔡惡乾薑藜蘆白芫花去義枝用二兩芎藭為正味甘辛溫無毒主中風及金瘡生武功川谷斜谷西嶺白芷為之使用二兩當歸為輔味甘辛溫大溫無毒主金瘡及中風痙生隴西川谷惡䕡茹畏菖蒲海藻牡蒙去土及蘆頭酒浸一宿焙乾用一兩天雄為輔味辛甘溫大溫有大毒主大風及金瘡生少室山谷惡腐婢炮裂去皮臍用一兩獨活為輔味苦甘平微溫無毒主風寒所擊金瘡生雍州川谷或隴西南安豚實為之使用一兩乾薑為輔味辛溫大熱無毒逐風邪生犍為川谷及荆州揚州惡黃芩黃連天鼠糞炮用一兩右六味㕮咀每服五錢水二盞煎至八分去柤溫服不拘時候謹對運氣一道問甲寅年五運六氣所在所冝處方為對對道生一而有太極一生二而分兩儀天得一而以清布六氣於穹窿之表地得一而以寧列五行於磅礴之間寒暑燥濕風火於是而推遷木火土金水火由兹而妙用司運者則六十年各統於一歲司氣者則十二月共主於一年太過不及而可分承歲天符而可别氣用相得則謂之和故民康而物盛氣用相違則謂之變故民疾而物衰至於在上司天在下司地五運循環六氣遷復自匪先立其年則何自而推明矣今觀甲寅之年上見少陽相火司天中行太宫土運下臨厥隂風木在泉是歲也天氣與運氣有相生相繼之道司天與在泉無相尅相制之冝運行陽干是為太過之年命曰厚阜之紀是謂廣化厚德清靜順長以盈至隂內實物化充成煙埃朦鬱見於厚土大雨時行濕氣乃用燥政乃辟其化圓其氣豐其政靜其令周備其動濡積并結其臟脾胃其病腹滿四支不舉詳此之歲乃異風熱者少寒化冝用微寒之藥治其一歲之過愆夫天氣運動而不息則為之客地氣應靜而守位則為之主左右間氣以顯於其間上下加臨以布於其內且初之氣自先歲大寒至當歲春分六十日有竒上見少隂君火為之客下臨木位為之主地氣遷風勝乃搖寒乃去候乃大溫草木早榮寒來不殺溫病乃起其病氣怫於上血溢目赤咳逆頭痛血漏脅滿膚腠中瘡冝用鹹寒之藥治其氣之過耳二之氣自春分至小滿六十日有竒上見太隂濕土為之客下臨火位為之主火反鬱白埃四起雲趍雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡冝用苦熱之藥治其氣之過耳三之氣自小滿至大暑六十日有竒上見少陽相火為之客下臨火位為之主天政布炎暑至少陽臨上雨乃霪民病熱中聾暝血溢膿瘡咳嘔􅍠衄渴嚏欠喉痺目赤善暴死冝用鹹冷之藥治其氣之過耳四之氣自大暑至秋分六十日有竒上見陽明燥金為之客下臨土位為之主涼乃至炎暑間化白露降民氣和平其病滿身重冝用苦溫之藥治其氣之過耳五之氣自秋分至小雪六十日有竒上見太陽寒水為之客下臨金位為之主陽乃去寒乃來雨乃降氣門乃閉剛木早凋民避寒邪君子周密冝用甘熱之藥治其氣之過耳終之氣自小雪至大寒六十日有竒上見厥隂風木為之客下臨水位為之主地氣政風乃至萬物反生霜霧以行其病關閉不禁心痛陽氣不藏而咳冝用辛涼之藥治其氣之過耳由是必折其鬱氣先取化源使暴過不生苛疾不起治六氣之藥已布於前調一歲之方今附於後治甲寅年五運六氣正一輔二竒方人參湯人參為正味甘微寒微溫無毒生上黨山谷及遼東茯苓為之使惡溲蔬反藜蘆去蘆頭用一兩麥門冬為輔味甘平微寒無毒生函谷川谷及堤坂肥土石間久廢處去心日乾用半兩甘草為輔味甘平無毒生河西川谷積沙山及上郡术乾漆苦參為之使惡逺志反大戟芫花甘遂海藻微炙用半兩右三味㕮咀每服三錢水一盞半煎至八分去滓溫服不拘時候謹對
